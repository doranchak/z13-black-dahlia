<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zodiac Cipher Visualizer - Lite</title>
    <style>
        @font-face {
            font-family: 'untitled2regular';
            src: url('z340-z408-combined-font-monospaced-webfont.woff2') format('woff2'),
                url('z340-z408-combined-font-monospaced-webfont.woff') format('woff');
            font-weight: normal; font-style: normal;
        }        
        :root {
            --wood-color: #e3c18d; --wood-dark: #c4a470; --tile-size: 60px;
            --cipher-green: #2e7d32; --cipher-red: #c62828; --btn-color: #455a64;
            --anim-speed: 0.3s; 
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: #f5f5f5; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        #main-container { display: flex; width: 98vw; max-width: 1400px; gap: 20px; align-items: flex-start; justify-content: center; }
        #left-panel { flex: 0 0 250px; display: flex; flex-direction: column; gap: 20px; }
        #right-panel { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .area { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        #cipher-grid-area { min-height: 450px; display: flex; flex-direction: column; align-items: center; position: relative; width: 100%; }
        .tile-container { position: relative; height: 380px; width: 100%; perspective: 1000px; margin-top: 20px;}
        
        .tile {
            position: absolute; width: var(--tile-size); height: var(--tile-size);
            background-color: var(--wood-color); border: 2px solid var(--wood-dark);
            border-radius: 8px; font-size: 50px; transform-style: preserve-3d;
            transition: left var(--anim-speed) linear, top var(--anim-speed) linear, transform var(--anim-speed) linear;
            display: flex; justify-content: center; align-items: center;
            z-index: 10;
        }

        .tile-content { font-family: 'untitled2regular'; }
        .char-letter { color: var(--cipher-green); }
        .char-symbol { color: var(--cipher-red); }

        #controls { display: flex; flex-direction: column; gap: 15px; background: #2c3e50; padding: 20px; border-radius: 12px; color: white; }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        button, select { padding: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; color: white; background-color: var(--btn-color); }
        
        .col-label { 
            position: absolute; font-weight: 900; color: #7f8c8d; font-size: 14px; 
            transition: left var(--anim-speed) linear;
            /* Anchored to the container top */
            top: 0;
        }

        input[type="range"] { cursor: pointer; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="left-panel">
        <div id="controls">
            <div class="control-group">
                <label>Variation:</label>
                <select id="variant-select" onchange="resetAll()"></select>
            </div>
            <div class="control-group">
                <label>Overall Speed:</label>
                <input type="range" id="speed-slider" min="50" max="1500" step="50" value="300" oninput="updateSpeedVisuals()">
                <div style="display:flex; justify-content: space-between; font-size: 12px;">
                    <span>Fast</span><span>Slow</span>
                </div>
            </div>
            <div class="control-group">
                <button id="shuffle-btn" onclick="toggleShuffle()">Shuffle Cipher</button>
                <button onclick="resetAll()">Reset Workspace</button>
            </div>
        </div>
    </div>
    <div id="right-panel">
        <div id="cipher-grid-area" class="area">
            <h3 style="margin: 0;">Cipher Grid</h3>
            <div id="grid-container" class="tile-container">
                <div id="col-labels-container" style="position: absolute; top: 30px; width: 100%; height: 25px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const variantData = { "1": "AENz0K0M0[NAM", "2": "AENz0K0M0[NAM", "3": "AENz0K0M0[NAM", "4": "AENz0K0M0[NAM", "5": "AENz0KM0[NAM", "6": "AENz0KM0[NAM", "7": "AENzKM[NAM", "8": "AENzKM[NAM" };
    let tiles = [], colLabels = [];
    let isShuffling = false, shuffleInterval = null;

    function isSymbol(char) { return ['z', '0', '[', '_'].includes(char); }

    function updateSpeedVisuals() {
        const speed = document.getElementById('speed-slider').value;
        document.documentElement.style.setProperty('--anim-speed', (speed / 1000) + 's');
    }

    function init() {
        const vSel = document.getElementById('variant-select');
        Object.keys(variantData).forEach(k => vSel.add(new Option(`Variant ${k}`, k)));
        updateSpeedVisuals();
        resetAll();
    }

    function resetAll() {
        stopShuffle();
        const container = document.getElementById('grid-container');
        const lblsContainer = document.getElementById('col-labels-container');
        
        Array.from(container.children).forEach(child => {
            if (child.id !== 'col-labels-container') container.removeChild(child);
        });
        lblsContainer.innerHTML = '';
        
        tiles = []; 
        colLabels = [];
        const v = document.getElementById('variant-select').value;
        
        variantData[v].split("").forEach((char, idx) => {
            const t = document.createElement('div');
            t.className = `tile ${isSymbol(char) ? 'char-symbol' : 'char-letter'}`;
            t.innerHTML = `<div class="tile-content">${char}</div>`;
            container.appendChild(t); 
            tiles.push(t);
        });
        positionLinear();
    }

    function positionLinear() {
        const spacing = 70; 
        const offset = (tiles.length - 1) * spacing / 2;
        const baseY = 100; // Tiles sit at 100px

        tiles.forEach((t, i) => {
            t.style.left = `calc(50% - ${offset}px + ${i * spacing}px - 30px)`;
            t.style.top = `${baseY}px`;
            t.style.transform = 'translateY(0)';
        });
        renderColumnLabels(tiles.length, offset, spacing);
    }

    function renderColumnLabels(totalCols, offset, spacing) {
        const lblsContainer = document.getElementById('col-labels-container');
        lblsContainer.innerHTML = ''; 
        colLabels = [];
        for(let k=0; k<totalCols; k++) {
            const l = document.createElement('div'); 
            l.className='col-label'; 
            l.textContent=k+1;
            l.style.left = `calc(50% - ${offset}px + ${k*spacing}px - 5px)`;
            lblsContainer.appendChild(l); 
            colLabels.push(l);
        }
    }

    function toggleShuffle() {
        if (isShuffling) { stopShuffle(); return; }
        startShuffle();
    }

    function startShuffle() {
        isShuffling = true;
        document.getElementById('shuffle-btn').textContent = "Stop Shuffle";

        const spacing = 70; 
        const total = tiles.length; 
        const offset = (total - 1) * spacing / 2;
        let currentPos = Array.from({length: total}, (_, i) => i);

        const runStep = () => {
            if (!isShuffling) return;

            let p1 = Math.floor(Math.random() * total);
            let p2 = Math.floor(Math.random() * total);
            if(p1 === p2) {
                shuffleInterval = setTimeout(runStep, document.getElementById('speed-slider').value);
                return;
            }

            [currentPos[p1], currentPos[p2]] = [currentPos[p2], currentPos[p1]];

            currentPos.forEach((tileIdx, slotIdx) => {
                const t = tiles[tileIdx]; 
                const l = colLabels[tileIdx];
                const x = `calc(50% - ${offset}px + ${slotIdx * spacing}px`;
                
                t.style.left = x + ` - 30px)`;
                if(l) l.style.left = x + ` - 5px)`;
                
                // Glide offset reduced to 20px so they stay well below the labels at top:30px
                const y = (slotIdx === p1) ? -20 : (slotIdx === p2) ? 20 : 0;
                t.style.transform = `translateY(${y}px)`;
            });

            shuffleInterval = setTimeout(runStep, document.getElementById('speed-slider').value);
        };

        runStep();
    }

    function stopShuffle() {
        isShuffling = false; 
        clearTimeout(shuffleInterval);
        document.getElementById('shuffle-btn').textContent = "Shuffle Cipher";
        tiles.forEach(t => t.style.transform = 'translateY(0)');
    }

    init();
</script>
</body>
</html>
