<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trust Green Screen Animation</title>
    <style>
        /* Green screen background */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #00FF00; /* Chroma key green */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px; /* Gives the 3D falling effect depth */
            font-family: 'Impact', 'Arial Black', sans-serif;
        }

        #word-container {
            display: flex;
        }

        /* Styling for the powerful letters */
        .letter {
            font-size: 15vw;
            font-weight: 900;
            color: #FFFFFF;
            text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.5); /* Adds a little depth before breaking */
            display: inline-block;
            /* The transition dictates how it falls */
            transition: transform 2.5s cubic-bezier(0.55, 0.085, 0.68, 0.53), opacity 2s ease-in;
            transform-origin: center center;
            transform-style: preserve-3d;
        }
    </style>
</head>
<body>

    <div id="word-container">
        <span class="letter">T</span>
        <span class="letter">R</span>
        <span class="letter">U</span>
        <span class="letter">S</span>
        <span class="letter">T</span>
    </div>

    <script>
        // Wait 1.5 seconds so the viewer can read the word, then shatter it
        setTimeout(() => {
            const letters = document.querySelectorAll('.letter');
            
            letters.forEach((letter) => {
                // Generate random physics variables for each letter piece
                const randomX = (Math.random() - 0.5) * 1500; // Scatter left or right
                const randomY = (Math.random() * 1000) + 800; // Fall heavily downwards
                const randomZ = (Math.random() - 0.5) * 1500; // Fly towards or away from camera
                
                const rotateX = Math.random() * 720 - 360; // Tumble
                const rotateY = Math.random() * 720 - 360; // Tumble
                const rotateZ = Math.random() * 720 - 360; // Tumble

                // Apply the random 3D transformations
                letter.style.transform = `translate3d(${randomX}px, ${randomY}px, ${randomZ}px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) rotateZ(${rotateZ}deg)`;
                
                // Fade out slightly as they fall into the distance
                letter.style.opacity = '0';
            });
        }, 1500); // 1.5 second delay before falling
    </script>

</body>
</html>
