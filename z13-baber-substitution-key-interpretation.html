<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Zodiac Cipher Analytics v32</title>
    <style>
        @font-face {
            font-family: 'untitled2regular';
            src: url('z340-z408-combined-font-monospaced-webfont.woff2') format('woff2'),
                url('z340-z408-combined-font-monospaced-webfont.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --wood-color: #e3c18d;
            --wood-dark: #c4a470;
            --tile-size: 60px;
            --cipher-green: #2e7d32;
            --cipher-red: #c62828;
            --cipher-gray: #7d7d7d;
            --plain-indigo: #303f9f;
            --btn-color: #455a64;
            --highlight-cyan: #00e5ff;
            --table-header-bg: #eceff1;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .area {
            background: white;
            padding: 20px;
        }

        .char-letter {
            color: var(--cipher-green);
        }

        .char-symbol {
            color: var(--cipher-red);
        }

        .char-symbol-2 {
            color: var(--cipher-gray);
        }

        .simple-blue-highlight {
            background-color: #64b5f6 !important;
            border-color: #1e88e5 !important;
            color: white !important;
            box-shadow: none !important;
        }

        .simple-blue-highlight .char-letter,
        .simple-blue-highlight .char-symbol {
            color: white !important;
        }

        /* Compact Controls Styling */
        #controls-area {
            margin-top: 20px;
            width: 100%;
            max-width: 650px;
        }

        #controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #2c3e50;
            padding: 20px;
            border-radius: 8px;
            color: white;
        }

        .control-group {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .control-group h3 {
            width: 100px;
            font-size: 30px;
            margin: 0;
            color: var(--highlight-cyan);
            font-family: 'untitled2regular';
        }
        
        .control-group h4 {
            width: 100px;
            font-size: 16px;
            margin: 0;
            color: var(--highlight-cyan);
        }

        button {
            padding: 8px 14px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            color: white;
            background-color: var(--btn-color);
            font-size: 14px;
            transition: background-color 0.2s;
        }

        button:hover {
            filter: brightness(1.2);
        }
        
        .reset-btn {
            background-color: var(--cipher-red);
            align-self: flex-start;
            margin-top: 10px;
        }

        .group-reset {
            background-color: #c62828;
            margin-left: auto;
            font-size: 12px;
            padding: 6px 10px;
        }
        
        .action-row {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }
        
        #anim-btn {
            background-color: #00897b;
        }

        #substitution-key-area {
            padding: 15px;
            overflow: visible;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #key-table {
            border-collapse: collapse;
            margin-top: 5px;
            table-layout: fixed;
            margin: 0 auto;
        }

        #cipher-row td {
            font-family: 'untitled2regular';
            height: 45px;
            text-align: center;
            font-size: 40px;
            cursor: pointer;
            border: 1px solid #ddd;
            transition: all 0.2s;
            position: relative;
            padding: 10px;
        }

        #plain-row td {
            color: black;
            background-color: #fff;
            font-size: 30px;
            font-weight: bold;
            height: 45px;
            text-align: center;
            border: 1px solid #ddd;
            cursor: pointer;
            transition: all 0.2s;
            padding: 10px;
        }

        /* Styling for the borderless third row */
        #third-row td {
            font-family: 'untitled2regular';
            height: 45px;
            text-align: center;
            font-size: 40px;
            cursor: pointer;
            border: 1px solid transparent; 
            transition: all 0.2s;
            position: relative;
            padding: 10px;
        }

        .divider {
            height: 1px;
            background-color: #455a64;
            margin: 5px 0;
            width: 100%;
        }

    </style>
</head>

<body>
    <div id="substitution-key-area" class="area">
        <table id="key-table">
            <tbody>
                <tr id="plain-row">
                    <td id="key-p-cell-A">I</td>
                    <td id="key-p-cell-E">V</td>
                    <td id="key-p-cell-K">N</td>
                    <td id="key-p-cell-M">L</td>
                    <td id="key-p-cell-N">M</td>
                    <td id="key-p-cell-z">A</td>
                    <td id="key-p-cell-[">E</td>
                    <td id="key-p-cell-0">R</td>
                </tr>
                <tr id="cipher-row">
                    <td class="char-letter" id="key-c-cell-A">A</td>
                    <td class="char-letter" id="key-c-cell-E">E</td>
                    <td class="char-letter" id="key-c-cell-K">K</td>
                    <td class="char-letter" id="key-c-cell-M">M</td>
                    <td class="char-letter" id="key-c-cell-N">N</td>
                    <td class="char-symbol" id="key-c-cell-z">z</td>
                    <td class="char-symbol" id="key-c-cell-[">[</td>
                    <td class="char-symbol" id="key-c-cell-0">0</td>
                </tr>
                <tr id="third-row">
                    <td></td><td></td><td></td><td></td><td></td>
                    <td class="char-symbol-2"></td>
                    <td class="char-symbol-2"></td>
                    <td class="char-symbol-2"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div id="controls-area">
        <div id="controls">
            <div class="control-group">
                <h3>z</h3>
                <button onclick="replaceCipher(5, 'z', 'Z')">Z</button>
                <button onclick="replaceCipher(5, 'z', 'T')">T</button>
                <button onclick="replaceCipher(5, 'z', 'O')">O</button>
                <button onclick="replaceCipher(5, 'z', 'D')">D</button>
                <button onclick="replaceCipher(5, 'z', 'A')">A</button>
                <button class="group-reset" onclick="resetColumn(5, 'z')">Reset</button>
            </div>
            <div class="control-group">
                <h3>[</h3>
                <button onclick="replaceCipher(6, '[', 'V')">V</button>
                <button onclick="replaceCipher(6, '[', 'T')">T</button>
                <button onclick="replaceCipher(6, '[', 'R')">R</button>
                <button onclick="replaceCipher(6, '[', 'O')">O</button>
                <button onclick="replaceCipher(6, '[', 'L')">L</button>
                <!-- <button onclick="replaceCipher(6, '[', 'T')">T</button> -->
                <button class="group-reset" onclick="resetColumn(6, '[')">Reset</button>
            </div>
            <div class="control-group">
                <h3>0</h3>
                <button onclick="replaceCipher(7, '0', 'B')">B</button>
                <button onclick="replaceCipher(7, '0', 'O')">O</button>
                <button onclick="replaceCipher(7, '0', 'E')">E</button>
                <button onclick="replaceCipher(7, '0', 'H')">H</button>
                <button onclick="replaceCipher(7, '0', 'X')">X</button>
                <button onclick="replaceCipher(7, '0', 'S')">S</button>
                <button class="group-reset" onclick="resetColumn(7, '0')">Reset</button>
            </div>
            
            <div class="divider"></div>
            
            <div class="control-group">
                <h4>Toggle Highlight</h4>
                <button onclick="toggleHighlight(5)">A</button>
                <button onclick="toggleHighlight(6)">E</button>
                <button onclick="toggleHighlight(0)">I</button>
                <button onclick="toggleHighlight(3)">L</button>
                <button onclick="toggleHighlight(4)">M</button>
                <button onclick="toggleHighlight(2)">N</button>
                <button onclick="toggleHighlight(7)">R</button>
                <button onclick="toggleHighlight(1)">V</button>
            </div>

            <div class="divider"></div>

            <div class="action-row">
                <button class="reset-btn" onclick="resetTable()">Reset All</button>
                <button id="anim-btn" onclick="toggleAnimation()">Animate All Permutations</button>
            </div>
        </div>
    </div>

    <script>
        const initialCipherRow = ["A", "E", "K", "M", "N", "z", "[", "0"];
        
        // Define the button lists for the animation logic
        const zLetters = ['Z', 'T', 'O', 'D', 'A'];
        const bracketLetters = ['V', 'T', 'R', 'O', 'L'];
        const zeroLetters = ['B', 'O', 'E', 'H', 'X', 'S'];
        let isAnimating = false;

        document.addEventListener("DOMContentLoaded", () => {
            const table = document.getElementById("key-table");

            table.addEventListener("click", (e) => {
                const td = e.target.closest("td");
                if (!td) return;

                toggleHighlight(td.cellIndex);
            });
        });

        // Function extracted to be used by both the table clicks and the new buttons
        function toggleHighlight(colIndex) {
            const plainRow = document.getElementById("plain-row");
            const cipherRow = document.getElementById("cipher-row");
            const thirdRow = document.getElementById("third-row");
            
            const isHighlighted = plainRow.cells[colIndex].classList.contains("simple-blue-highlight");

            if (isHighlighted) {
                plainRow.cells[colIndex].classList.remove("simple-blue-highlight");
                cipherRow.cells[colIndex].classList.remove("simple-blue-highlight");
                thirdRow.cells[colIndex].classList.remove("simple-blue-highlight");
            } else {
                plainRow.cells[colIndex].classList.add("simple-blue-highlight");
                cipherRow.cells[colIndex].classList.add("simple-blue-highlight");
                
                if (thirdRow.cells[colIndex].innerText.trim() !== "") {
                    thirdRow.cells[colIndex].classList.add("simple-blue-highlight");
                }
            }
        }

        // Function triggered by the letter buttons and the animator
        function replaceCipher(colIndex, originalSymbol, newSymbol) {
            const cipherRow = document.getElementById("cipher-row");
            const thirdRow = document.getElementById("third-row");
            const plainRow = document.getElementById("plain-row");

            cipherRow.cells[colIndex].innerText = newSymbol;
            thirdRow.cells[colIndex].innerText = originalSymbol;

            if (plainRow.cells[colIndex].classList.contains("simple-blue-highlight")) {
                thirdRow.cells[colIndex].classList.add("simple-blue-highlight");
            }
        }

        // Reset a specific symbol's column
        function resetColumn(colIndex, originalSymbol) {
            const cipherRow = document.getElementById("cipher-row");
            const thirdRow = document.getElementById("third-row");

            cipherRow.cells[colIndex].innerText = originalSymbol;
            thirdRow.cells[colIndex].innerText = "";
            thirdRow.cells[colIndex].classList.remove("simple-blue-highlight");
        }

        // Reset everything to original state
        function resetTable() {
            // Force animation to stop if it's running
            if (isAnimating) {
                toggleAnimation();
            }

            const plainRow = document.getElementById("plain-row");
            const cipherRow = document.getElementById("cipher-row");
            const thirdRow = document.getElementById("third-row");

            for (let i = 0; i < initialCipherRow.length; i++) {
                cipherRow.cells[i].innerText = initialCipherRow[i];
                thirdRow.cells[i].innerText = "";
                
                plainRow.cells[i].classList.remove("simple-blue-highlight");
                cipherRow.cells[i].classList.remove("simple-blue-highlight");
                thirdRow.cells[i].classList.remove("simple-blue-highlight");
            }
        }

        // Toggle the animation on/off
        function toggleAnimation() {
            const btn = document.getElementById('anim-btn');
            
            if (isAnimating) {
                // Stop Animation
                isAnimating = false;
                btn.innerText = "Animate All Permutations";
                btn.style.backgroundColor = "#00897b";
            } else {
                // Start Animation
                isAnimating = true;
                btn.innerText = "Stop Animation";
                btn.style.backgroundColor = "#d32f2f"; // Change to red to indicate "stop"
                runAnimation().then(() => {
                    // Reset button automatically if animation naturally finishes
                    if (isAnimating) {
                        isAnimating = false;
                        btn.innerText = "Animate All Permutations";
                        btn.style.backgroundColor = "#00897b";
                    }
                });
            }
        }

        // Generate combinations and loop through them
        async function runAnimation() {
            let combinations = [];
            
            // Generate all 5 * 6 * 6 = 180 combinations
            for (let z of zLetters) {
                for (let b of bracketLetters) {
                    for (let zero of zeroLetters) {
                        combinations.push({ zStr: z, bracketStr: b, zeroStr: zero });
                    }
                }
            }

            // Loop and render ~5 frames per second (200ms sleep)
            for (let i = 0; i < combinations.length; i++) {
                if (!isAnimating) break; // Break early if stopped by the user

                let combo = combinations[i];
                
                // Update the columns
                replaceCipher(5, 'z', combo.zStr);
                replaceCipher(6, '[', combo.bracketStr);
                replaceCipher(7, '0', combo.zeroStr);
                
                // Sleep for 200ms
                await new Promise(r => setTimeout(r, 200));
            }
        }
    </script>
</body>
</html>
