<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zodiac Cipher Analytics - Simplified</title>
    <style>
        @font-face {
            font-family: 'untitled2regular';
            src: url('z340-z408-combined-font-monospaced-webfont.woff2') format('woff2'),
                url('z340-z408-combined-font-monospaced-webfont.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }        
        :root {
            --wood-color: #e3c18d;
            --wood-dark: #c4a470;
            --tile-size: 60px;
            --cipher-green: #2e7d32;
            --cipher-red: #c62828;
            --table-header-bg: #eceff1;
            --highlight-blue: #64b5f6;
            --highlight-border: #1e88e5;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f5f5f5; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0; 
        }
        
        #main-container { 
            display: flex; 
            width: 98vw; 
            max-width: 1600px; 
            gap: 40px; 
            align-items: flex-start; 
            justify-content: center; 
        }

        #left-panel { 
            flex: 0 0 320px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            z-index: 1000; 
        }
        
        #right-panel { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            position: relative; 
            z-index: 1; 
            min-width: 1000px; 
        }

        .area { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        #cipher-grid-area { 
            min-height: 500px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            position: relative; 
            width: 100%; 
            overflow: hidden; 
        }
        
        .tile-container { position: relative; height: 400px; width: 100%; perspective: 1000px; }
        
        .tile {
            position: absolute; width: var(--tile-size); height: var(--tile-size);
            background-color: var(--wood-color); border: 2px solid var(--wood-dark);
            border-radius: 8px; font-size: 50px; 
            box-shadow: 2px 4px 8px rgba(0,0,0,0.15);
            transition: transform 0.8s ease-in-out, left 0.8s ease-in-out, top 0.8s ease-in-out, box-shadow 0.3s; 
            transform-style: preserve-3d; z-index: 10;
        }

        .tile-content { 
            font-family: 'untitled2regular';
            position: absolute; backface-visibility: hidden; display: flex; 
            justify-content: center; align-items: center; width: 100%; height: 100%; text-align: center;
        }

        /* Color Classes for Cipher Characters */
        .char-normal { color: var(--cipher-green); }
        .char-symbol { color: var(--cipher-red); }

        .plain-side { transform: rotateY(180deg); color: black; font-family: 'Segoe UI', sans-serif; font-size: 35px; font-weight: bold;}
        .tile.flipped { transform: rotateY(180deg); }

        /* Highlight styles */
        .simple-blue-highlight {
            background-color: var(--highlight-blue) !important;
            border-color: var(--highlight-border) !important;
            color: white !important;
            box-shadow: none !important;
        }
        /* Override specific text colors when highlighted */
        .simple-blue-highlight .cipher-side, 
        .simple-blue-highlight .plain-side,
        .simple-blue-highlight .char-normal,
        .simple-blue-highlight .char-symbol { color: white !important; }

        #key-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        #cipher-row td { 
            font-family: 'untitled2regular'; height: 45px; text-align: center; font-size: 40px; 
            border: 1px solid #ddd; transition: all 0.2s; 
        }
        #cipher-row { background-color: var(--table-header-bg); }
        #plain-row td { color: black; background-color: #fff; font-size: 30px; font-weight: bold; height: 45px; text-align: center; border: 1px solid #ddd; }
        
        /* Search and List Styles */
        #search-box { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; margin-bottom: 10px; font-size: 14px;}
        .decrypt-item { 
            padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 16px; font-weight: 600; color: #2c3e50; transition: background 0.2s;
        }
        .decrypt-item:hover { background-color: #e3f2fd; color: #1565c0; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="left-panel">
        <div class="area">
            <h3 style="margin: 0 0 10px 0; font-size: 16px;">Substitution Key</h3>
            <table id="key-table">
                <tr id="cipher-row"></tr>
                <tr id="plain-row"></tr>
            </table>
        </div>

        <div class="area" style="padding: 0; overflow: hidden;">
            <div style="padding: 15px; background: #f8f9fa; border-bottom: 1px solid #eee;">
                <input type="text" id="search-box" placeholder="Search..." oninput="renderList()">
            </div>
            <div id="decryption-list" style="max-height: 400px; overflow-y: auto;"></div>
        </div>
    </div>

    <div id="right-panel">
        <div id="cipher-grid-area" class="area">
            <h3 id="status-title" style="margin: 0 0 2em 0;">Cipher Grid</h3>
            <div id="grid-container" class="tile-container"></div>
        </div>
    </div>
</div>

<script>
    const CIPHER_STRING = "AENz0K0M0[NAM";
    const KEY_CHARS = ['A', 'E', 'K', 'M', 'N', 'z', '[', '0'];
    const plaintexts = [
        "Luis Rory Reily",
        "L Jacob ODonald",
        "Eddie Resendes",
        "Steve Pete West",
        "Gary Lyle Large",
        "On TV A War Actor",
        "Luis Rory Reily",

        "L Jacob ODonald",

        "Gary Lyle Large",
        "On TV A War Actor",
        "Luis Rory Reily",
        "L Jacob ODonald",
        "Eddie Resendes",
        "Steve Pete West",
        "Gary Lyle Large",
        "On TV A War Actor",
        "Luis Rory Reily",
        "L Jacob ODonald",
        "Eddie Resendes",
        "Steve Pete West",
        "Gary Lyle Large",
        "On TV A War Actor",
        "Luis Rory Reily",
        "L Jacob ODonald",
        "Eddie Resendes",
        "Steve Pete West",
        "Gary Lyle Large",
        "On TV A War Actor",
        "Luis Rory Reily",
        "L Jacob ODonald",
        "Eddie Resendes",
        "Steve Pete West",
        "Gary Lyle Large",
        "On TV A War Actor",
        "Luis Rory Reily",
        "L Jacob ODonald",
        "Eddie Resendes",
        "Steve Pete West",
        "Gary Lyle Large",
        "On TV A War Actor",
    ];
    let tiles = [];

    // Helper to assign color classes
    function getCharClass(char) {
        const normals = ['A', 'E', 'K', 'M', 'N'];
        return normals.includes(char) ? 'char-normal' : 'char-symbol';
    }

    function init() {
        buildInitialKey();
        renderList();
        resetAll(); 
    }

    function buildInitialKey() {
        const cRow = document.getElementById('cipher-row');
        const pRow = document.getElementById('plain-row');
        cRow.innerHTML = ''; pRow.innerHTML = '';
        KEY_CHARS.forEach(c => {
            const tdC = document.createElement('td');
            tdC.textContent = c; 
            tdC.id = `key-c-${c}`;
            // Apply color class to key table
            tdC.className = getCharClass(c);
            cRow.appendChild(tdC);

            const tdP = document.createElement('td');
            tdP.id = `key-p-${c}`;
            pRow.appendChild(tdP);
        });
    }

    function renderList() {
        const query = document.getElementById('search-box').value.toLowerCase();
        const list = document.getElementById('decryption-list');
        list.innerHTML = '';
        plaintexts.filter(t => t.toLowerCase().includes(query)).forEach(text => {
            const div = document.createElement('div');
            div.className = 'decrypt-item';
            div.textContent = text;
            div.onclick = () => playDecryption(text);
            list.appendChild(div);
        });
    }

    async function resetAll() {
        const container = document.getElementById('grid-container');
        container.innerHTML = ''; 
        tiles = []; 
        
        const spacing = 70;
        const totalCols = 13; 
        const offset = (totalCols - 1) * spacing / 2;
        
        CIPHER_STRING.split("").forEach((char, i) => {
            const t = document.createElement('div');
            t.className = 'tile';
            // Apply color class to tile content
            const colorClass = getCharClass(char);
            t.innerHTML = `<div class="tile-content cipher-side ${colorClass}">${char}</div><div class="tile-content plain-side"></div>`;
            t.dataset.cipher = char;
            
            t.style.left = `calc(50% - ${offset}px + ${i * spacing}px - 30px)`;
            t.style.top = '140px'; 
            
            container.appendChild(t);
            tiles.push(t);
        });

        KEY_CHARS.forEach(c => document.getElementById(`key-p-${c}`).textContent = '');
        document.getElementById('status-title').textContent = "Cipher Grid";
    }

    async function playDecryption(plaintext) {
        await resetAll();
        
        const cleanPlain = plaintext.replace(/\s/g, '').toUpperCase();
        
        tiles.forEach((t, i) => {
            if(cleanPlain[i]) t.querySelector('.plain-side').textContent = cleanPlain[i];
        });

        const fullPlainMap = {}; 
        for(let i=0; i<Math.min(cleanPlain.length, CIPHER_STRING.length); i++) {
            fullPlainMap[CIPHER_STRING[i]] = cleanPlain[i];
        }

        // Fill Key Immediately
        KEY_CHARS.forEach(char => {
            const keyP = document.getElementById(`key-p-${char}`);
            if(keyP && fullPlainMap[char]) {
                keyP.textContent = fullPlainMap[char];
            }
        });

        await new Promise(r => setTimeout(r, 400));

        const flippedSymbols = new Set();
        
        for(let i=0; i<CIPHER_STRING.length; i++) {
            const sym = CIPHER_STRING[i];
            
            if(flippedSymbols.has(sym)) continue;
            flippedSymbols.add(sym);
            
            const group = tiles.filter(t => t.dataset.cipher === sym);
            const keyC = document.getElementById(`key-c-${sym}`);
            const keyP = document.getElementById(`key-p-${sym}`);
            
            // Highlight
            keyC?.classList.add('simple-blue-highlight');
            keyP?.classList.add('simple-blue-highlight');
            group.forEach(t => t.classList.add('simple-blue-highlight'));
            
            await new Promise(r => setTimeout(r, 600));
            
            // Flip
            group.forEach(t => {
                t.classList.add('flipped');
            });
            
            await new Promise(r => setTimeout(r, 800));
            
            // Un-Highlight
            keyC?.classList.remove('simple-blue-highlight');
            keyP?.classList.remove('simple-blue-highlight');
            group.forEach(t => t.classList.remove('simple-blue-highlight'));
            
            await new Promise(r => setTimeout(r, 200));
        }
        
        await new Promise(r => setTimeout(r, 800));
        
        finalizeLayout(plaintext);
    }

    function finalizeLayout(text) {
        // Changed from 65 to 70 to match initial spacing
        const spacing = 70; 
        const lineVGap = 85;
        const maxRowWidth = 900; 
        
        const words = text.split(" ");
        let lines = [];
        let currentLineWords = [];
        let currentLineLen = 0;

        words.forEach(w => {
            const wordLen = w.length;
            const linePixelWidth = (currentLineLen + wordLen) * spacing;

            if (linePixelWidth > maxRowWidth && currentLineWords.length > 0) {
                lines.push(currentLineWords);
                currentLineWords = [];
                currentLineLen = 0;
            }
            
            currentLineWords.push(w);
            currentLineLen += wordLen + 1;
        });
        if (currentLineWords.length > 0) lines.push(currentLineWords);

        const startY = 50;
        let tileIdx = 0;

        lines.forEach((lineWords, lineIndex) => {
            const totalSlots = lineWords.reduce((acc, w) => acc + w.length, 0) + (lineWords.length - 1);
            const totalWidthPx = totalSlots * spacing;
            
            let currentX = (document.getElementById('grid-container').offsetWidth - totalWidthPx) / 2;
            currentX += (spacing / 2) - 30;

            lineWords.forEach((word) => {
                for(let char of word) {
                    if (tileIdx < tiles.length) {
                        const t = tiles[tileIdx];
                        t.style.left = `${currentX}px`;
                        t.style.top = `${startY + (lineIndex * lineVGap)}px`;
                        t.style.transform = `rotateY(180deg)`; 
                        tileIdx++;
                    }
                    currentX += spacing;
                }
                currentX += spacing;
            });
        });
        
        document.getElementById('status-title').textContent = text;
    }

    init();
</script>
</body>
</html>
