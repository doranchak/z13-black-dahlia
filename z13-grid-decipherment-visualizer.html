<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cipher Workspace v6</title>
    <style>
        :root {
            --wood-color: #e3c18d;
            --wood-dark: #c4a470;
            --tile-size: 60px;
            --cipher-green: #2e7d32;
            --cipher-red: #c62828;
            --plain-indigo: #303f9f;
            --btn-color: #455a64;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            user-select: none;
        }

        #top-section {
            display: flex;
            width: 98%;
            max-width: 1400px;
            justify-content: center;
            margin-bottom: 30px;
            gap: 20px;
        }

        .area {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            min-height: 280px;
        }

        #cipher-grid-area {
            flex: 3; 
            min-width: 980px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .tile-container {
            position: relative;
            height: 200px;
            width: 100%;
            perspective: 1000px;
        }

        .tile {
            position: absolute;
            width: var(--tile-size);
            height: var(--tile-size);
            background-color: var(--wood-color);
            border: 2px solid var(--wood-dark);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 24px;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.15);
            transition: transform 0.6s, left 0.6s, top 0.6s;
            transform-style: preserve-3d;
            cursor: grab;
        }

        .tile.highlighted { outline: 4px solid #fbc02d; box-shadow: 0 0 15px #fbc02d; z-index: 100 !important; }

        .tile-content {
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .plain-side { transform: rotateY(180deg); color: var(--plain-indigo); }
        .tile.flipped { transform: rotateY(180deg); }

        .char-letter { color: var(--cipher-green); }
        .char-symbol { color: var(--cipher-red); }

        table { border-collapse: collapse; margin: 20px auto; }
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
            font-weight: bold;
            width: 35px;
            cursor: pointer;
        }
        td:hover { background-color: #f1f1f1; }
        .highlight-key { background-color: #fff176 !important; outline: 3px solid #fbc02d; }

        #controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            background: #2c3e50;
            padding: 25px;
            border-radius: 12px;
            color: white;
            width: 900px;
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; }

        button {
            padding: 10px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            color: white;
            background-color: var(--btn-color);
        }
        button:hover { filter: brightness(1.2); }

        input[type="text"] { padding: 8px; border-radius: 4px; border: none; text-align: center; }
        .col-label { position: absolute; font-weight: 900; color: #7f8c8d; font-size: 18px; transition: all 0.6s; }
    </style>
</head>
<body>

<div id="top-section">
    <div id="cipher-grid-area" class="area">
        <h3 style="margin: 0;">Cipher Grid</h3>
        <div id="col-labels-container" style="position: relative; height: 35px; width: 100%;"></div>
        <div id="grid-container" class="tile-container"></div>
    </div>

    <div id="substitution-key-area" class="area">
        <h3 style="margin: 0;">Substitution Key</h3>
        <p style="font-size: 12px; color: #666;">Click a letter below to edit it.</p>
        <table id="key-table">
            <tr id="cipher-row"></tr>
            <tr id="plain-row"></tr>
        </table>
    </div>
</div>

<div id="controls">
    <div class="control-group">
        <button onclick="makeGrid()">Make Grid</button>
        <button onclick="resetAll()">Reset</button>
    </div>

    <div class="control-group">
        <input type="text" id="permute-input" value="1,2,3,4,5,6,7">
        <button onclick="permuteColumns()">Permute Columns</button>
        <button onclick="resetColumns()">Reset Columns</button>
    </div>

    <div class="control-group">
        <button onclick="decrypt()">Decrypt</button>
        <button onclick="clearDecryption()">Clear Decryption</button>
        <div style="display:flex; justify-content: space-between; align-items: center; font-size: 13px;">
            <label><input type="checkbox" id="instant-mode"> Instant</label>
            <label>Speed: <input type="range" id="speed-slider" min="1" max="10" value="5"></label>
        </div>
    </div>
</div>

<script>
    const cipherText = "AEN⊕8K8M8↓NAM".split("");
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    // const mapping = {};
    const uniqueChars = [...new Set(cipherText)];
    // uniqueChars.forEach(char => mapping[char] = alphabet[Math.floor(Math.random() * 26)]);
    const mapping = {
        "A":"I",
        "E":"V",
        "N":"M",
        "⊕":"A",
        "8":"R",
        "K":"N",
        "M":"L",
        "↓":"E"
    };

    const container = document.getElementById('grid-container');
    const labelContainer = document.getElementById('col-labels-container');
    const speedSlider = document.getElementById('speed-slider');
    const instantCheck = document.getElementById('instant-mode');
    
    let tiles = [];
    let extraTile = null;
    let colMap = [0, 1, 2, 3, 4, 5, 6]; 

    function getDelay(base) {
        if (instantCheck.checked) return 0;
        return base / (speedSlider.value / 5);
    }

    function isLetter(char) { return /[A-Z]/.test(char); }

    function init() {
        container.innerHTML = '';
        tiles = [];
        cipherText.forEach((char, i) => {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.innerHTML = `
                <div class="tile-content cipher-side ${isLetter(char) ? 'char-letter' : 'char-symbol'}">${char}</div>
                <div class="tile-content plain-side">${mapping[char]}</div>
            `;
            tile.dataset.cipher = char;
            tile.dataset.index = i;
            tile.onmousedown = (e) => startDrag(e, i);
            container.appendChild(tile);
            tiles.push(tile);
        });
        renderKey();
        positionLinear();
    }

    function renderKey() {
        const cRow = document.getElementById('cipher-row');
        const pRow = document.getElementById('plain-row');
        cRow.innerHTML = ''; pRow.innerHTML = '';
        uniqueChars.forEach(char => {
            const tdC = document.createElement('td');
            tdC.className = isLetter(char) ? 'char-letter' : 'char-symbol';
            tdC.textContent = char;
            tdC.onmouseenter = () => highlightTiles(char, true);
            tdC.onmouseleave = () => highlightTiles(char, false);
            cRow.appendChild(tdC);

            const tdP = document.createElement('td');
            tdP.textContent = mapping[char];
            tdP.onclick = () => {
                const newVal = prompt(`Enter new substitution for ${char}:`, mapping[char]);
                if (newVal) {
                    mapping[char] = newVal.toUpperCase().charAt(0);
                    tdP.textContent = mapping[char];
                    tiles.forEach(t => {
                        if(t.dataset.cipher === char) t.querySelector('.plain-side').textContent = mapping[char];
                    });
                }
            };
            pRow.appendChild(tdP);
        });
    }

    function highlightTiles(char, active) {
        tiles.forEach(t => {
            if(t.dataset.cipher === char) t.classList.toggle('highlighted', active);
        });
    }

    function positionLinear() {
        const spacing = 70;
        const offset = (13 - 1) * spacing / 2;
        tiles.forEach((t, i) => {
            t.style.transition = instantCheck.checked ? 'none' : `all ${getDelay(600)/1000}s`;
            t.style.left = `calc(50% - ${offset}px + ${i * spacing}px - 30px)`;
            t.style.top = '100px';
        });
    }

    async function makeGrid() {
        const spacing = 70;
        const offset = (7 - 1) * spacing / 2;
        const delay = getDelay(150);

        for (let i = 0; i < 6; i++) {
            tiles[i].style.transition = instantCheck.checked ? 'none' : `all ${getDelay(600)/1000}s`;
            tiles[i].style.left = `calc(50% - ${offset}px + ${i * spacing}px - 30px)`;
            tiles[i].style.top = '0px';
            if(delay > 0) await new Promise(r => setTimeout(r, delay));
        }

        if(delay > 0) await new Promise(r => setTimeout(r, getDelay(600)));

        const lastSeven = [12, 11, 10, 9, 8, 7, 6];
        for (let j = 0; j < lastSeven.length; j++) {
            const idx = lastSeven[j];
            tiles[idx].style.transition = instantCheck.checked ? 'none' : `all ${getDelay(600)/1000}s`;
            tiles[idx].style.left = `calc(50% - ${offset}px + ${j * spacing}px - 30px)`;
            tiles[idx].style.top = `${spacing}px`;
            if(delay > 0) await new Promise(r => setTimeout(r, delay));
        }

        if(delay > 0) await new Promise(r => setTimeout(r, getDelay(600)));

        if (!extraTile) {
            extraTile = document.createElement('div');
            extraTile.className = 'tile';
            extraTile.innerHTML = '<div class="tile-content char-letter" style="text-decoration: underline;">_</div>';
            extraTile.style.top = '0px';
            extraTile.style.left = '150%';
            container.appendChild(extraTile);
            setTimeout(() => {
                extraTile.style.transition = instantCheck.checked ? 'none' : `all ${getDelay(800)/1000}s`;
                extraTile.style.left = `calc(50% - ${offset}px + 6 * ${spacing}px - 30px)`;
            }, 50);
        }

        labelContainer.innerHTML = '';
        for (let i = 1; i <= 7; i++) {
            const l = document.createElement('div');
            l.className = 'col-label';
            l.textContent = i;
            l.style.left = `calc(50% - ${offset}px + ${(i-1) * spacing}px - 5px)`;
            labelContainer.appendChild(l);
        }
        updatePermuteInput([0,1,2,3,4,5,6]);
    }

    function updatePermuteInput(order) {
        document.getElementById('permute-input').value = order.map(i => i + 1).join(',');
        colMap = order;
    }

    async function permuteColumns() {
        const target = document.getElementById('permute-input').value.split(',').map(n => parseInt(n)-1);
        if(target.length !== 7) return;
        
        let current = [...colMap];
        for(let i=0; i<7; i++) {
            if(current[i] !== target[i]) {
                const idxB = current.indexOf(target[i]);
                await animateSwap(current, i, idxB);
                [current[i], current[idxB]] = [current[idxB], current[i]];
            }
        }
        colMap = current;
    }

    async function animateSwap(order, posA, posB) {
        const spacing = 70;
        const offset = (7 - 1) * spacing / 2;
        const labels = document.querySelectorAll('.col-label');
        const dur = getDelay(600)/1000;

        const getCol = (idx) => {
            let res = (idx < 6) ? [tiles[idx]] : [extraTile];
            res.push(tiles[12 - idx]);
            return res;
        };

        const groupA = getCol(order[posA]);
        const groupB = getCol(order[posB]);

        [...groupA, ...groupB].forEach(t => {
            if(t) {
                t.style.transition = instantCheck.checked ? 'none' : `all ${dur}s`;
                t.classList.add('swapping');
            }
        });

        groupA.forEach(t => t && (t.style.left = `calc(50% - ${offset}px + ${posB * spacing}px - 30px)`));
        groupB.forEach(t => t && (t.style.left = `calc(50% - ${offset}px + ${posA * spacing}px - 30px)`));
        
        labels[order[posA]].style.left = `calc(50% - ${offset}px + ${posB * spacing}px - 5px)`;
        labels[order[posB]].style.left = `calc(50% - ${offset}px + ${posA * spacing}px - 5px)`;

        if(!instantCheck.checked) await new Promise(r => setTimeout(r, getDelay(700)));
        [...groupA, ...groupB].forEach(t => t && t.classList.remove('swapping'));
    }

    function startDrag(e, tileIdx) {
        if (!labelContainer.hasChildNodes()) return; // Only drag in grid mode
        
        // Find which column this tile belongs to
        let origCol = tileIdx < 7 ? (tileIdx < 6 ? tileIdx : 6) : (12 - tileIdx);
        let startPos = colMap.indexOf(origCol);
        
        const onMouseMove = (moveE) => {
            const rect = container.getBoundingClientRect();
            const x = moveE.clientX - rect.left - (rect.width/2);
            const spacing = 70;
            const newPos = Math.max(0, Math.min(6, Math.round((x + (3*spacing)) / spacing)));
            
            if(newPos !== startPos) {
                const newOrder = [...colMap];
                [newOrder[startPos], newOrder[newPos]] = [newOrder[newPos], newOrder[startPos]];
                updateVisuals(newOrder);
                startPos = newPos;
                updatePermuteInput(newOrder);
            }
        };

        const onMouseUp = () => {
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
        };

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
    }

    function updateVisuals(order) {
        const spacing = 70;
        const offset = (7 - 1) * spacing / 2;
        const labels = document.querySelectorAll('.col-label');
        order.forEach((origIdx, visPos) => {
            let top = (origIdx < 6) ? tiles[origIdx] : extraTile;
            let bot = tiles[12 - origIdx];
            if(top) top.style.left = `calc(50% - ${offset}px + ${visPos * spacing}px - 30px)`;
            if(bot) bot.style.left = `calc(50% - ${offset}px + ${visPos * spacing}px - 30px)`;
            if(labels[origIdx]) labels[origIdx].style.left = `calc(50% - ${offset}px + ${visPos * spacing}px - 5px)`;
        });
    }

    async function decrypt() {
        for (let char of uniqueChars) {
            tiles.forEach(t => { if(t.dataset.cipher === char) t.classList.add('flipped'); });
            if(!instantCheck.checked) await new Promise(r => setTimeout(r, getDelay(400)));
        }
    }

    function resetAll() { if(extraTile) extraTile.remove(); extraTile = null; labelContainer.innerHTML = ''; init(); }
    function resetColumns() { updateVisuals([0,1,2,3,4,5,6]); updatePermuteInput([0,1,2,3,4,5,6]); }
    function clearDecryption() { tiles.forEach(t => t.classList.remove('flipped')); }

    init();
</script>
</body>
</html>
