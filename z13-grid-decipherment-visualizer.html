<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cipher Workspace v5</title>
    <style>
        :root {
            --wood-color: #e3c18d;
            --wood-dark: #c4a470;
            --tile-size: 60px;
            --cipher-green: #2e7d32;
            --cipher-red: #c62828;
            --plain-indigo: #303f9f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        #top-section {
            display: flex;
            width: 98%;
            max-width: 1400px;
            justify-content: center;
            margin-bottom: 50px;
            gap: 20px;
        }

        .area {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            min-height: 250px;
        }

        #cipher-grid-area {
            flex: 3; 
            min-width: 980px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        #substitution-key-area { 
            flex: 1; 
            min-width: 320px;
        }

        .tile-container {
            position: relative;
            height: 200px;
            width: 100%;
            perspective: 1000px;
        }

        .tile {
            position: absolute;
            width: var(--tile-size);
            height: var(--tile-size);
            background-color: var(--wood-color);
            border: 2px solid var(--wood-dark);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 24px;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.15);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), 
                        left 0.8s cubic-bezier(0.4, 0, 0.2, 1), 
                        top 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .tile-content {
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .plain-side {
            transform: rotateY(180deg);
            color: var(--plain-indigo);
        }

        .tile.flipped { transform: rotateY(180deg); }
        .tile.swapping { scale: 1.1; z-index: 10; box-shadow: 0 15px 30px rgba(0,0,0,0.2); }

        .char-letter { color: var(--cipher-green); }
        .char-symbol { color: var(--cipher-red); }

        table { border-collapse: collapse; margin: 20px auto; }
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
            font-weight: bold;
            width: 35px;
        }
        .highlight-key { background-color: #fff176; outline: 3px solid #fbc02d; }

        #controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            background: #2c3e50;
            padding: 25px;
            border-radius: 12px;
        }
        button {
            padding: 10px 15px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            color: white;
        }
        button:active { transform: scale(0.98); }
        input { padding: 10px; border-radius: 6px; border: none; text-align: center; width: 140px; }

        .col-label {
            position: absolute;
            font-weight: 900;
            color: #7f8c8d;
            font-size: 18px;
            transition: all 0.6s ease;
        }
    </style>
</head>
<body>

<div id="top-section">
    <div id="cipher-grid-area" class="area">
        <h3 style="margin-top: 0; color: #34495e;">Cipher Grid</h3>
        <div id="col-labels-container" style="position: relative; height: 35px; width: 100%;"></div>
        <div id="grid-container" class="tile-container"></div>
    </div>

    <div id="substitution-key-area" class="area">
        <h3 style="margin-top: 0; color: #34495e;">Substitution Key</h3>
        <table id="key-table">
            <tr id="cipher-row"></tr>
            <tr id="plain-row"></tr>
        </table>
    </div>
</div>

<div id="controls">
    <button style="background: #27ae60;" onclick="makeGrid()">Make Grid</button>
    <button style="background: #e67e22;" onclick="resetAll()">Reset</button>
    <div style="display: flex; gap: 5px; align-items: center;">
        <input type="text" id="permute-input" value="7,6,5,4,3,2,1">
        <button style="background: #2980b9;" onclick="permuteColumns()">Permute Columns</button>
    </div>
    <button style="background: #34495e;" onclick="resetColumns()">Reset Columns</button>
    <button style="background: #8e44ad;" onclick="decrypt()">Decrypt</button>
    <button style="background: #7f8c8d;" onclick="clearDecryption()">Clear Decryption</button>
</div>

<script>
    const cipherText = "AEN⊕8K8M8↓NAM".split("");
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const uniqueChars = [...new Set(cipherText)];
    
    // uniqueChars.forEach(char => {
    //     mapping[char] = alphabet[Math.floor(Math.random() * alphabet.length)];
    // });
    const mapping = {
        "A":"I",
        "E":"V",
        "N":"M",
        "⊕":"A",
        "8":"R",
        "K":"N",
        "M":"L",
        "↓":"E"
    };

    const container = document.getElementById('grid-container');
    const labelContainer = document.getElementById('col-labels-container');
    let tiles = [];
    let extraTile = null;
    let colMap = [0, 1, 2, 3, 4, 5, 6]; 

    function isLetter(char) { return /[A-Z]/.test(char); }

    function init() {
        container.innerHTML = '';
        tiles = [];
        cipherText.forEach((char, i) => {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.innerHTML = `
                <div class="tile-content cipher-side ${isLetter(char) ? 'char-letter' : 'char-symbol'}">${char}</div>
                <div class="tile-content plain-side">${mapping[char]}</div>
            `;
            tile.dataset.cipher = char;
            container.appendChild(tile);
            tiles.push(tile);
        });

        const cRow = document.getElementById('cipher-row');
        const pRow = document.getElementById('plain-row');
        cRow.innerHTML = ''; pRow.innerHTML = '';
        uniqueChars.forEach(char => {
            const tdC = document.createElement('td');
            tdC.className = isLetter(char) ? 'char-letter' : 'char-symbol';
            tdC.textContent = char;
            tdC.id = `key-cell-${char}`;
            cRow.appendChild(tdC);
            const tdP = document.createElement('td');
            tdP.textContent = mapping[char];
            pRow.appendChild(tdP);
        });
        positionLinear();
    }

    function positionLinear() {
        const spacing = 70;
        const offset = (13 - 1) * spacing / 2;
        tiles.forEach((t, i) => {
            t.style.left = `calc(50% - ${offset}px + ${i * spacing}px - 30px)`;
            t.style.top = '100px'; // Lower starting position to avoid overlap with Row 1 target
        });
    }

    async function makeGrid() {
        const spacing = 70;
        const offset = (7 - 1) * spacing / 2;
        
        // 1) Move the first 6 tiles to the first row
        for (let i = 0; i < 6; i++) {
            tiles[i].style.left = `calc(50% - ${offset}px + ${i * spacing}px - 30px)`;
            tiles[i].style.top = '0px';
            await new Promise(r => setTimeout(r, 150));
        }

        // Pause momentarily after forming the first row
        await new Promise(r => setTimeout(r, 600));

        // 2) Move the last 7 tiles to the second row (Reversed order from original)
        const lastSevenIndices = [12, 11, 10, 9, 8, 7, 6];
        for (let j = 0; j < lastSevenIndices.length; j++) {
            const originalIdx = lastSevenIndices[j];
            tiles[originalIdx].style.left = `calc(50% - ${offset}px + ${j * spacing}px - 30px)`;
            tiles[originalIdx].style.top = `${spacing}px`;
            await new Promise(r => setTimeout(r, 150));
        }

        // 3) Fill gap with extra tile
        if (!extraTile) {
            extraTile = document.createElement('div');
            extraTile.className = 'tile';
            extraTile.innerHTML = '<div class="tile-content char-letter" style="text-decoration: underline;">_</div>';
            extraTile.style.top = '0px';
            extraTile.style.left = '200%'; 
            container.appendChild(extraTile);
            setTimeout(() => {
                extraTile.style.left = `calc(50% - ${offset}px + 6 * ${spacing}px - 30px)`;
            }, 100);
        }

        // Render column labels
        labelContainer.innerHTML = '';
        for (let i = 1; i <= 7; i++) {
            const l = document.createElement('div');
            l.className = 'col-label';
            l.textContent = i;
            l.style.left = `calc(50% - ${offset}px + ${(i-1) * spacing}px - 5px)`;
            l.style.opacity = '0';
            labelContainer.appendChild(l);
            setTimeout(() => l.style.opacity = '1', i * 50);
        }
        colMap = [0, 1, 2, 3, 4, 5, 6];
    }

    async function permuteColumns() {
        const input = document.getElementById('permute-input').value;
        const targetOrder = input.split(',').map(n => parseInt(n.trim()) - 1);
        if (targetOrder.length !== 7) return;

        let currentOrder = [...colMap];
        for (let i = 0; i < targetOrder.length; i++) {
            if (currentOrder[i] !== targetOrder[i]) {
                const valToFind = targetOrder[i];
                const currentIndex = currentOrder.indexOf(valToFind);
                await animateSwap(currentOrder, i, currentIndex);
                [currentOrder[i], currentOrder[currentIndex]] = [currentOrder[currentIndex], currentOrder[i]];
            }
        }
        colMap = currentOrder;
    }

    async function animateSwap(order, posA, posB) {
        const spacing = 70;
        const offset = (7 - 1) * spacing / 2;
        const labels = document.querySelectorAll('.col-label');
        
        const origIdxA = order[posA];
        const origIdxB = order[posB];

        const getColTiles = (idx) => {
            let res = [];
            if (idx < 6) res.push(tiles[idx]); else res.push(extraTile);
            res.push(tiles[12 - idx]);
            return res;
        };

        const tilesA = getColTiles(origIdxA);
        const tilesB = getColTiles(origIdxB);

        [...tilesA, ...tilesB].forEach(t => {
            t.classList.add('swapping');
            t.style.zIndex = "100";
        });

        tilesA.forEach(t => t.style.left = `calc(50% - ${offset}px + ${posB * spacing}px - 30px)`);
        tilesB.forEach(t => t.style.left = `calc(50% - ${offset}px + ${posA * spacing}px - 30px)`);
        
        labels[origIdxA].style.left = `calc(50% - ${offset}px + ${posB * spacing}px - 5px)`;
        labels[origIdxB].style.left = `calc(50% - ${offset}px + ${posA * spacing}px - 5px)`;

        await new Promise(r => setTimeout(r, 800));
        [...tilesA, ...tilesB].forEach(t => {
            t.classList.remove('swapping');
            t.style.zIndex = "1";
        });
    }

    function resetAll() {
        if(extraTile) { extraTile.remove(); extraTile = null; }
        labelContainer.innerHTML = '';
        clearDecryption();
        positionLinear();
        colMap = [0, 1, 2, 3, 4, 5, 6];
    }

    function resetColumns() {
        const spacing = 70;
        const offset = (7 - 1) * spacing / 2;
        const labels = document.querySelectorAll('.col-label');
        [0,1,2,3,4,5,6].forEach(i => {
            let top = (i < 6) ? tiles[i] : extraTile;
            let bottom = tiles[12 - i];
            if(top) top.style.left = `calc(50% - ${offset}px + ${i * spacing}px - 30px)`;
            if(bottom) bottom.style.left = `calc(50% - ${offset}px + ${i * spacing}px - 30px)`;
            if(labels[i]) labels[i].style.left = `calc(50% - ${offset}px + ${i * spacing}px - 5px)`;
        });
        colMap = [0, 1, 2, 3, 4, 5, 6];
    }

    async function decrypt() {
        for (let char of uniqueChars) {
            const cell = document.getElementById(`key-cell-${char}`);
            cell.classList.add('highlight-key');
            await new Promise(r => setTimeout(r, 400));
            tiles.forEach(t => { if (t.dataset.cipher === char) t.classList.add('flipped'); });
            await new Promise(r => setTimeout(r, 300));
            cell.classList.remove('highlight-key');
        }
    }

    function clearDecryption() {
        tiles.forEach(t => t.classList.remove('flipped'));
    }

    init();
</script>
</body>
</html>
