<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Texas Sharpshooter Animation - 3D</title>
<style>
    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #1a252f;
        font-family: sans-serif;
        margin: 0;
        perspective: 1500px; /* Gives the whole scene 3D space */
    }

    #controls {
        margin-bottom: 30px;
        z-index: 10;
    }

    #go-btn {
        padding: 12px 30px;
        font-size: 18px;
        font-weight: bold;
        color: white;
        background-color: #e74c3c;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        transition: background-color 0.2s, transform 0.1s;
    }

    #go-btn:active {
        transform: translateY(2px);
        box-shadow: 0 2px 5px rgba(0,0,0,0.4);
    }

    #go-btn:disabled {
        background-color: #7f8c8d;
        cursor: not-allowed;
    }

    /* 16:9 Display Area with 3D Transforms */
    #scene-container {
        position: relative;
        width: 800px;
        height: 450px; 
        /* Subtle radial gradient to look like a surface */
        background: radial-gradient(circle at center, #ecf0f1 0%, #bdc3c7 100%);
        box-shadow: inset 0 0 30px rgba(0,0,0,0.1), 15px 25px 50px rgba(0,0,0,0.6);
        overflow: hidden;
        border-radius: 8px;
        border: 2px solid #95a5a6;
        /* 3D rotation to give depth */
        transform: rotateX(6deg) rotateY(-4deg);
        transform-style: preserve-3d;
    }

    /* SVG Arrow styling with drop shadow for depth */
    .arrow {
        position: absolute;
        width: 80px;
        height: 14px;
        background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 14"><line x1="0" y1="7" x2="65" y2="7" stroke="%232c3e50" stroke-width="3"/><polygon points="65,0 80,7 65,14" fill="%232c3e50"/><path d="M 0,0 L 15,7 L 0,14 Z" fill="%23c0392b"/></svg>') no-repeat center center;
        background-size: contain;
        transform-origin: 80px 7px; /* Pivot around the tip of the arrow */
        opacity: 0;
        z-index: 2;
        /* 3D shadow effect */
        filter: drop-shadow(4px 8px 4px rgba(0,0,0,0.5));
    }

    #main-arrow {
        left: -100px;
        top: 218px; 
        opacity: 1;
        /* Transition is applied via JS so we can disable it during reset */
    }

    .random-arrow {
        transition: opacity 1.5s ease-in;
    }

    /* Target Drawing Area */
    #target-svg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
    }

    .target-circle {
        fill: none;
        stroke: #c0392b;
        stroke-width: 5;
        /* Gives the drawn marker lines a slight texture/blend */
        mix-blend-mode: multiply; 
    }

    /* Pencil Icon with precise alignment */
    #pencil {
        position: absolute;
        width: 42px;
        height: 42px;
        background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M7.127 22.562l-7.127 1.438 1.438-7.128 5.689 5.69zm1.414-1.414l11.228-11.225-5.69-5.692-11.227 11.227 5.689 5.69zm9.768-21.148l-2.816 2.817 5.691 5.691 2.816-2.819-5.691-5.689z" fill="%23f39c12"/></svg>') no-repeat;
        opacity: 0;
        left: 0;
        top: 0;
        /* Translates exactly 100% up so the bottom-left tip is flawlessly aligned to the px/py coordinates */
        transform: translate(0, -42px); 
        transition: opacity 0.3s;
        z-index: 3;
        filter: drop-shadow(6px 10px 5px rgba(0,0,0,0.6));
    }

    @keyframes thwack {
        0% { transform: scaleX(1); }
        30% { transform: scaleX(0.85) rotate(-2deg); }
        60% { transform: scaleX(1.05) rotate(2deg); }
        100% { transform: scaleX(1) rotate(0deg); }
    }

    .hit-animation {
        animation: thwack 0.2s ease-out;
    }
</style>
</head>
<body>

<div id="controls">
    <button id="go-btn">Go</button>
</div>

<div id="scene-container">
    <svg id="target-svg">
        <circle class="target-circle" id="circle1" cx="400" cy="225" r="25" transform="rotate(-90 400 225)" />
        <circle class="target-circle" id="circle2" cx="400" cy="225" r="55" transform="rotate(-90 400 225)" />
        <circle class="target-circle" id="circle3" cx="400" cy="225" r="85" transform="rotate(-90 400 225)" />
        <circle class="target-circle" id="circle4" cx="400" cy="225" r="115" transform="rotate(-90 400 225)" />
    </svg>
    <div id="random-arrows-container"></div>
    <div id="main-arrow" class="arrow"></div>
    <div id="pencil"></div>
</div>

<script>
    const btn = document.getElementById('go-btn');
    const mainArrow = document.getElementById('main-arrow');
    const pencil = document.getElementById('pencil');
    const randomArrowsContainer = document.getElementById('random-arrows-container');
    const circles = document.querySelectorAll('.target-circle');
    
    // Generates the "missed" background arrows 
    function generateRandomArrows() {
        randomArrowsContainer.innerHTML = '';
        for (let i = 0; i < 45; i++) {
            let arr = document.createElement('div');
            arr.className = 'arrow random-arrow';
            
            let x, y;
            // Place randomly, avoiding the exact center target
            do {
                x = Math.random() * 700;
                y = Math.random() * 420;
            } while (Math.abs(x - 320) < 160 && Math.abs(y - 225) < 160); 
            
            let angle = (Math.random() * 70) - 35; 
            
            arr.style.left = x + 'px';
            arr.style.top = y + 'px';
            arr.style.transform = `rotate(${angle}deg)`;
            randomArrowsContainer.appendChild(arr);
        }
    }

    // Explicitly hide the target circles mathematically
    function eraseTarget() {
        circles.forEach(c => {
            const length = c.getTotalLength();
            c.style.strokeDasharray = length;
            c.style.strokeDashoffset = length;
        });
    }

    // Initial setup
    generateRandomArrows();
    eraseTarget();

    btn.addEventListener('click', () => {
        btn.disabled = true;
        btn.textContent = "Watching...";
        
        // --- 1. RESET PHASE ---
        // Snap the main arrow back immediately without a transition
        mainArrow.style.transition = 'none';
        mainArrow.style.left = '-100px';
        mainArrow.classList.remove('hit-animation');
        
        // Ensure the rings are completely erased
        eraseTarget();
        
        // Wipe old background arrows and prep new hidden ones
        generateRandomArrows();

        // Force browser reflow to apply the snap-back before adding the flight transition
        void mainArrow.offsetWidth; 

        // --- 2. ANIMATION PHASE ---
        // Restore transition and fire the arrow
        mainArrow.style.transition = 'left 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
        mainArrow.style.left = '320px'; // 400 (center) - 80 (arrow width)
        
        setTimeout(() => {
            // Arrow hits
            mainArrow.classList.add('hit-animation');

            // Fade in pencil
            pencil.style.opacity = 1;
            
            let delay = 300;
            
            // Draw each concentric circle
            circles.forEach((circle, index) => {
                setTimeout(() => {
                    let length = circle.getTotalLength();
                    let start = null;
                    const duration = 600; 
                    
                    function step(timestamp) {
                        if (!start) start = timestamp;
                        let progress = timestamp - start;
                        let drawPct = Math.min(progress / duration, 1);
                        
                        // Trace the SVG stroke
                        circle.style.strokeDashoffset = length * (1 - drawPct);
                        
                        // Calculate perfectly synced mathematical position
                        // The SVG was rotated -90deg, so it starts at the top (-PI/2) and goes clockwise
                        let angle = (drawPct * 2 * Math.PI) - (Math.PI / 2);
                        let r = parseInt(circle.getAttribute('r'));
                        let cx = parseInt(circle.getAttribute('cx'));
                        let cy = parseInt(circle.getAttribute('cy'));
                        
                        let px = cx + r * Math.cos(angle);
                        let py = cy + r * Math.sin(angle);
                        
                        // Apply position to pencil (CSS transform aligns the tip automatically)
                        pencil.style.left = px + 'px';
                        pencil.style.top = py + 'px';
                        
                        if (progress < duration) {
                            window.requestAnimationFrame(step);
                        } else if (index === circles.length - 1) {
                            // Finished the final circle
                            setTimeout(() => {
                                pencil.style.opacity = 0;
                                
                                // Reveal all random arrows permanently
                                setTimeout(() => {
                                    document.querySelectorAll('.random-arrow').forEach(arr => {
                                        arr.style.opacity = 1; 
                                    });
                                    
                                    // Reactivate the button
                                    setTimeout(() => {
                                        btn.disabled = false;
                                        btn.textContent = "Reset & Go Again";
                                    }, 1800);

                                }, 1000); // Dramatic pause
                            }, 500); 
                        }
                    }
                    window.requestAnimationFrame(step);
                }, delay);
                delay += 750;
            });
        }, 400); 
    });
</script>
</body>
</html>
