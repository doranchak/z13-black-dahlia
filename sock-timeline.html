 "title": "Chapter 6: A Mind For Murder"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@JohnWSmithATX\u00a0 Sure. My understanding is that Margolis used at least two different names in 1969, including Marvin Merrill and M. Skip Merrill (also referred to as Skip Merrill). The latter name is associated with an address that reappears in the late 1970s. His second documented presence in the Bay Area appears to coincide with the Zodiac\u2019s reemergence around spring in 1978 just before his divorce, during which additional letters were mailed\u2014one of which was ultimately attributed to Detective David Toschi, leading to his reassignment from homicide to pawn shop detail. He was later cleared of those allegations according to records. When questioned, family members were unable to account for Margolis\u2019s specific whereabouts during the relevant timeframe surrounding Zodiac\u2019s attacks and letters. These issues, among others, will be addressed by Connelly, Baber, and the experts in the next two episodes, presented as roundtable discussions.\n\nRegarding the use of \u201cSkipton\u201d as a middle name and when, his family have reportedly stated that it originated in his childhood years. The broader point being illustrated is that over the course of his life, he appears to have used numerous aliases estimated at around fourteen or fifteen I believe, while relocating frequently when doing so. If a name change was initially motivated by antisemitism in the 1950\u2019s, the continued pattern of name changes throughout his life must come into question.", "webpage_url": "https://www.youtube.com/watch?v=OlKTEFe-obc", "title": "Chapter 6: A Mind For Murder"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@JohnWSmithATX\u00a0 I have previously been clear about who I am and the nature of my work. I am not Baber, and at no point did I state or suggest that there is no direct evidence; on the contrary, such evidence clearly exists based on the podcast, documents, and experts. I am unclear how that interpretation was drawn from my comment.\n\nThat said, knowing the respective cities where one\u2019s parents were located is not unusual. In my own case, I was aware of both of my parents\u2019 locations despite their separation and lack of contact, so I would consider that point a matter of reasonable variance rather than a definitive inconsistency or excuse to eliminate a suspect with ties to the cases.", "webpage_url": "https://www.youtube.com/watch?v=OlKTEFe-obc", "title": "Chapter 6: A Mind For Murder"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u2060\u00a0@EdEdwardsCiphers\u00a0 Believe whatever you wish; at this point, it carries little weight. You appear unwilling to consider perspectives other than your own, regardless of the source.", "webpage_url": "https://www.youtube.com/watch?v=OlKTEFe-obc", "title": "Chapter 6: A Mind For Murder"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@JohnWSmithATX\u00a0 I have defended Baber since we had the opportunity to speak directly. I believe it is far more productive to engage someone openly, ask questions, and then conduct independent research to either substantiate or refute any claims. I did exactly that and concluded that much of the criticism directed at him stems from his being different rather than from factual deficiencies.\n\nAttacking an individual without first making a genuine effort to understand the circumstances is the real issue here\u2014not Baber, nor those who support his work. I am not interested in debating where he attended school or the actions of his relatives. Anyone making such claims should conduct their own research and present any information contradicting his claims,, rather than relying on accusations or mischaracterizations. That\u2019s all I have say on this.", "webpage_url": "https://www.youtube.com/watch?v=OlKTEFe-obc", "title": "Chapter 6: A Mind For Murder"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "The transcript was provided to investigators by his son, who had retained it in storage since his father\u2019s death in 1993. Absent the highly implausible scenario that Margolis stole and stored another USC medical student\u2019s records for 46 years, that also served in the Navy, the document is his.", "webpage_url": "https://www.youtube.com/watch?v=OlKTEFe-obc", "title": "Chapter 6: A Mind For Murder"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@TM-ew1ig\u00a0 The transcript in question was obtained by investigators from Marvin Margolis\u2019s son, who provided it under the belief that it belonged to his father. Whether Margolis used a fictitious middle name, added handwritten annotations, or appropriated another student\u2019s transcript entirely is immaterial. The underlying point being advanced is that the individual demonstrated a pattern of manipulation and dishonesty throughout his life.", "webpage_url": "https://www.youtube.com/watch?v=OlKTEFe-obc", "title": "Chapter 6: A Mind For Murder"}, {"author": "@Hummingbirdshum", "timestamp": 1770422400, "text": "\u00a0@JackDoeland\u00a0 Marvin Margolis appears to have obtained another students USC transcript somehow to possibly use at a later date for potential employment? He then kept it within his personal stuff it sounds.", "webpage_url": "https://www.youtube.com/watch?v=OlKTEFe-obc", "title": "Chapter 6: A Mind For Murder"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "Correct in substance, but inaccurate in detail. According to his family, the name was then given after birth.", "webpage_url": "https://www.youtube.com/watch?v=OlKTEFe-obc", "title": "Chapter 6: A Mind For Murder"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "Alex from Florida is Alex Brian born in OHIO and brought up in Florida who never attended school in OHIO. Copy editor turned box communicator Larry Harnisch made up that claim about Baber in a fit of rage. \n\nShame on YOU for not doing your due diligence.", "webpage_url": "https://www.youtube.com/watch?v=OlKTEFe-obc", "title": "Chapter 6: A Mind For Murder"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@Flora.Australia\u00a0 And you\u2019re entitled to believe whatever you choose, but it doesn\u2019t change the fact the Larry Harnisch\u2019s statement about Baber is fabricated. He never attended school in OHIO at anytime.", "webpage_url": "https://www.youtube.com/watch?v=OlKTEFe-obc", "title": "Chapter 6: A Mind For Murder"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@Imnottheborough\u00a0 Again you are wrong. When or where has Baber ever said his uncle was a serial killer? Please direct me to your source. His grandfather was the suspected serial offender, per his  interviews; his uncle was the convicted murderer. Every single claim you make further exposes your personal fixation on this guy, rather than any meaningful challenge to his actual work on the cases. You repeat the same points endlessly, obsess over his media exposure which continues to grow as far as I can see, and come off less as a credible critic and more as someone resentful of his success \u2014 while stalking his every move. I recommend readers assess this hater\u2019s credibility by starting with his comment history. No red flags there\u2026\n\nTake care. I genuinely hope you get the help you so clearly need.", "webpage_url": "https://www.youtube.com/watch?v=OlKTEFe-obc", "title": "Chapter 6: A Mind For Murder"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@Imnottheborough\u00a0Seriously, mate? Seek some professional help.", "webpage_url": "https://www.youtube.com/watch?v=OlKTEFe-obc", "title": "Chapter 6: A Mind For Murder"}, {"author": "@JackDoeland", "timestamp": 1775491200, "text": "Ross Geraci running his mouth again, making up more \ud83d\udca9 lol\n\nCalling Baber a grifter from behind a clicks-and-likes Zodiac group is rich, mate. He\u2019s out there attempting to help families, while you\u2019re stuck obsessing over him and chasing attention.", "webpage_url": "https://www.youtube.com/watch?v=971Edz3PfSo", "title": "Is Alex Baber a legitimate crime investigator? Or is he taking advantage of grieving families?"}, {"author": "@JackDoeland", "timestamp": 1775491200, "text": "\u00a0@planetxfilm\u00a0 I\u2019ve pulled his background when I interviewed him. You\u2019re full of \ud83d\udca9, Ross. Like your claim that Baber said he had Stine\u2019s shirt?!? What he said is there was evidence collected and recorded by the FBI at another crime scene that matches the description of the missing piece of shirt. But what do you care, right? You just make up your own stories anyways, mate.", "webpage_url": "https://www.youtube.com/watch?v=971Edz3PfSo", "title": "Is Alex Baber a legitimate crime investigator? Or is he taking advantage of grieving families?"}, {"author": "@JackDoeland", "timestamp": 1775491200, "text": "\u00a0@planetxfilm\u00a0His is supported by documents and experts. What do you got? A few likes on YouTube? lol\n\nIgnorance is bliss, mate \ud83d\udc4d\ud83c\udffb", "webpage_url": "https://www.youtube.com/watch?v=971Edz3PfSo", "title": "Is Alex Baber a legitimate crime investigator? Or is he taking advantage of grieving families?"}, {"author": "@JackDoeland", "timestamp": 1767744000, "text": "Fueling fabrications shows your ignorance.", "webpage_url": "https://www.youtube.com/watch?v=971Edz3PfSo", "title": "Is Alex Baber a legitimate crime investigator? Or is he taking advantage of grieving families?"}, {"author": "@JackDoeland", "timestamp": 1751846400, "text": "It is clear that a small group of individuals is actively working to undermine this man\u2019s credibility. But a thorough review of his record demonstrates that his work has been consistently dedicated to pursuing justice for victims and supporting grieving families\u2014without exception. Every inquiry reflects that commitment. There are no formal complaints or credible allegations against him, aside from the claims presented here, which appear to stem from a targeted smear campaign. In contrast, he has received positive feedback and testimonials from professionals and those he has assisted, this is easily verifiable.\n\nImportantly, I personally reached out to verify whether he charges families or not. The answer was definitive: he has never billed a single dollar to any victim\u2019s family in any case. He spoke respectfully and was open to questions. At no point did he criticize others. Instead, he simply said, \u201cLet them say or claim whatever they want about me, my work speaks for itself.\u201d He also made it clear that no one involved in producing this video reached out to him for comment or to question these claims beforehand.\n\nIt is both troubling and deeply concerning that social media enables individuals to circulate baseless accusations without any form of accountability or due process. Anyone can be accused of anything, dodging legal ramifications by expressing their claims as \u201copinion,\u201d and the responsibility unjustly falls on the accused to defend themselves. When serious claims such as abuse or financial exploitation are made without evidence or consequences, it not only damages reputations, it empowers the accusers and it undermines public trust. This is how people who set out to do meaningful, compassionate work are driven to disengage.", "webpage_url": "https://www.youtube.com/watch?v=971Edz3PfSo", "title": "Is Alex Baber a legitimate crime investigator? Or is he taking advantage of grieving families?"}, {"author": "@JackDoeland", "timestamp": 1743984000, "text": "Based on some lengthy research, it appears that these two guys Tim and Lance, who reached out to Javier, have an ongoing conflict with the Baber individual over his opinion during a 2022 Maura Murray interview. Apparently, they also made disparaging remarks about his autism and quirkiness. I\u2019ve discovered no complaints against him by clients, nor any accusations of any kind of abuse on the web outside of this video. Furthermore, the involvement of Levia is unclear, as he appears to be genuinely well-intentioned.\n\nAs others have noted, this situation seems to resemble a targeted campaign or \u201cwitch hunt\u201d rather than a genuine effort to expose fraud, in my opinion.", "webpage_url": "https://www.youtube.com/watch?v=971Edz3PfSo", "title": "Is Alex Baber a legitimate crime investigator? Or is he taking advantage of grieving families?"}, {"author": "@JackDoeland", "timestamp": 1712448000, "text": "This video raises several concerning points surrounding the creators. It begins by asserting that Mr. Baber is innocent of any crime, yet proceeds to align with two other individuals who seem intent on disparaging him based on personal grievances dating back to comments made in an interview two years ago. Disregarding the unfounded stereotypes about car salesmen and baseless assumptions about the existence of Mr. Baber's database, the video questions the account of the numerous letters he has reportedly received over the years, despite a plausible explanation provided in the original interview. For instance, the Ohio Writer case alone allegedly involves over a thousand letters, as per online sources. This number does not include the hundreds that are known throughout various other cases. The Zodiac Killer is a prime example with dozens and dozens of letters reportedly linked to him alone.\n\nThe insinuation that Mrs. Baber is in an abusive relationship solely based on the recorded interview regarding Maura Murray is preposterous. It seems as though they dislike him for having a different perspective on her case? If Maura was intoxicated and given a free pass from an officer, Is it outside the realm of logic to believe he would later be compelled to deny so after her disappearance received media coverage? Could even acknowledging the possibility cost him his employment?\n\nCriticizing Mr. Baber for his mannerisms during interviews, such as looking at his wife too closely while they are positioned side by side for filming, is both unfounded and comical. Is he expected to maintain a certain facial expression or distance every time he glances at her? The video attempts to link his perceived arrogance to potential abusive behavior, a leap in logic that lacks any substantial evidence. Moreover, the video fails to acknowledge that CCCOA explicitly states on their website that they are a consulting agency, NOT private detectives or investigators while their company\u2019s name is self-explanatory. \n\nYou also raise doubts about this individual's qualifications, despite his assertion of being an autodidact polymath who values non-traditional learning methods. Must one necessarily invest in formal education at an institution to acquire expertise in a particular field? Numerous examples readily come to mind that challenge this conventional belief.\n\nThen there are comments from supporters that also lack coherence. The sudden appearance of \u201cex-partners ex\u201d or acquaintances of Mr. Baber to denounce him raises questions about their motives? One individual, identified as a family member of a victim, can be witnessed supporting Mr. Baber's efforts on a television interview from the City Hall in Atlanta coupled with multiple FB posts thanking him and his wife. These contradict the negative portrayal presented in his comments. Similarly, accusations against a CCCOA team member, Baggett, as a fraud can be challenged given his numerous positive reviews and recognition as an expert witness by various judicial authorities on both the federal and state level over the past three decades.\n\nTurning to the figure of Vass, despite facing criticism, he has garnered support from families he has assisted in locating their missing loved ones, like Gina Renee Hall. His work, as evidenced by peer-reviewed publications in the International Journal of Forensic Science and Research, underscores his credibility and contributions to the field. Comparisons made in the video to George Soros seem misplaced. If anything, it has a Gestapo feel to it. \n\nIn conclusion, thorough vetting of sources and claims should be a fundamental aspect of any investigative piece or interview to ensure accuracy and fairness.", "webpage_url": "https://www.youtube.com/watch?v=971Edz3PfSo", "title": "Is Alex Baber a legitimate crime investigator? Or is he taking advantage of grieving families?"}, {"author": "@JackDoeland", "timestamp": 1767744000, "text": "\u00a0@EdEdwardsCiphers\u00a0Interviewed Baber who shared both texts and video including a tv segment of this Nick supporting him and his work.", "webpage_url": "https://www.youtube.com/watch?v=971Edz3PfSo", "title": "Is Alex Baber a legitimate crime investigator? Or is he taking advantage of grieving families?"}, {"author": "@JackDoeland", "timestamp": 1767744000, "text": "\u00a0@EdEdwardsCiphers\u00a0This group has posted lies about Baber for years. Their attempt to discredit him and his supporters is both pathetic and disgraceful.", "webpage_url": "https://www.youtube.com/watch?v=971Edz3PfSo", "title": "Is Alex Baber a legitimate crime investigator? Or is he taking advantage of grieving families?"}, {"author": "@Hummingbirdshum", "timestamp": 1767744000, "text": "Detective Roberts is widely regarded as the leading authority on Elizabeth\u2019s case. Baber\u2019s conclusions are supported by every credentialed expert who has reviewed the evidence. To suggest that all of these experts are mistaken, while a small group of internet detractors is correct, disregards the weight of informed analysis and established credibility. Ignorance must be bliss.", "webpage_url": "https://www.youtube.com/watch?v=3-ouW2KMb-I", "title": "Killer In The Code Podcast Episode 1 - Mitzi Roberts & The LAPD Working The Black Dahlia Case"}, {"author": "@sl7809", "timestamp": 1767744000, "text": "Your comment shows your ignorance of detective work. Margolis was identified as a suspect early on and questioned. This retired LAPD detective baby sat this case for 16 years and believes the evidence she has seen. Do you have access to the LAPD and SFPD files and know what is in there to back up your claim this theory is BS? Thought not. Go get your next covid booster.", "webpage_url": "https://www.youtube.com/watch?v=3-ouW2KMb-I", "title": "Killer In The Code Podcast Episode 1 - Mitzi Roberts & The LAPD Working The Black Dahlia Case"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@sl7809\u00a0Agreed. These are just haters who need something to complain about on the internet. The experts are solid here and you have someone like Harnisch acting as if he is on their level. It is humorous.", "webpage_url": "https://www.youtube.com/watch?v=3-ouW2KMb-I", "title": "Killer In The Code Podcast Episode 1 - Mitzi Roberts & The LAPD Working The Black Dahlia Case"}, {"author": "@markwhisenant6879", "timestamp": 1770422400, "text": "The Origin of the Date: During a famous 1969 televised appearance on the Jim Dunbar Show, a caller claiming to be the Zodiac spoke with attorney Melvin Belli. Later, Belli's housekeeper reported receiving a phone call from the \"Zodiac\" on January 14, 1970, in which the caller stated it was his birthday. I just figured out The Zodiac killers Birthday was Jan 14th when Marvin Margolis became the Zodiac at the Zodiac Motel killing Elizabeth Short and dumped her body on Jan 15 on lovers lane LA, CA.", "webpage_url": "https://www.youtube.com/watch?v=vuKYpKfae6c", "title": "Chapter 3: El Diablo"}, {"author": "@markwhisenant6879", "timestamp": 1770422400, "text": "Looks like Marvin Margolis/Marvin Merrill really was the Zodiac killer. I been studying this story for some time and the old stories too. This story and evidence is adding up, Great job in cracking it.", "webpage_url": "https://www.youtube.com/watch?v=vuKYpKfae6c", "title": "Chapter 3: El Diablo"}, {"author": "@SticksAandstonesBozo", "timestamp": 1767744000, "text": "I knew people would instantly shit on this without even knowing what it\u2019s about and I was right. But as a 40 year obsessed , daily internet zodiac researcher, I have zero doubt this is the guy. And it\u2019s funny cause two weeks ago I told my family the one thing I want before I die is to know who the zodiac is.", "webpage_url": "https://www.youtube.com/watch?v=vuKYpKfae6c", "title": "Chapter 3: El Diablo"}, {"author": "@SticksAandstonesBozo", "timestamp": 1770422400, "text": "\u00a0@Imnottheborough\u00a0Right so the detective that actively worked the case from the actual department for 35 years she also knows nothing huh. \ud83d\ude02 tell us more stupid.", "webpage_url": "https://www.youtube.com/watch?v=vuKYpKfae6c", "title": "Chapter 3: El Diablo"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@EdEdwardsCiphers\u00a0Margolis was initial dismissed in 1947 but the same two investigators (Finis Brown & Harry Hanson) testified under oath in the grand jury inquest files (you can access them through the Los Angeles Attorney\u2019s Office) that Marvin Margolis was still a good suspect three years after the fact.", "webpage_url": "https://www.youtube.com/watch?v=vuKYpKfae6c", "title": "Chapter 3: El Diablo"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@CathyGOdom\u00a0The other hater who should be brought up for stalking Baber. Do your research before appearing as ignorant as you are.", "webpage_url": "https://www.youtube.com/watch?v=vuKYpKfae6c", "title": "Chapter 3: El Diablo"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@nonameindicated4899\u00a0 Zodiac? We were discussing Margolis\u2019s medical background, in response to your assertion that his pre-medical training was irrelevant. You can\u2019t even stick to your own discussion topic!", "webpage_url": "https://www.youtube.com/watch?v=vuKYpKfae6c", "title": "Chapter 3: El Diablo"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@Imnottheborough\u00a0 It\u2019s evident that the criticism is coming from a very small group of individuals\u2014primarily those with personal opinions on the cases or some with financial investments like books or even clicks and likes rather than from anyone genuinely focused on the victims and their families.\n\nI\u2019ll ask again: do you actually understand the definition of \u201cgrifter,\u201d or are you using the term loosely because it sounds provocative? If Baber does not charge for his services, who exactly is he supposed to be grifting?\n\nAt this point, the continued fixation on him appears unnecessary and unproductive. It would be more constructive to stop stalking the poor guy and focus your efforts elsewhere constructive. You literally follow Baber around spreads rumors and b*tching like a middle schooler.", "webpage_url": "https://www.youtube.com/watch?v=vuKYpKfae6c", "title": "Chapter 3: El Diablo"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@CathyGOdom\u00a0You should do your due diligence before making ill comments. The documentation is available to view for any researcher out there.", "webpage_url": "https://www.youtube.com/watch?v=vuKYpKfae6c", "title": "Chapter 3: El Diablo"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@nonameindicated4899\u00a0It\u2019s not my job to produce anything. I did my own research based on the information provided in the release. You should do the same instead of believing what others say.", "webpage_url": "https://www.youtube.com/watch?v=vuKYpKfae6c", "title": "Chapter 3: El Diablo"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@CathyGOdom\u00a0The Stalker is here.", "webpage_url": "https://www.youtube.com/watch?v=ClilpZgaSH8", "title": "Killer In The Code Podcast - Episode 3 Excerpt"}, {"author": "@nillydilly-w5l", "timestamp": 1773705600, "text": "He proved Kane was not the guy he thought apparently, call or no call. His investigation turned in another direction and led to Margolis. That is not uncommon. I remember some guy that drove a cab in the Green River Murders being suspected and was even interviewed on tv before detectives cleared him and later identified Ridgeway. \ud83e\udd37\ud83c\udffb\u200d\u2642\ufe0f", "webpage_url": "https://www.youtube.com/watch?v=n2M27J5kqAw", "title": "Killer in the Code's Alex Baber & The Phone Call From Zodiac"}, {"author": "@nillydilly-w5l", "timestamp": 1773705600, "text": "\u00a0@Imnottheborough\u00a0Do you think investigators are never wrong? That the first suspect is always the right one? What about the Greenriver Killer and the taxi cab driver that was accused by the police and interviewed by the news? Years later it turned out to be Gary Ridgeway. You sound like an idiot when you post comments like that.", "webpage_url": "https://www.youtube.com/watch?v=n2M27J5kqAw", "title": "Killer in the Code's Alex Baber & The Phone Call From Zodiac"}, {"author": "@nillydilly-w5l", "timestamp": 1773705600, "text": "@I\u00a0@Imnottheborough\u00a0 baby boy\u2014deaf too? But you are trying so hard. The detectives from SFPD, LAPD, NAPA, and FBI are working Alex Baber\u2019s investigation. You could have read it in the press had you taken the time. Embarrassing, huh?", "webpage_url": "https://www.youtube.com/watch?v=n2M27J5kqAw", "title": "Killer in the Code's Alex Baber & The Phone Call From Zodiac"}, {"author": "@nillydilly-w5l", "timestamp": 1773705600, "text": "\u00a0@Imnottheborough\u00a0Well, that can be your own little secret!", "webpage_url": "https://www.youtube.com/watch?v=n2M27J5kqAw", "title": "Killer in the Code's Alex Baber & The Phone Call From Zodiac"}];
        const targetAuthors = ["@JackDoeland", "@Eidolon180", "@markwhisenant6879", "@SticksAandstonesBozo", "@emmgeevideo", "@a1investigations433", "@nillydilly-w5l", "@Hummingbirdshum", "@jackhawkwood3055", "@sl7809", "@MartianMan-ate1"];
        const authorColors = {"@JackDoeland": "#FF595E", "@Eidolon180": "#FFCA3A", "@markwhisenant6879": "#8AC926", "@SticksAandstonesBozo": "#1982C4", "@emmgeevideo": "#6A4C93", "@a1investigations433": "#E07A5F", "@nillydilly-w5l": "#3D405B", "@Hummingbirdshum": "#81B29A", "@jackhawkwood3055": "#F4A261", "@sl7809": "#E76F51", "@MartianMan-ate1": "#2A9D8F"};
        
        const groupedByMonth = {};
        
        commentsData.forEach(c => {
            const d = new Date(c.timestamp * 1000);
            const y = d.getFullYear();
            let m = d.getMonth() + 1;
            m = m < 10 ? '0' + m : m;
            const key = y + '-' + m;
            if (!groupedByMonth[key]) groupedByMonth[key] = [];
            groupedByMonth[key].push(c);
        });

        const months = Object.keys(groupedByMonth).sort();
        let currentMonthIndex = months.length > 0 ? months.length - 1 : 0;

        function renderMonth() {
            const container = document.getElementById('timelineContainer');
            container.innerHTML = '';
            document.getElementById('tooltip').style.display = 'none'; // reset tooltip on page turn
            
            if (months.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding: 20px;">No matching comments found for the target authors.</p>';
                document.getElementById('monthLabel').innerText = 'No Data';
                return;
            }
            
            const currentMonthKey = months[currentMonthIndex];
            const [year, month] = currentMonthKey.split('-');
            
            const dateObj = new Date(year, parseInt(month) - 1, 1);
            document.getElementById('monthLabel').innerText = dateObj.toLocaleString('default', { month: 'long', year: 'numeric' });
            
            const daysInMonth = new Date(year, parseInt(month), 0).getDate();
            const commentsInMonth = groupedByMonth[currentMonthKey];
            
            targetAuthors.forEach(author => {
                const lane = document.createElement('div');
                lane.className = 'lane';
                const color = authorColors[author] || '#ccc';
                lane.style.backgroundColor = color + '22';
                
                const label = document.createElement('div');
                label.className = 'lane-label';
                label.innerText = author;
                
                const track = document.createElement('div');
                track.className = 'timeline-track';
                
                for (let i = 1; i <= daysInMonth; i++) {
                    const grid = document.createElement('div');
                    grid.className = 'day-grid';
                    grid.style.left = ((i / daysInMonth) * 100) + '%';
                    track.appendChild(grid);
                }
                
                const authorComments = commentsInMonth.filter(c => c.author === author);
                const commentsByTime = {};
                
                authorComments.forEach(c => {
                    if (!commentsByTime[c.timestamp]) commentsByTime[c.timestamp] = [];
                    commentsByTime[c.timestamp].push(c);
                });
                
                Object.values(commentsByTime).forEach(group => {
                    const baseComment = group[0];
                    const d = new Date(baseComment.timestamp * 1000);
                    const day = d.getDate();
                    const hour = d.getHours();
                    const minute = d.getMinutes();
                    
                    const timeInMonth = (day - 1) + (hour / 24) + (minute / 1440);
                    const percent = (timeInMonth / daysInMonth) * 100;
                    
                    const marker = document.createElement('div');
                    marker.className = 'comment-marker';
                    if (group.length > 1) {
                        marker.classList.add('multi-comment-marker');
                    }
                    marker.style.left = percent + '%';
                    marker.style.backgroundColor = color;
                    
                    // CHANGED FROM mousemove TO click
                    marker.addEventListener('click', (e) => {
                        e.stopPropagation(); // Prevents the document click listener from immediately closing this
                        
                        const tooltip = document.getElementById('tooltip');
                        
                        // Build Header with an 'x' close button just in case
                        let html = `
                            <div class="tooltip-header">
                                <span class="close-btn" onclick="document.getElementById('tooltip').style.display='none'">&times;</span>
                                <strong>Date:</strong> ${d.toLocaleString()} <br/>
                                <strong>Author:</strong> ${baseComment.author} <br/>
                                <strong>Comments at this time:</strong> ${group.length}
                            </div>
                        `;
                        
                        // Build Content
                        group.forEach(c => {
                            html += `
                                <div class="comment-item">
                                    <strong>Video:</strong> ${c.title} <br/>
                                    <strong>URL:</strong> <a href="${c.webpage_url}" target="_blank">Link to Video</a> <br/>
                                    <em>${c.text.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</em>
                                </div>
                            `;
                        });
                        
                        tooltip.innerHTML = html;
                        tooltip.style.display = 'block';
                        
                        // Positioning
                        let leftPos = e.pageX + 15;
                        let topPos = e.pageY + 15;
                        
                        if (leftPos + 340 > window.innerWidth) leftPos = e.pageX - 340;
                        if (topPos + tooltip.offsetHeight > window.innerHeight) topPos = e.pageY - tooltip.offsetHeight - 15;
                        
                        tooltip.style.left = leftPos + 'px';
                        tooltip.style.top = topPos + 'px';
                    });
                    
                    track.appendChild(marker);
                });
                
                lane.appendChild(label);
                lane.appendChild(track);
                container.appendChild(lane);
            });
            
            document.getElementById('prevBtn').disabled = currentMonthIndex === 0;
            document.getElementById('nextBtn').disabled = currentMonthIndex === months.length - 1;
        }

        // GLOBAL CLICK LISTENER: Close tooltip if you click outside of it
        document.addEventListener('click', (e) => {
            const tooltip = document.getElementById('tooltip');
            // If the tooltip is visible AND the user clicked on something that is NOT inside the tooltip
            if (tooltip.style.display === 'block' && !tooltip.contains(e.target)) {
                tooltip.style.display = 'none';
            }
        });

        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentMonthIndex > 0) { currentMonthIndex--; renderMonth(); }
        });
        document.getElementById('nextBtn').addEventListener('click', () => {
            if (currentMonthIndex < months.length - 1) { currentMonthIndex++; renderMonth(); }
        });

        window.addEventListener('resize', () => {
            document.getElementById('tooltip').style.display = 'none';
        });

        renderMonth();
    </script>
</body>
</html>
