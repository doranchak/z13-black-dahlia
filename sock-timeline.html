apter 10: New Age Sherlock"}, {"author": "@nillydilly-w5l", "timestamp": 1773705600, "text": "Such an inspiring story. \ud83d\ude4c\ud83c\udffb\ud83d\udc40", "webpage_url": "https://www.youtube.com/watch?v=IMAUL6BKycE", "title": "Chapter 10: New Age Sherlock"}, {"author": "@Hummingbirdshum", "timestamp": 1772841600, "text": "Now you are telling him how to brand his own company? Seriously? What is wrong with people? Jealousy is shameful.", "webpage_url": "https://www.youtube.com/watch?v=IMAUL6BKycE", "title": "Chapter 10: New Age Sherlock"}, {"author": "@Hummingbirdshum", "timestamp": 1772841600, "text": "\u00a0@EdEdwardsCiphers\u00a0Excuse me? You don\u2019t know me!", "webpage_url": "https://www.youtube.com/watch?v=IMAUL6BKycE", "title": "Chapter 10: New Age Sherlock"}, {"author": "@nillydilly-w5l", "timestamp": 1773705600, "text": "I hope more are coming too. I\u2019m fascinated with what they have been able to accomplish in these cases. Great work!", "webpage_url": "https://www.youtube.com/watch?v=IMAUL6BKycE", "title": "Chapter 10: New Age Sherlock"}, {"author": "@JackDoeland", "timestamp": 1772841600, "text": "The small, recurring group of critics continues to repeat the same accusations, frequently by presenting selective interpretations of facts or misrepresenting statements in an apparent effort to question the guys credibility. Many of these criticisms appear to disregard the broader context of the work presented and the experts support. Increasingly, such negative commentary is finally being met with greater skepticism or simply ignored by the general audience. It\u2019s grown old.\nThat said, Baber\u2019s research concerning individuals such as Klein in relation to the Zodiac case and Margolis in connection with the Black Dahlia investigation builds upon established suspects that existed well before his involvement. The theory has been out for 20 years originally presented by a former LA detective, not Baber. His exploration of a possible link between the tle": "Chapter 10: New Age Sherlock"}, {"author": "@nillydilly-w5l", "timestamp": 1773705600, "text": "That\u2019s clear to me. The Baber Haters are just going to have to deal \ud83e\udd37\ud83c\udffb\u200d\u2642\ufe0f.", "webpage_url": "https://www.youtube.com/watch?v=IMAUL6BKycE", "title": "Chapter 10: New Age Sherlock"}, {"author": "@JackDoeland", "timestamp": 1772841600, "text": "\u2060\u00a0@trashlie\u00a0If they feel there is enough evidence to move the case forward and experts support their findings, why would they not? How law enforcement proceeds is out of his hands. \n\nDo you actually listen to the podcast or just see a new episode and start mindlessly typing, regurgitating the same nonsense? \n\nAnd allow me to add, the sketch wasn\u2019t hanging in some Elizabeth\u2019s house?? It was discovered in his son\u2019s residence. The other Elizabeth reportedly looks nothing like the sketch and unless you can miraculously explain away the wounds to the abdomen and slices to the mouth, you are looking a bit silly.\n\nHave a great day, mate.", "webpage_url": "https://www.youtube.com/watch?v=IMAUL6BKycE", "title": "Chapter 10: New Age Sherlock"}, {"author": "@JackDoeland", "timestamp": 1772841600, "text": "\u2060\u200b\u2060\u00a0@Cragle-Z\u00a0You are that desperate for attention? The son wasn\u2019t with his partner Liz in 1992. The second drawing was added after Baber filmed and photoed the Elizabeth sketch created by Margolis if you compare the images. Liz wasn\u2019t wounded in her sketch with the son either, was she. Try listening to the detectives in the podcast and cease the passive aggressive behavior. Do you believe you know more than them? And the experts these guys have approached for an opinion? Do you honestly? If so, I do feel for you. Ignorance is bliss except you know better and can\u2019t use that as an excuse.  Later, MATE!", "webpage_url": "https://www.youtube.com/watch?v=IMAUL6BKycE", "title": "Chapter 10: New Age Sherlock"}, {"author": "@JackDoeland", "timestamp": 1772841600, "text": "\u00a0@trashlie\u00a0 Once again, conclusions are being drawn without a thorough review of the historical record. The potential linkage between the Oakland County Child Murders and the Atlanta Child Murders was referenced by John Douglas in his 1981 behavioral profile\u2014not by Baber. He simple revisited it. Douglas later adjusted his assessment when Wayne Williams emerged as a suspect and institutional pressure mounted to resolve the case.\n\nI would encourage a careful review of all documented materials before presenting personal assumptions as established fact\u2014again. It\u2019s not worth the effort to continuously correct you,Trashliar. You act as if you are in the know yet again you have no idea what you are talking about.", "webpage_url": "https://www.youtube.com/watch?v=IMAUL6BKycE", "title": "Chapter 10: New Age Sherlock"}, {"author": "@JackDoeland", "timestamp": 1772841600, "text": "Edith Bernstein was her name. Passed in 1992, a year before Marvin. There was reportedly abuse issues according to the Daily Mail interview with the family. The second wife, Donna, had him arrested for threatening the life of his teenage step daughter. Donna held him at knife point until the police arrived.", "webpage_url": "https://www.youtube.com/watch?v=IMAUL6BKycE", "title": "Chapter 10: New Age Sherlock"}, {"author": "@JackDoeland", "timestamp": 1772841600, "text": "\u00a0@EdEdwardsCiphers\u00a0 I\u2019ve interviewed him. First time around a year or so ago about another video and again this year. I have no issue with someone who provides paper or recordings to support their claims. More people should be made to.", "webpage_url": "https://www.youtube.com/watch?v=IMAUL6BKycE", "title": "Chapter 10: New Age Sherlock"}, {"author": "@JackDoeland", "timestamp": 1772841600, "text": "\u00a0@Imnottheborough\u00a0And the second to last has arrived. Still struggling with English, mate? Here\u2019s an idea. Why don\u2019t you grow a set and reach out to him through his website like I did?", "webpage_url": "https://www.youtube.com/watch?v=IMAUL6BKycE", "title": "Chapter 10: New Age Sherlock"}, {"author": "@a1investigations433", "timestamp": 1773705600, "text": "\u200b\u00a0@octowuss1888\u00a0no evidence? Absurd.", "webpage_url": "https://www.youtube.com/watch?v=IMAUL6BKycE", "title": "Chapter 10: New Age Sherlock"}, {"author": "@JackDoeland", "timestamp": 1772841600, "text": "Pay no mind to the haters. Was it the Chris Pine series?", "webpage_url": "https://www.youtube.com/watch?v=IMAUL6BKycE", "title": "Chapter 10: New Age Sherlock"}, {"author": "@Hummingbirdshum", "timestamp": 1773705600, "text": "\u00a0@a1investigations433\u00a0@Imnottheborough is a simpleton troll. He is unable to grasp the reality that they have solved the cases and are endorsed by how many experts? 10-15? In every major newspaper out there. Look at the likes \ud83d\udc46\ud83c\udffband support here alone. He continues to make a bigger fool of himself with every remark.", "webpage_url": "https://www.youtube.com/watch?v=IMAUL6BKycE", "title": "Chapter 10: New Age Sherlock"}, {"author": "@Hummingbirdshum", "timestamp": 1770422400, "text": "Read the documents on the website.", "webpage_url": "https://www.youtube.com/watch?v=Okc2g0JsPMU", "title": "Mitzi Roberts - The MO Switch"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "This CathyGOdumb is just another Baber hater. They read absolutely nothing outside their comfort zone or they simply reject the truth in favor of bs from people like so called BD expert Larry \u201cI talk to a box.\u201d It\u2019s becoming funny at this point.", "webpage_url": "https://www.youtube.com/watch?v=Okc2g0JsPMU", "title": "Mitzi Roberts - The MO Switch"}, {"author": "@JackDoeland", "timestamp": 1767744000, "text": "Interesting\u2014It is factually based with expert confirmation and detectives supporting. What do you have additional?", "webpage_url": "https://www.youtube.com/watch?v=8PxBOYQ3ibI", "title": "Unique sketch helped link Zodiac, Black Dahlia murders to same man: Investigator | Banfield"}, {"author": "@JackDoeland", "timestamp": 1767744000, "text": "Enhancement pulls the glasses away by detailing them. Austin, you\u2019ll see a distinction around the eyebrow. This photograph was confirmed by his own son as being legit.", "webpage_url": "https://www.youtube.com/watch?v=8PxBOYQ3ibI", "title": "Unique sketch helped link Zodiac, Black Dahlia murders to same man: Investigator | Banfield"}, {"author": "@JackDoeland", "timestamp": 1767744000, "text": "And the Zodiac murders were the 60\u2019s bud.", "webpage_url": "https://www.youtube.com/watch?v=8PxBOYQ3ibI", "title": "Unique sketch helped link Zodiac, Black Dahlia murders to same man: Investigator | Banfield"}, {"author": "@JackDoeland", "timestamp": 1767744000, "text": "Officer McBride\u2019s account was discovered. Well, she was uncertain about the photographs after first saying they were in fact Elizabeth Short. She later went to the corners office and identified her body. They are releasing the information beginning of the year.", "webpage_url": "https://www.youtube.com/watch?v=8PxBOYQ3ibI", "title": "Unique sketch helped link Zodiac, Black Dahlia murders to same man: Investigator | Banfield"}, {"author": "@JackDoeland", "timestamp": 1767744000, "text": "\u2060\u00a0@VertigoGirl-g1o\u00a0 Not added. The image was enhanced and the software pulls the glasses out. His son is on audio recording stating he wore glasses all the time and then he turned over a VA eye prescription to LE as well as numerous additional photos.", "webpage_url": "https://www.youtube.com/watch?v=8PxBOYQ3ibI", "title": "Unique sketch helped link Zodiac, Black Dahlia murders to same man: Investigator | Banfield"}, {"author": "@JackDoeland", "timestamp": 1767744000, "text": "The Z13 solution IS 13 letters \u201cMarvin Merrill,\u201d his alias after the Dahlia murder, one he filed paperwork under. \u201cMarvin Margolis\u201d was his birth name. You should read more before responding so you don\u2019t look so silly in front of everyone.", "webpage_url": "https://www.youtube.com/watch?v=8PxBOYQ3ibI", "title": "Unique sketch helped link Zodiac, Black Dahlia murders to same man: Investigator | Banfield"}, {"author": "@JackDoeland", "timestamp": 1767744000, "text": "The glasses weren\u2019t added. The image was \u201cenhanced\u201d in order to make the image brighter. The son has confirmed the photo as being real on audio and that his father wore glasses all the time. He reportedly provided detectives an eye prescription in his father\u2019s name from decades ago\u2014", "webpage_url": "https://www.youtube.com/watch?v=8PxBOYQ3ibI", "title": "Unique sketch helped link Zodiac, Black Dahlia murders to same man: Investigator | Banfield"}, {"author": "@JackDoeland", "timestamp": 1767744000, "text": "Oranchak is a self admitted amateur like this guy? At least this guy has the NSA confirmation and peer reviews for the first time in history.", "webpage_url": "https://www.youtube.com/watch?v=8PxBOYQ3ibI", "title": "Unique sketch helped link Zodiac, Black Dahlia murders to same man: Investigator | Banfield"}, {"author": "@JackDoeland", "timestamp": 1767744000, "text": "\u2060\u00a0@darklumin\u00a0Shotty? It\u2019s confirmed by a NSA legend and two independent peer reviews which is a first in history. Try reading.", "webpage_url": "https://www.youtube.com/watch?v=8PxBOYQ3ibI", "title": "Unique sketch helped link Zodiac, Black Dahlia murders to same man: Investigator | Banfield"}, {"author": "@JackDoeland", "timestamp": 1767744000, "text": "\u00a0@darklumin\u00a0 Could you possibly read the article first before assuming? They got 71 million potential candidate combinations. 94% of them were not real world individuals although the first and last name fit the character count. Another 5% was reduced by the 1950 Census dataset before the detectives carried out a comprehensive background check on the final pool of suspects. AI was just a small part of the identification as well as C++ progressions. It is actually quite believable when you sit down and listen to the details.", "webpage_url": "https://www.youtube.com/watch?v=8PxBOYQ3ibI", "title": "Unique sketch helped link Zodiac, Black Dahlia murders to same man: Investigator | Banfield"}, {"author": "@JackDoeland", "timestamp": 1767744000, "text": "It does run deep. You apparently do not understand the solution was his alias after Black Dahlia \u201cMarvin Merrill\u201d which is 13 characters\u2026\u2026\n\nMargolis was his birth name genius.", "webpage_url": "https://www.youtube.com/watch?v=8PxBOYQ3ibI", "title": "Unique sketch helped link Zodiac, Black Dahlia murders to same man: Investigator | Banfield"}, {"author": "@JackDoeland", "timestamp": 1767744000, "text": "Did you read the official reports? Listen to the experts, the detectives? He was born in 1925 and was 43 during Zodiac attacks. He had more medical training as a corpsman and USC medical student then and suspect in history. Try to be more accurate in the future.", "webpage_url": "https://www.youtube.com/watch?v=8PxBOYQ3ibI", "title": "Unique sketch helped link Zodiac, Black Dahlia murders to same man: Investigator | Banfield"}, {"author": "@JackDoeland", "timestamp": 1767744000, "text": "\u00a0@spinsandneedles\u00a0Enhanced doesn\u2019t mean \u201cfake\u201d genius. It means they probably lightened the image. Those are not added glasses. Also, they are dropping an audio on the podcast of the son confirming the photo himself and saying something about how bad his father\u2019s vision actually was.  As far as the son saying it was another Elizabeth, they have him admitting otherwise and this Pulitzer Prize winner who wrote the LA Times article confronted the son about the wounds on the stomach and he knew! He just didn\u2019t include that in the official story but the audio was shared for the podcast. You should really wait like this guy above said before you make accusations that are unfounded.", "webpage_url": "https://www.youtube.com/watch?v=8PxBOYQ3ibI", "title": "Unique sketch helped link Zodiac, Black Dahlia murders to same man: Investigator | Banfield"}, {"author": "@JackDoeland", "timestamp": 1767744000, "text": "It spells \u201cZoDiac.\u201d", "webpage_url": "https://www.youtube.com/watch?v=8PxBOYQ3ibI", "title": "Unique sketch helped link Zodiac, Black Dahlia murders to same man: Investigator | Banfield"}, {"author": "@JackDoeland", "timestamp": 1767744000, "text": "What part didn\u2019t you read in the press release? The part that Marvin Margolis took the alias Marvin Merrill after the murder of Elizabeth Short. That the Z13 solution can be forced onto his name as it is verified by the NSA expert and two independent peer reviews??? It\u2019s no anagrammed, it is an established double encryption like the Z340.", "webpage_url": "https://www.youtube.com/watch?v=8PxBOYQ3ibI", "title": "Unique sketch helped link Zodiac, Black Dahlia murders to same man: Investigator | Banfield"}, {"author": "@JackDoeland", "timestamp": 1767744000, "text": "Margolis is Merrill. He took the alias after he murdered Elizabeth Short.", "webpage_url": "https://www.youtube.com/watch?v=8PxBOYQ3ibI", "title": "Unique sketch helped link Zodiac, Black Dahlia murders to same man: Investigator | Banfield"}, {"author": "@JackDoeland", "timestamp": 1773100800, "text": "Over the past week or so, this Ross Geraci of PlanetXFilm has made several attempts across various Zodiac groups and social media platforms to discredit Baber\u2019s case work. Despite his committed effort, the posts have generated little engagement \u2014 roughly twenty likes in total at this point.\n\nIronically, the response from many viewers has been the opposite of what was likely intended. Several individuals have reached out, noting how transparent his trolling attempt appears and expressing amusement at what they see as a rather desperate bid for attention. At this point, people are literally laughing at him and honestly it is sad to see.", "webpage_url": "https://www.youtube.com/watch?v=7C_kCy9pdd8", "title": "Killer In The Code Podcast Episode 1 - Aha Moments For Alex Baber"}, {"author": "@Hummingbirdshum", "timestamp": 1773100800, "text": "It\u2019s telling when the creator of a Zodiac discussion group chooses to spend more time attacking Alex Baber than discussing the evidence presented. Personal attacks and attention seeking posts may generate a few reactions online, but they contribute nothing of substance to the investigation or to the pursuit of justice for the victims. Serious work in this field focuses on documentation, and results evaluated by experts like the ones he has brought in, not by haters in small circles making disgusting comments like immature children wanting to sound cool in a clique.", "webpage_url": "https://www.youtube.com/watch?v=7C_kCy9pdd8", "title": "Killer In The Code Podcast Episode 1 - Aha Moments For Alex Baber"}, {"author": "@nillydilly-w5l", "timestamp": 1773705600, "text": "\u00a0@TheLittleItalianGirl\u00a0The evidence is in the 10 episodes and they have REAL experts that defend Alex Baber\u2019s investigation and not Zodiac group members that resort to foul language like you or smart mouthed haters like this Ross fellow you have the audacity to try to defend. Either grow up or go away.", "webpage_url": "https://www.youtube.com/watch?v=7C_kCy9pdd8", "title": "Killer In The Code Podcast Episode 1 - Aha Moments For Alex Baber"}, {"author": "@nillydilly-w5l", "timestamp": 1773705600, "text": "\u00a0@Imnottheborough\u00a0You again? How many rambling post is that now in the last hour? Why are you so desperate to be relevant? Your post repeat the same thing over and over again. It is apparent that us others know more than you or you wouldn\u2019t feel the need to repeat yourself. Stop being negative and contribute something valuable to the conversation.", "webpage_url": "https://www.youtube.com/watch?v=7C_kCy9pdd8", "title": "Killer In The Code Podcast Episode 1 - Aha Moments For Alex Baber"}, {"author": "@nillydilly-w5l", "timestamp": 1773705600, "text": "\u00a0@Imnottheborough\u00a0Honey, I don\u2019t need to be Alex Baber to call your bs out or does anyone else here that isn\u2019t a buffoon.", "webpage_url": "https://www.youtube.com/watch?v=7C_kCy9pdd8", "title": "Killer In The Code Podcast Episode 1 - Aha Moments For Alex Baber"}, {"author": "@nillydilly-w5l", "timestamp": 1773705600, "text": "@Imn\u00a0@Imnottheborough\u00a0 i\u2019ve never said anything about Margolius being hours away? You better get your facts straight before you make accusations against me! They have evidence that shows Margolius is in all likelihood the Zodiac so don\u2019t sit there putting words in my mouth!", "webpage_url": "https://www.youtube.com/watch?v=7C_kCy9pdd8", "title": "Killer In The Code Podcast Episode 1 - Aha Moments For Alex Baber"}, {"author": "@nillydilly-w5l", "timestamp": 1773705600, "text": "@I\u00a0@Imnottheborough\u00a0feel the podcast has answered all questions regarding their investigation. You bringing up Atlanta or Mara Murray and Alex Baber has no barring on this podcast. And lastly, it\u2019s not his job to solve those cases, sweetheart. That would the police in their city or state. If he offers and it doesn\u2019t work out for whatever reason so be it. The official investigators should be called out, not some person who wants to help. Look at you now!", "webpage_url": "https://www.youtube.com/watch?v=7C_kCy9pdd8", "title": "Killer In The Code Podcast Episode 1 - Aha Moments For Alex Baber"}, {"author": "@Hummingbirdshum", "timestamp": 1773705600, "text": "\u00a0@TheLittleItalianGirl\u00a0Reputable? Where did you learn about standards? Both of you are rude and disrespectful.", "webpage_url": "https://www.youtube.com/watch?v=7C_kCy9pdd8", "title": "Killer In The Code Podcast Episode 1 - Aha Moments For Alex Baber"}, {"author": "@nillydilly-w5l", "tim nder false pretenses according to the detectives. He was then listed as a suspect in 1949 by both of the investigators who cleared him earlier. The jury transcripts are both clear and undeniable if you take time to read them so Marvin is the most likely murderer ever presented.", "webpage_url": "https://www.youtube.com/watch?v=7C_kCy9pdd8", "title": "Killer In The Code Podcast Episode 1 - Aha Moments For Alex Baber"}, {"author": "@MartianMan-ate1", "timestamp": 1773705600, "text": "@TheLittleltalianGirl Your comment is repugnant. I\u2019ve followed the Black Dahlia and Zodiac cases for over 45 years, and this is the most thorough, evidence-driven investigation I have seen during that entire time. You are free to disagree with conclusions or evidence, that is part of open discussion, but resorting to profanity, insults, and mockery of serious homicide investigations is inappropriate and frankly shameful ma\u2019am. \n\nThese cases involve real victims and real families. Turning them into jokes or using vulgar language while discussing them is grossly disrespectful. These investigators, and Alex Baber\u2019s are invested and respected. Look at the following\u2026\n\nIf you have an argument supported by evidence, present it to all of us. If not, the theatrics and childish name-calling only tarnishes your own credibility.", "webpage_url": "https://www.youtube.com/watch?v=7C_kCy9pdd8", "title": "Killer In The Code Podcast Episode 1 - Aha Moments For Alex Baber"}, {"author": "@MartianMan-ate1", "timestamp": 1773705600, "text": "\u00a0@TheLittleItalianGirl\u00a0Laugh. That only reinforces your immaturity and ignorance for all of us.", "webpage_url": "https://www.youtube.com/watch?v=7C_kCy9pdd8", "title": "Killer In The Code Podcast Episode 1 - Aha Moments For Alex Baber"}, {"author": "@MartianMan-ate1", "timestamp": 1773705600, "text": "\u00a0@TheLittleItalianGirl\u00a0That\u2019s what I thought. No real response.", "webpage_url": "https://www.youtube.com/watch?v=7C_kCy9pd investigation \u2014 and who has taken the time to conduct independent research can recognize the difference.\n\nWhile we agree to disagree with your conclusions, we do find the commentary\u2026interesting.", "webpage_url": "https://www.youtube.com/watch?v=7C_kCy9pdd8", "title": "Killer In The Code Podcast Episode 1 - Aha Moments For Alex Baber"}, {"author": "@JackDoeland", "timestamp": 1767744000, "text": "\u2060\u00a0@Imnottheborough\u00a0 Funny how you \u201cclowns\u201d seem to follow the guy around attempting to bash him? Not at all personal, huh? Grow up why don\u2019t you. He has dozens of professionals supporting his work and a family member of a victim.", "webpage_url": "https://www.youtube.com/watch?v=7C_kCy9pdd8", "title": "Killer In The Code Podcast Episode 1 - Aha Moments For Alex Baber"}, {"author": "@JackDoeland", "timestamp": 1767744000, "text": "\u00a0@Imnottheborough\u00a0Keep bashing and spreading misinformation that is misspelled at that.", "webpage_url": "https://www.youtube.com/watch?v=7C_kCy9pdd8", "title": "Killer In The Code Podcast Episode 1 - Aha Moments For Alex Baber"}, {"author": "@JackDoeland", "timestamp": 1767744000, "text": "\u00a0@christophers.8209\u00a0Do your research. That means READ and learn before opening your mouth and acting like you know anything at all about what he did or didn\u2019t use.", "webpage_url": "https://www.youtube.com/watch?v=7C_kCy9pdd8", "title": "Killer In The Code Podcast Episode 1 - Aha Moments For Alex Baber"}, {"author": "@JackDoeland", "timestamp": 1767744000, "text": "\u2060\u00a0@Imnottheborough\u00a0Oranchak is an amateur himself just like this guy. Ignorance is bliss.", "webpage_url": "https://www.youtube.com/watch?v=7C_kCy9pdd8", "title": "Killer In The Code Podcast Episode 1 - Aha Moments For Alex Baber"}, {"author": "@JackDoeland", "timestamp": 1767744000, "text": "\u00a0@christophers.8209\u00a0 Whether Baber chooses to disclose details regarding his software is immaterial outside of its results. What is evident, however, is the constant presence of a personal bias driving your commentary.\n\nAdditionally, the term \u201cgrifter\u201d is being misapplied. By definition, it refers to someone who engages in deception for financial gain. That characterization does not align with an individual who teams with credentialed experts to consult on unresolved cold cases, accepts no compensation, and personally covers the associated costs.\n\nI would encourage greater care in the use of such labels, as employing terminology without a clear understanding of its meaning ultimately displays your stupidity.", "webpage_url": "https://www.youtube.com/watch?v=7C_kCy9pdd8", "title": "Killer In The Code Podcast Episode 1 - Aha Moments For Alex Baber"}, {"author": "@markwhisenant6879", "timestamp": 1770422400, "text": "The Origin of the Date: During a famous 1969 televised appearance on the Jim Dunbar Show, a caller claiming to be the Zodiac spoke with attorney Melvin Belli. Later, Belli's housekeeper reported receiving a phone call from the \"Zodiac\" on January 14, 1970, in which the caller stated it was his birthday. I just figured out the Zodiac killer Birthday was Jan 14th at the Zodiac Motel where he became the Zodiac killing Elizabeth Short and dumped her body on Jan 15th on lovers lane LA CA.", "webpage_url": "https://www.youtube.com/watch?v=zHKxZAww2Zw", "title": "Chapter 1: The Hidden Beneath The Hidden"}, {"author": "@SticksAandstonesBozo", "timestamp": 1767744000, "text": "It\u2019s an AP story so it\u2019s all over today yeah.", "webpage_url": "https://www.youtube.com/watch?v=zHKxZAww2Zw", "title": "Chapter 1: The Hidden Beneath The Hidden"}, {"author": "@SticksAandstonesBozo", "timestamp": 1770422400, "text": "\u00a0@zackbutson3401\u00a0So you just toss aside the most prestigious code breakers in the world checking the work , the detective who just retired from the case after 25 years , you \u2026.. internet guy \u2026. You think they are all wrong huh.", "webpage_url": "https://www.youtube.com/watch?v=zHKxZAww2Zw", "title": "Chapter 1: The Hidden Beneath The Hidden"}, {"author": "@SticksAandstonesBozo", "timestamp": 1767744000, "text": "\u00a0@LAKwildflower\u00a0You can\u2019t help people these days. Don\u2019t even bother.", "webpage_url": "https://www.youtube.com/watch?v=zHKxZAww2Zw", "title": "Chapter 1: The Hidden Beneath The Hidden"}, {"author": "@SticksAandstonesBozo", "timestamp": 1767744000, "text": "You\u2019re being like a cop and only assuming old ideas are valid.", "webpage_url": "https://www.youtube.com/watch?v=zHKxZAww2Zw", "title": "Chapter 1: The Hidden Beneath The Hidden"}, {"author": "@SticksAandstonesBozo", "timestamp": 1767744000, "text": "Also you clearly haven\u2019t read about this yet. I was not a believer at all. Then I read the times article. There is no way this is a coincidence.", "webpage_url": "https://www.youtube.com/watch?v=zHKxZAww2Zw", "title": "Chapter 1: The Hidden Beneath The Hidden"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@musiclistening1408\u00a0Agreed", "webpage_url": "https://www.youtube.com/watch?v=Pzl9Zzns6Jg", "title": "Researcher is 100% sure about this link between the Zodiac and Black Dahlia killer"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@Imnottheborough\u00a0There\u2019s the Baber stalker! No sleep for the weary. Look at this guy\u2019s comments, all he does is google the dude to leave crappy comments even though his claims are debunked every time. Then he will accuse you of being a Baber \u201cfanboy\u201d for pointing out the facts.", "webpage_url": "https://www.youtube.com/watch?v=Pzl9Zzns6Jg", "title": "Researcher is 100% sure about this link between the Zodiac and Black Dahlia killer"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@Imnottheborough\u00a0 Your assertions have been addressed and refuted\u2014by others as well as by myself. At this point, continuing to repeat them serves no constructive purpose. The level of fixation displayed, particularly following an individual across multiple online platforms, raises legitimate concerns.\n\nWhat, specifically, is the grievance here? That Baber disproved one of your claims related to these cases\u2014or something else entirely? Where is your actual stake in this discussion?\n\nHis statements are verifiable and he openly acknowledges errors when they occur. Whether one personally likes him is irrelevant; the facts stand on their own. Repeating the same unsupported narrative does little more than signal bias hate on your behalf, and it has gained little traction beyond a small, insular audience.\n\nYou are, of course, free to continue, but the broader community is focused on evidence and progress\u2014not personal animus. I have no doubt I\u2019ll continue to encounter your commentary on any discussion involving Baber, but that does not alter the factual record. See you in the next post, Shabby Doo.", "webpage_url": "https://www.youtube.com/watch?v=Pzl9Zzns6Jg", "title": "Researcher is 100% sure about this link between the Zodiac and Black Dahlia killer"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@Imnottheborough\u00a0Larry the Liar? The former copy editor who rants when anyone proves him even remotely wrong? The guy who says numerous experts in their various field are all wrong and he knows best? The guy who talks down to a Pulitzer Prize winning reporter like Chris Goffard who also works at LA Times? How many Pulitzer Prizes does ole\u2019 Larry Harnisch have again? \n\nYea, the guy who talks to and for a box\u2026.that guy is who you are sourcing here?\n\nI just laughed aloud. You are desperate aren\u2019t you? You never answered how Baber got under your skin. Was it these cases or another? How did he prove you wrong as that would be the only logical explanation for your obsession with the guy. Please do share with us.", "webpage_url": "https://www.youtube.com/watch?v=Pzl9Zzns6Jg", "title": "Researcher is 100% sure about this link between the Zodiac and Black Dahlia killer"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u2060\u00a0@Imnottheborough\u00a0High or stupid? Yet you apparently lack the intelligence to realize surnames are always capitalized, not just some of the time. Again, all of these claims have been debunked, Joe. Baber openly admitted that his 2007 Z18 solution was flawed by anagramming? Have you also not been able to locate the articles about his family? Would you like a little help with them so you can stop looking idiotic here and everywhere else you stalk this guy?  If I help you, will you answer my question on why he gets under your skin so much? That\u2019s a fair deal, right?", "webpage_url": "https://www.youtube.com/watch?v=Pzl9Zzns6Jg", "title": "Researcher is 100% sure about this link between the Zodiac and Black Dahlia killer"}, {"author": "@MartianMan-ate1", "timestamp": 1775498400, "text": "Margolis was Elizabeth\u2019s boyfriend. It\u2019s listed directly within the Los Angeles DA files multiple times. You should do better research before making a claim as such. After listening to your video, there are various other claims against the recent release that can also be directly disputed with documentation. So I wouldn\u2019t put \u201cDEBUNKED\u201d in the caption unless you want them to prove you are talking about something you know very little about.", "webpage_url": "https://www.youtube.com/watch?v=LKndBb9uZCs", "title": "DEBUNKED! Dahlia, Zodiac cases NOT solved (at all)"}, {"author": "@MartianMan-ate1", "timestamp": 1775502000, "text": "\u00a0@GraveLineTours\u00a0 Nearly all of what you just listed is completely inaccurate. Have you not read DA files? Listened to the lead detectives who had access to the original files? They support the guys claim 100%.", "webpage_url": "https://www.youtube.com/watch?v=LKndBb9uZCs", "title": "DEBUNKED! Dahlia, Zodiac cases NOT solved (at all)"}, {"author": "@MartianMan-ate1", "timestamp": 1775498400, "text": "\u00a0@vita4-life\u00a0 Actually, the son has since stated he believes his father could quite possibly be the murderer. There are now other family members who agree to.", "webpage_url": "https://www.youtube.com/watch?v=LKndBb9uZCs", "title": "DEBUNKED! Dahlia, Zodiac cases NOT solved (at all)"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "Three of the first four comments were yours. Yes\u2014nothing personal there, right?\n\nOnce again, what exactly was the issue? In which case did Baber prove you wrong? Be specific please so all of us can at least attempt to understand why you stalk the guy. \n\nAnd as for the \u201cother\u201d Elizabeth, my understanding is that she has been cleared as the individual represented in the sketch. But of course, we should defer to your opinion over that of a forensic expert, right? Margolis just included the word \u201cZodiac\u201d for the fun of it? Makes total sense.", "webpage_url": "https://www.youtube.com/watch?v=uMCmBv7pjgM", "title": "Chapter 5: The Zodiac Motel"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@Imnottheborough\u00a0 Oranchak, a self-described amateur, supposedly knows more than dozens of experts? That crosses from debate into silliness.", "webpage_url": "https://www.youtube.com/watch?v=uMCmBv7pjgM", "title": "Chapter 5: The Zodiac Motel"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@Imnottheborough\u00a0Why don\u2019t you ask Baber? I doubt he would shy away from the question from what I\u2019ve seen and heard. Would love to see that!", "webpage_url": "https://www.youtube.com/watch?v=uMCmBv7pjgM", "title": "Chapter 5: The Zodiac Motel"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@trashlie\u00a0 It\u2019s good to hear that you\u2019ve been tracking the details, but have you taken the time to actually read or listen? He provides documentation for his statements and openly acknowledges when he\u2019s incorrect.\n\nI have no need to discredit Harnisch or anyone else inserting themselves into the discussion\u2014their lack of professionalism and in some cases rants does that on its own.", "webpage_url": "https://www.youtube.com/watch?v=uMCmBv7pjgM", "title": "Chapter 5: The Zodiac Motel"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@Imnottheborough\u00a0 So defending someone I vetted over a year ago\u2014after first seeing a Murray video that labeled him a con\u2014now somehow makes me Baber? You\u2019re obviously uncomfortable with the fact that someone is willing to defend him against personal attacks like yours. I do have to give you both an A for effort.", "webpage_url": "https://www.youtube.com/watch?v=uMCmBv7pjgM", "title": "Chapter 5: The Zodiac Motel"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@EdEdwardsCiphers\u00a0 You are not engaging in good-faith debate; your pattern is harassment like a few others, not discussion. I say that based on your own public behavior. I saw you commenting only weeks ago on PR3TEND\u2019s \u201cdefamation\u201d video on Baber\u2014material I examined in detail more than a year ago and commented on. \n\nAdditionally, your decision to defend Larry Harnisch, particularly after his recent video in which he behaved unprofessionally and emotionally, raises serious questions about your judgment. Disagreement is one thing; repeatedly amplifying demonstrably flawed or reactionary arguments is another.", "webpage_url": "https://www.youtube.com/watch?v=uMCmBv7pjgM", "title": "Chapter 5: The Zodiac Motel"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@trashlie\u00a0 There are enough misstatements in your post that it isn\u2019t productive to address them all here. That said, a few examples illustrate the broader issue.\n\nYou claim the Zodiac merely copied others\u2019 work\u2014poetry in particular\u2014and that these elements were therefore not his. Yet the Little List letter was not a verbatim lift; it was heavily reworded and adapted. That distinction matters.\n\nLikewise, did Zodiac know that the Avenger used the term \u201cmaterial\u201d when referring to evidence during the January 23, 1947 phone call to Jimmy Richardson? That phrasing did not originate with Zodiac, but its reuse raises legitimate questions about awareness versus coincidence.\n\nThese and other points are repeatedly brushed aside without adequate consideration. Dismissing them outright oversimplifies the issue and weakens the overall analysis, in my opinion.", "webpage_url": "https://www.youtube.com/watch?v=uMCmBv7pjgM", "title": "Chapter 5: The Zodiac Motel"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@trashlie\u00a0 There is a detailed third-party account of the incident and phone call. For years, Baber believed the caller was Larry Kane/Cane, and that point is well documented as well. What is frequently omitted is that he himself later challenged that conclusion after forming his agency and consulting with subject-matter experts to reassess the details and Kane as a viable suspect. Do you me ton that? No.\n\nThat change in position matters. Re-evaluating prior assumptions in light of expert review is not a weakness\u2014it\u2019s responsible analysis.\n\nI\u2019m not interested in continuing circular arguments with a few individuals who are unwilling to acknowledge that context, so I\u2019ll leave it there.", "webpage_url": "https://www.youtube.com/watch?v=uMCmBv7pjgM", "title": "Chapter 5: The Zodiac Motel"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@Imnottheborough\u00a0\u201dSeveral experts\u201d have stated what again? I\u2019ve only heard experts confirming this and that about Baber\u2019s investigation \ud83d\ude0aso far. Did Larry\u2019s box tell you that?", "webpage_url": "https://www.youtube.com/watch?v=uMCmBv7pjgM", "title": "Chapter 5: The Zodiac Motel"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u2060\u00a0@Imnottheborough\u00a0Where are your many \u201cexperts\u201d stating the sketch isn\u2019t what Baber claims or a forensic expert who has also now stated the same. \n\nWhere\u2019s your so called experts?", "webpage_url": "https://www.youtube.com/watch?v=uMCmBv7pjgM", "title": "Chapter 5: The Zodiac Motel"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@EdEdwardsCiphers\u00a0Did you not listen to the podcast? Interviews? A weekend to solve? I\u2019m no cryptologist but I do know how to listen to numerous experts who are former NSA mathematicians opposed to a guy who can\u2019t even spell.", "webpage_url": "https://www.youtube.com/watch?v=uMCmBv7pjgM", "title": "Chapter 5: The Zodiac Motel"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@srockerboy1\u00a0Especially after 46 years or so.", "webpage_url": "https://www.youtube.com/watch?v=uMCmBv7pjgM", "title": "Chapter 5: The Zodiac Motel"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@Imnottheborough\u00a0You\u2019re a Baber hater and imbecile who has exposed himself in support of who? A man who talks to a box? Additionally, please explain how did scammed the Murray family again as the core concept behind any scam is monetary gain. And finally, you never stated which numerous experts have disproven the sketch Baber discovered? He brought his experts by name, and have what sir?", "webpage_url": "https://www.youtube.com/watch?v=uMCmBv7pjgM", "title": "Chapter 5: The Zodiac Motel"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@theycantallbezodiac\u00a0Just ignore the fool. He has no ground to stand on and struggles to understand basic questions.", "webpage_url": "https://www.youtube.com/watch?v=uMCmBv7pjgM", "title": "Chapter 5: The Zodiac Motel"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@Imnottheborough\u00a0 I understand now. You may be inexperienced or lack full context on this topic, and that\u2019s okay. Let\u2019s wait and see how Baber and the other experts handle Zodiac and Black Dahlia moving forward.", "webpage_url": "https://www.youtube.com/watch?v=uMCmBv7pjgM", "title": "Chapter 5: The Zodiac Motel"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u2060\u00a0@Imnottheborough\u00a0And for the love of Webster, please learn how to spell!", "webpage_url": "https://www.youtube.com/watch?v=uMCmBv7pjgM", "title": "Chapter 5: The Zodiac Motel"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@Imnottheborough\u00a0 Numerous experts support his conclusion. If you disagree, address the substance of their arguments rather than resorting to personal attacks. And after you learn to spell correctly, study proper capitalization please.", "webpage_url": "https://www.youtube.com/watch?v=uMCmBv7pjgM", "title": "Chapter 5: The Zodiac Motel"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@EdEdwardsCiphers\u00a0 There is a segment of the community that refuses to acknowledge what Baber has uncovered, either due to a lack of understanding or because they are deeply invested in their own preferred suspect. Accusing this work of being a \u201ccash grab\u201d is particularly disingenuous when the individual in question works entirely without compensation. Let that sink in\u2026\n\nThat accusation makes one thing clear: this is not a good-faith critique, but either overt bias or willful blindness to truth whether you can stand the guy or not. Those who choose to remain in that position are free to do so, while Baber continues his work on behalf of the Short family and the Zodiac victims in these two cases. \n\nSo say what you will\u2014but in doing so, you only further reveal your bias to both supporters and your own community.", "webpage_url": "https://www.youtube.com/watch?v=uMCmBv7pjgM", "title": "Chapter 5: The Zodiac Motel"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@Imnottheborough\u00a0 There you are again, Shaggy the stalker. You continue to repeat fabrications from others without doing your own research. At what point did Baber actually prove you wrong? Your fixation suggests personal embarrassment rather than a substantive disagreement.\n\nAnd for the record, citing Larry Harnisch only underscores your ignorance. He speaks to a cardboard box, and then answers for a cardboard box\u2026..literally a box. \nlol", "webpage_url": "https://www.youtube.com/watch?v=uMCmBv7pjgM", "title": "Chapter 5: The Zodiac Motel"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@Imnottheborough\u00a0 First, please take care with spelling\u2014it makes your arguments unnecessarily difficult to take seriously.\n\nSecond, how exactly did Baber \u201cscam\u201d the Murray family? Did they pay him any money? If so, show it. If there\u2019s evidence, I\u2019ll be the first to call it out alongside you. To date, I\u2019ve never seen or read anything indicating that he scammed the Murray family.\n\nAnd at a minimum, please ensure you understand the meaning of the words you choose to use before stating them publicly. Thank you.", "webpage_url": "https://www.youtube.com/watch?v=uMCmBv7pjgM", "title": "Chapter 5: The Zodiac Motel"}, {"author": "@JackDoeland", "timestamp": 1772841600, "text": "He was born in Columbus, OH, raised in Florida, and returned to work the Circleville Writer case 40 minutes south of Columbus\u2014in Circleville? \n\nNot sure what your point is here?", "webpage_url": "https://www.youtube.com/watch?v=AqFMn5jzd2E", "title": "Killer in the Code and Alex Baber Are Not Very Honest"}, {"author": "@JackDoeland", "timestamp": 1772841600, "text": "\u00a0@truecrimesnakeoil\u00a0 The narrative presented by Larry Harnisch is factually incorrect and therefore misrepresents the context. Baber did not attend school in Ohio at any time whatsoever. He relocated to Florida as an infant and was raised there. Any assertion to the contrary is inaccurate. There is no distortion of context here\u2014the verifiable facts speak for themselves and Larry is a liar.", "webpage_url": "https://www.youtube.com/watch?v=AqFMn5jzd2E", "title": "Killer in the Code and Alex Baber Are Not Very Honest"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@theycantallbezodiac\u00a0oh, he is salty. One of a few Baber haters out there.", "webpage_url": "https://www.youtube.com/watch?v=4hmXxKMtk5g", "title": "Chapter 4: Code Makers and Breakers"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@theycantallbezodiac\u00a0 Yes, that is correct. The focus has increasingly shifted away from the victims and toward individuals\u2019 personal investment in a particular suspect. In doing so, some resort to promoting partial truths or, in more troubling cases, outright fabrications in an effort to reinforce their position and discredit other\u2019s hard work.", "webpage_url": "https://www.youtube.com/watch?v=4hmXxKMtk5g", "title": "Chapter 4: Code Makers and Breakers"}, {"author": "@markwhisenant6879", "timestamp": 1770422400, "text": "The Origin of the Date: During a famous 1969 televised appearance on the Jim Dunbar Show, a caller claiming to be the Zodiac spoke with attorney Melvin Belli. Later, Belli's housekeeper reported receiving a phone call from the \"Zodiac\" on January 14, 1970, in which the caller stated it was his birthday. I just figured out The Zodiac killer Birthday started at the Zodiac Motel Jan 14th where he killed Elizabeth Short and became the Zodiac and dumped her body on Jan 15th on Lovers Lane in LA CA.", "webpage_url": "https://www.youtube.com/watch?v=4hmXxKMtk5g", "title": "Chapter 4: Code Makers and Breakers"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "You are correct. It was his \u201cZodiac\u201d birthday.", "webpage_url": "https://www.youtube.com/watch?v=4hmXxKMtk5g", "title": "Chapter 4: Code Makers and Breakers"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@spinsandneedles\u00a0So you must have a time machine or are like 125 years old and were peeking in windows on January 14, 1947? Do you know Elizabeth wasn\u2019t killed there? It\u2019s called an \u201cinvestigation\u201d where you apply logic and reasoning to a situation to reach a probable outcome genius. Just because you follow and support Larry Harnisch doesn\u2019t mean Baber and his team are incorrect.", "webpage_url": "https://www.youtube.com/watch?v=4hmXxKMtk5g", "title": "Chapter 4: Code Makers and Breakers"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@spinsandneedles\u00a0 Attempts to use \u201csmoke & mirrors\u201d to discredit me or any others who support Baber, only underscore a lack of substantive engagement with the evidence. The conclusions we rely on are supported by experts in their respective fields and stand in stark contrast to the withheld information contrary to assertions and speculative commentary put forward by Larry Harnisch, whose claims lack both professionalism  and real credibility. He is a man who\u2019s invested 20+ years into a book focused on a single suspect who never had any established relationship to the victim Elizabeth Short. I would let that fact sink in for a moment before attempting to throw more shade on an investigation supported by every single expert has been presented to.", "webpage_url": "https://www.youtube.com/watch?v=4hmXxKMtk5g", "title": "Chapter 4: Code Makers and Breakers"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u2060\u00a0@spinsandneedles\u00a0 Excuse me? A troll? I am a professional in the field of criminology. Defending Larry Harnisch\u2019s recent outburst reflects poorly on your judgment and speaks for itself. You do understand that, yes? Repeating the label \u2018troll\u2019 in an attempt to justify the situation is neither persuasive nor appropriate. And for the record, Mr. Harnisch does not engage with individuals who are capable of challenging his one-sided claims or presenting evidence that contradicts them.", "webpage_url": "https://www.youtube.com/watch?v=4hmXxKMtk5g", "title": "Chapter 4: Code Makers and Breakers"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@spinsandneedles\u00a0 It seems \u2018troll\u2019 has become your preferred response. Please, by all means, continue. We are entertained.", "webpage_url": "https://www.youtube.com/watch?v=4hmXxKMtk5g", "title": "Chapter 4: Code Makers and Breakers"}, {"author": "@markwhisenant6879", "timestamp": 1770422400, "text": "\u200b\u00a0@spinsandneedles\u00a0In late 2025, amateur sleuth Alex Baber identified Marvin Margolis (who lived under the alias Marvin Merrill) as a primary suspect in both the Zodiac and Black Dahlia killings. \nIdentity and Name Change\nBackground: Marvin Margolis was a former U.S. Navy corpsman and pre-medical student who lived with Elizabeth Short (the \"Black Dahlia\") months before her 1947 murder.\nName Change: Following investigation into the Short murder, Margolis moved and adopted the alias Marvin Merrill. He lived under this name until his death from cancer in July 1993 in Santa Barbara, though his headstone reflects his birth name, Margolis.\nThe \"Z13\" Cipher: Baber claims to have cracked the Zodiac's famous \"My name is\" (Z13) cipher using artificial intelligence, revealing the name \"Marvin Merrill\". \nEvidence and The \"Bayonet\"\nThe Weapon: Baber pointed to the 1969 Lake Berryessa attack, where the Zodiac used a bayonet-style weapon. He alleges Margolis possessed a Japanese rifle and bayonet as a WWII war trophy that matched the description of the killer\u2019s blade.\nForensic Clues: Investigation suggests this bayonet may still exist within the Margolis family and could potentially hold forensic evidence.\nCircumstantial Links:\nArtwork: After his death, a 1992 sketch titled \"Elizabeth\" was found, which reportedly depicts Short's torso with the word \"Zodiac\" hidden in the shading.\nZodiac Motel: Baber identified a former bungalow complex in Compton called the Zodiac Motel as the likely site of the Short murder, suggesting it inspired the killer's alias. \nDNA Status (as of 2026)\nAs of early 2026, no confirmed DNA match has officially linked Margolis (Merrill) to the Zodiac crimes. While several retired homicide detectives and cryptographers consider the theory credible, law enforcement agencies such as the LAPD and SFPD have not officially closed the cases. Historic efforts to extract Zodiac DNA have only produced partial profiles from stamps, which have been used to exclude other suspects like Arthur Leigh Allen but are not robust enough for a definitive identification via forensic genealogy. They are working on the DNA, hand writing and belongs his son has given them. It's only been a few weeks  after finding everything out and still working on it.", "webpage_url": "https://www.youtube.com/watch?v=4hmXxKMtk5g", "title": "Chapter 4: Code Makers and Breakers"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@CathyGOdom\u00a0Santa Clara and Mountain View are only mins apart and both are a short drive from San Jose if you look at a Bay Area map. Seems like you are splitting hairs here.", "webpage_url": "https://www.youtube.com/watch?v=4hmXxKMtk5g", "title": "Chapter 4: Code Makers and Breakers"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u2060\u200b\u2060\u00a0@TM-ew1ig\u00a0 There were a couple listings for Merrill in the San Jose area, each reflecting slight variations of his first or middle name. Notably, nearly all of these listings were removed following the release of the podcast, which is interesting. Additionally, his return to the area in the late 1970s from the Vista area is alerting, as it coincides with the Zodiac\u2019s brief reemergence issuing three or four letters by newspaper reports, before ceasing activity once again.", "webpage_url": "https://www.youtube.com/watch?v=4hmXxKMtk5g", "title": "Chapter 4: Code Makers and Breakers"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@TM-ew1ig\u00a0 And no. Your sarcasm and disrespect are incompatible with serious research. If you are, as implied, a capable researcher, you would know that documents, articles, photographs, etc. are uploaded to and downloaded from the web at any given moment and can later be removed while the original still exist.", "webpage_url": "https://www.youtube.com/watch?v=4hmXxKMtk5g", "title": "Chapter 4: Code Makers and Breakers"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@TM-ew1ig\u00a0 Do your own research Travis or Trevor\u2014or whoever you are. I am not who you think and I do not know you. I have never met you or spoken outside of the comments here. I have heard Baber himself correct others when they refer to him as an \u201cexpert,\u201d and your attempt to claim credit for, or authority over, his investigation only highlights your agenda.\n\nIf you take issue with Alex or his conclusions, address those claims directly with him and not through me. I am not your intermediary.\n\nI will ask plainly, and only once: more on what basis do you believe you are in a position to challenge the work of experienced detectives and recognized forensic and cryptography experts as an amateur?", "webpage_url": "https://www.youtube.com/watch?v=4hmXxKMtk5g", "title": "Chapter 4: Code Makers and Breakers"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@TM-ew1ig\u00a0 Oh, right\u2014you\u2019re special. I see it now. Trying to provoke a reaction. It won\u2019t work, mate. \n\nAnd to answer your question, Baber does rather well for an \u201camateur,\u201d judging by the level of support he receives well beyond the Zodiac and Dahlia circles. \n\nI\u2019ve heard you and the cliq might be quite salty about what comes next. Take care now.", "webpage_url": "https://www.youtube.com/watch?v=4hmXxKMtk5g", "title": "Chapter 4: Code Makers and Breakers"}, {"author": "@Eidolon180", "timestamp": 1770422400, "text": "\u200b\u00a0@EdEdwardsCiphers\u00a0 So, the now retired head of the L.A. Cold Case unit that dealt with this directly for decades believing there's merit to Baber's work and hypothesis means zero to online geniuses that shun any ideas they don't already believe. Noted.", "webpage_url": "https://www.youtube.com/watch?v=4hmXxKMtk5g", "title": "Chapter 4: Code Makers and Breakers"}, {"author": "@Eidolon180", "timestamp": 1770422400, "text": "\u200b\u00a0@Imnottheborough\u00a0And? Have you actually listened to the podcast? There are reputable people, cryptographers who conducted their own independent investigation of Baber's claims, and former members of LE who do believe it. But the ones who don't believe it are automatically correct and those who do are automatically grifters. That's the kind of logic from people who already have their beliefs set and dismiss anything that goes against their beliefs. All the theories, Baber's included, can easily be wrong. But it's asinine to cherry pick winners and losers when this and some other theories have merit in the eyes of knowledgeable people.", "webpage_url": "https://www.youtube.com/watch?v=4hmXxKMtk5g", "title": "Chapter 4: Code Makers and Breakers"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@Imnottheborough\u00a0This guy is a hater on Baber. Everywhere there is a post he and his buddies run their mouths without doing their own research. If you actually listen to Baber and what he says it makes sense and leads to where they are today. The guy dismissed his own suspect from\n4 years ago after he discovered contradictory evidence. Grifter? Do you or any of the others actually understand the definition of the word? He doesn\u2019t collect money from victim\u2019s families. The guy is respected by both them and experts alike.\n\nLearn to listen and read before attacking individuals without knowing the facts surrounding the situation.", "webpage_url": "https://www.youtube.com/watch?v=4hmXxKMtk5g", "title": "Chapter 4: Code Makers and Breakers"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@Imnottheborough\u00a0 And with that, I rest my case. The pattern reflects a personal vendetta\u2014one that has driven you to pursue Baber across multiple online platforms. It suggests that, at some point, he challenged or disproved something you believed. You are only embarrassing yourself at this point.", "webpage_url": "https://www.youtube.com/watch?v=4hmXxKMtk5g", "title": "Chapter 4: Code Makers and Breakers"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@CrazyK1\u00a0 Upcoming reported releases are expected to further piss them off. I tried warning but they didn\u2019t seem to understand. \nLoL", "webpage_url": "https://www.youtube.com/watch?v=4hmXxKMtk5g", "title": "Chapter 4: Code Makers and Breakers"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@austintaylor6152\u00a0 My 13-year-old son followed Baber\u2019s instructions and was able to solve it in under five minutes. The reason the investigation and cipher solution are being dismissed appears to stem from Baber\u2019s prior opposition to these few distractors, during which they were publicly embarrassed.", "webpage_url": "https://www.youtube.com/watch?v=4hmXxKMtk5g", "title": "Chapter 4: Code Makers and Breakers"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@heatherruiz9490\u00a0And Larry the Liar is an expert code breaker on the level of Giorgio and the other experts, right? The guy wasn\u2019t even a reporter you know. He lied on Baber who said he worked the Z18 in 2007, not Z13 and openly admitted it was before he ever studied cryptography. Stop hating on a guy who doesn\u2019t get paid and attempts to help people. It\u2019s disgusting quite frankly and you should be embarrassed.", "webpage_url": "https://www.youtube.com/watch?v=4hmXxKMtk5g", "title": "Chapter 4: Code Makers and Breakers"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@spinsandneedles\u00a0 If you had a factual understanding of Baber\u2019s involvement in the Zodiac aspect of the investigation, you would be aware that he was requested to appear in Napa to meet with local Bay Area law-enforcement agencies, as well as representatives of the FBI, specifically to discuss the Zodiac case. This information is a matter of record.\n\nI encourage you to conduct thorough research before spreading the same inaccurate claims like the above hormonal teenager.", "webpage_url": "https://www.youtube.com/watch?v=4hmXxKMtk5g", "title": "Chapter 4: Code Makers and Breakers"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u2060\u00a0@spinsandneedles\u00a0 To be clear, according to Baber\u2019s team, he was requested to meet with them. There is corroborating information supporting this across multiple platforms, including documented comments and photographs. Good luck with your search and look forward to continuing our discussion soon.", "webpage_url": "https://www.youtube.com/watch?v=4hmXxKMtk5g", "title": "Chapter 4: Code Makers and Breakers"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@CrazyK1\u00a0 Recent reactions from critics appear increasingly silly, and further developments may prove surprising to some. Last night\u2019s ABC Nightline Impact release on Hulu has generated significant attention, particularly in contrast to claims by some that media no longer cared or had influence. Additionally, the LAPD has confirmed that Baber\u2019s investigation is active and being treated seriously, a development that has clearly intensified the response from the few distractors there are. The next step will reportedly be well placed especially for those who have lied and manipulated the truth surrounding Baber and his actions.", "webpage_url": "https://www.youtube.com/watch?v=4hmXxKMtk5g", "title": "Chapter 4: Code Makers and Breakers"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "And the ignorant have arrived. Larry the liar you mean? The foul mouth former copy editor who attempts to discredit actual experts in their field with word salad?", "webpage_url": "https://www.youtube.com/watch?v=4hmXxKMtk5g", "title": "Chapter 4: Code Makers and Breakers"}, {"author": "@JackDoeland", "timestamp": 1772841600, "text": "\u2060\u200b\u2060\u200b\u2060\u200b\u2060\u200b\u2060\u00a0@Cragle-Z\u00a0 Marvin (not Melvin?) died under the alias Marty Merrill in Santa Barbara, CA. Do you not listen to what is said by Connelly in their podcast? Mail from his residence with the name \u201cMarty Merrill\u201d was also turned over to investigators. If you are going to post as if you know something about the investigation, at least reference what it is they say.", "webpage_url": "https://www.youtube.com/watch?v=79GU3ushtaA", "title": "Chapter 9: Last Man Standing"}, {"author": "@JackDoeland", "timestamp": 1772841600, "text": "\u00a0@Cragle-Z\u00a0 Look at the image of the sketch they\u2019ve released. Multiple injuries were visible before a macro lens was even used. Just because you or a handful of others don\u2019t like it, doesn\u2019t change the fact it exists. \n\nDid \u201cMelvin\u201d cut up other Elizabeth\u2019s? I mean that could be a possibility, right? \ud83d\ude44", "webpage_url": "https://www.youtube.com/watch?v=79GU3ushtaA", "title": "Chapter 9: Last Man Standing"}, {"author": "@a1investigations433", "timestamp": 1773705600, "text": "You do not address any of the actual evidence and seem to feel personally slighted by the podcast. Very odd. Your position seems to be nuh-uh.", "webpage_url": "https://www.youtube.com/watch?v=79GU3ushtaA", "title": "Chapter 9: Last Man Standing"}, {"author": "@Hummingbirdshum", "timestamp": 1773705600, "text": "\u00a0@a1investigations433\u00a0I agree. Sadly, they ignore the evidence and the multiple experts as though they know better.", "webpage_url": "https://www.youtube.com/watch?v=79GU3ushtaA", "title": "Chapter 9: Last Man Standing"}, {"author": "@a1investigations433", "timestamp": 1773705600, "text": "\u200b\u00a0@spinsandneedles\u00a0Well, glad you're being logical. He could absolutely being suffering from PTSD as a contributing factor to his killing Short (if he did). It depends on the person, what he experienced in the war, and what other motives he may have had to kill her. Anyway, I agree the whole podcast could have used more criticism and hard hitting questions.", "webpage_url": "https://www.youtube.com/watch?v=79GU3ushtaA", "title": "Chapter 9: Last Man Standing"}, {"author": "@JackDoeland", "timestamp": 1773705600, "text": "\u00a0@spinsandneedles\u00a0 It is absurd to dismiss the possibility that PTSD may have been a contributing factor, particularly when both Baber and experienced detectives have raised the issue with other experts. Have you taken the time to examine the documented number of post-trauma homicides since 1945? The data exists. Ignoring it simply because it does not align with your preferred narrative is not analysis\u2014it is willful denial.\n\nA small group of roughly nine individuals accounts for the vast majority of the negative commentary, and your identities are not as anonymous as you seem to believe, Steven Powers. Your activity within Zodiac discussion groups, consistently promoting partial truths, distortions, and at times outright fabrications is becoming increasingly visible.\n\nAttempting to manipulate public perception of the case from behind screen names will not change the evidence nor will bashing Baber who is supported by dozens of respected experts. As these efforts continue, they will be exposed.\n\nThe smear campaign is coming to an end and the misinformation will cease, mate. \u201cBorough\u201d is on deck\u2026", "webpage_url": "https://www.youtube.com/watch?v=79GU3ushtaA", "title": "Chapter 9: Last Man Standing"}, {"author": "@a1investigations433", "timestamp": 1773705600, "text": "\u200b\u00a0@spinsandneedles\u00a0If he is the killer, he was a major suspect for Short and nearly was caught. His first cypher was easily broken. He was nearly caught at the Stine murder. Doesn't seem like Moriarty to me; he benefited from luck and the limited investigative techniques of the day. The killer of Short and the Zodiac killer loved attention so with him on his deathbed, I could easily see him draw a picture that linked him to the killings as a last laugh.", "webpage_url": "https://www.youtube.com/watch?v=79GU3ushtaA", "title": "Chapter 9: Last Man Standing"}, {"author": "@a1investigations433", "timestamp": 1773705600, "text": "\u200b\u00a0@Imnottheborough\u00a0You and I have no way of knowing if it is Short or not. Its a drawing of a woman who has marks on her chest with a possible representation of blood that reasonably matches the stab wounds on Short's chest. The drawing is cut off at the waist. It has another mark upturning from her mouth. Short was bisected and was cut at the mouth. Obviously there are somethings that dont match as well. If it were drawn by someone that didn't know Short that would be one thing but he is one of the last people that shared a dwelling with her before she died. I dont know for sure it is her and I dont love the certainty that the podcast displays that it is Short but pretending that you know it isnt her and there are not some indications that it might be her (not least the name) is utterly disingenuous and indicates that you should not be taken seriously. I know that if I was one of the last people that hung out with Elizabeth Short, was questioned by police, and over the intervening years learned I was a serious suspect of a famous murder, I certainly wouldn't draw that photo. That doesn't make him the killer but it isnt the nothing burger you claim it to be.", "webpage_url": "https://www.youtube.com/watch?v=79GU3ushtaA", "title": "Chapter 9: Last Man Standing"}, {"author": "@a1investigations433", "timestamp": 1773705600, "text": "\u200b\u200b\u00a0@spinsandneedles\u00a0once again, confrontational. 1.) So it can't be someone she knew because that's amateur? That is straight up absurd.   So the killer has to be black because to think he is white means you're an amateur. Lol\n\n2. The police had many varied opinions on him as the killer. Those opinions also changed depending on the cop. Harry's opinion is something to note but it alone does not make or break a case. They wanted to bring him back in. They sent ovatures to try to find him. They had him on a list of 20 suspects. You can't just dismiss that, sorry. Also, the detective that had the case for the last 15 years said its him. Don't know if she's right but you cant just dismiss that, sorry. \n\n3. Yes, they are saying he drew her in his final year of life. I think its pretty damned weird that one of the final 20 suspects of a world famous murder and who personally knew the victim in her final 2 weeks, would draw that in his last life on earth after diagnosed with terminal cancer. You can dismiss it if you want. I find it compelling if not convincing. We are going in circles at this point. Cya.", "webpage_url": "https://www.youtube.com/watch?v=79GU3ushtaA", "title": "Chapter 9: Last Man Standing"}, {"author": "@a1investigations433", "timestamp": 1773705600, "text": "Want to address the evidence or just offer hyperbolic straw mans?", "webpage_url": "https://www.youtube.com/watch?v=79GU3ushtaA", "title": "Chapter 9: Last Man Standing"}, {"author": "@JackDoeland", "timestamp": 1772841600, "text": "It appears you are struggling to present a consistent pattern regarding your own \u201cBaber claims,\u201d let alone his previous comments. He has already addressed and challenged his Larry Kane theory from years ago, Mr. Trashlier. Do you actually watch the videos or just complain? \n\nAt this stage, your continued focus on Baber and any associated releases, plastering them with dozens of negative comments\u2014serves no real purpose. Repeated engagement of this nature only creates the impression of personal fixation on the guy. \n\nMeanwhile, you hate on with the handful of others as his work continues to receive substantive media coverage for its contributions to cold case analysis and the  much-needed public exposure they deserve.\nAnd now you accuse me of being him for calling you out and pointing out the obvious \ud83d\udc4d\ud83c\udffb. \n\nHave a wonderful day, mate!", "webpage_url": "https://www.youtube.com/watch?v=79GU3ushtaA", "title": "Chapter 9: Last Man Standing"}, {"author": "@JackDoeland", "timestamp": 1772841600, "text": "\u2060\u00a0@EdEdwardsCiphers\u00a0You have zero room to talk. You\u2019ve been called out by others for your serial posting of passive aggressive nonsense. If I were you, I\u2019d pipe down. Nobody outside of a handful of distractors, few are falling for your smear campaign anymore. Have a nice day!", "webpage_url": "https://www.youtube.com/watch?v=79GU3ushtaA", "title": "Chapter 9: Last Man Standing"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "He was attempting to hide the word \u201cZoDiac\u201d within the shading and therefore was likely not concerned with its exact appearance. The handwriting of Margolis is identical in appearance to Zodiac\u2019s in every way as well as his upper case lettering to Black Dahlia Avenger\u2019s postcard. Please research before making CAPITALIZED claims. It has now been confirmed by a leading forensic expert as of a day or so ago according to reports even if handwriting analysis is not 100% accurate according to historical accounts.", "webpage_url": "https://www.youtube.com/watch?v=siLaHIMxa9o", "title": "IMPACT x Nightline: \u201cKill Code: Black Dahlia & Zodiac \u2014 Two Cases, One Killer?\u201d"}, {"author": "@JackDoeland", "timestamp": 1772841600, "text": "Please disregard the ongoing trolling. Anyone who expresses support for Baber or the team is routinely accused of being him or is subjected to criticism by the same small group of 8-9 individuals. It has been pointed out that nearly 80% of the negative commentary in the podcast appears to originate from this small circle of detractors. They are certainly dedicated lol. \n\nAs far as your questions, I can share what I know or have been told:\n\n1.\tThere is a video that was created. One can be seen on the HULU special (sped-up). Once the method of encryption and the key is identified, the process is rather simple. My 13-year-old son was able to then solve it in 10 minutes.\n\t\n2.\tGreat question. Margolis apparently had multiple aliases over the years. He did attend USC, and the transcript was in the evidence turned over by the family. Whether he used a fictitious transcript or stole another student\u2019s with a similar name is to be debated.\n\t\n3.\tIt would be possible to test the partial DNA profile held by SFPD if a Margolis/Merrill family member were willing to give a sample.\n\t\n4.\tThe family reportedly wishes to stay silent.", "webpage_url": "https://www.youtube.com/watch?v=8PpAUDK_4MQ", "title": "Chapter 8: The Round Table Part 2"}, {"author": "@JackDoeland", "timestamp": 1772841600, "text": "\u00a0@EdEdwardsCiphers\u00a0Baber obviously understands cryptography. Numerous experts have confirmed his solution. Continue to embarrass yourself among the masses, it\u2019s quite entertaining. No troll like a committed one!", "webpage_url": "https://www.youtube.com/watch?v=8PpAUDK_4MQ", "title": "Chapter 8: The Round Table Part 2"}, {"author": "@JackDoeland", "timestamp": 1772841600, "text": "\u00a0@EdEdwardsCiphers\u00a0 By all means, please continue. I enjoy your passive aggressive ramblings, mate. The play-by-play breakdown! You\u2019re like the ignorant John Madden of Killer in the Code. \n\nYou\u2019re absolutely killing it. lol", "webpage_url": "https://www.youtube.com/watch?v=8PpAUDK_4MQ", "title": "Chapter 8: The Round Table Part 2"}, {"author": "@JackDoeland", "timestamp": 1772841600, "text": "\u00a0@EdEdwardsCiphers\u00a0Keep rambling, mate! I have my coffee.", "webpage_url": "https://www.youtube.com/watch?v=8PpAUDK_4MQ", "title": "Chapter 8: The Round Table Part 2"}, {"author": "@emmgeevideo", "timestamp": 1772841600, "text": "Thank you for sharing.", "webpage_url": "https://www.youtube.com/watch?v=sDvqjBY44t4", "title": "New podcast from Michael Connelly - Killer In The Code: Solving The Black Dahlia & Zodiac Cases"}, {"author": "@emmgeevideo", "timestamp": 1772841600, "text": "I challenge you to listen to all of the episodes and reply with a list of 5 main points from the podcast that are fiction and why they are fiction.  On the latter point, you can't say \"They are fiction because I say so.\"  You must have factual points from verified sources that contradict the five podcast assertions you've chose.  If you're unable to do this, then I quest that you apologize for your statement.  Since you apparently haven't listed to the podcast at the time you wrote your accusation, we have to wonder how you happen to know that it will consist of \"tantalizing fiction\".  Thank you for your attention to this matter.", "webpage_url": "https://www.youtube.com/watch?v=sDvqjBY44t4", "title": "New podcast from Michael Connelly - Killer In The Code: Solving The Black Dahlia & Zodiac Cases"}, {"author": "@nillydilly-w5l", "timestamp": 1773705600, "text": "I agree that the sketch details are clear. It represents Elizabeth Short, not some random girlfriend with the same name as some would like to believe. The son is trying to protect his father and that is understandable to a point but there is way too much evidence to ignore.", "webpage_url": "https://www.youtube.com/watch?v=GaR4Ski5EDc", "title": "Chapter 2: The Smoking Gun"}, {"author": "@nillydilly-w5l", "timestamp": 1773705600, "text": "\u00a0@Imnottheborough\u00a0Oh, so you\u2019re blind and and an idiot? And why do you use emojis like a child would when commenting?", "webpage_url": "https://www.youtube.com/watch?v=GaR4Ski5EDc", "title": "Chapter 2: The Smoking Gun"}, {"author": "@markwhisenant6879", "timestamp": 1770422400, "text": "The Origin of the Date: During a famous 1969 televised appearance on the Jim Dunbar Show, a caller claiming to be the Zodiac spoke with attorney Melvin Belli. Later, Belli's housekeeper reported receiving a phone call from the \"Zodiac\" on January 14, 1970, in which the caller stated it was his birthday. I just figured out the Zodiac killer Birthday was Jan 14th at the Zodiac Motel where he became the Zodiac and dumped Elizabeth Shorts body Jan 15th on Lovers Lane, LA CA.", "webpage_url": "https://www.youtube.com/watch?v=GaR4Ski5EDc", "title": "Chapter 2: The Smoking Gun"}, {"author": "@JackDoeland", "timestamp": 1774742400, "text": "\u00a0@CathyGOdom\u00a0 You must\u2019ve missed the testimony by Det. Hanson in 1949 then? When questioned by Deputy DA Arthur Veitch? \n\nAnd I quote:\n\n \u201cYou are aware, I presume, of the investigation with respect to the fact that within 60 days of her death, this girl roomed and stayed in the room of a medical student at U.S.C., Marvin Margolis, who entered U.S.C. in September of 1946, and whose first obligation under his entry was to DISECT A HUMAN CORPSE, and that Marvin Margolis is now in Chicago and that a checkup is being made. Are you aware of that?\u201d\n\nThis would be discovered on page 16b of the testimony transcript. \n\nWould you like to add any additional ignorant and incorrect comments about some others things I can happily correct you on?", "webpage_url": "https://www.youtube.com/watch?v=GaR4Ski5EDc", "title": "Chapter 2: The Smoking Gun"}, {"author": "@JackDoeland", "timestamp": 1767744000, "text": "It was a compelling episode; however, several statements suggest that the underlying research was incomplete and reliant on secondary sources that contain many inaccuracies.\n\nTo clarify, Margolis was initially cleared only until detectives determined that he had lied\u2014twice\u2014during two separate interviews. During the 1949 grand jury inquest, both detectives testified under oath that Margolis remained a very strong suspect. Additionally, Margolis resided just down the street, which raises a reasonable question as to how the conclusion was reached that he was not in the state at the time.\n\nFor the sake of the victims and their families, I strongly encourage a thorough review of the primary records before repeating or amplifying inaccurate claims here.", "webpage_url": "https://www.youtube.com/watch?v=Nw17OH4Zpp4", "title": "Zodiac Killer News Report 01/05/2026"}, {"author": "@JackDoeland", "timestamp": 1774742400, "text": "Baber presented some of the papers and material the Merrill family shared with them. He never said they were absolutely the same individual, he showed who they were and raised the question if THE Margolis had transcripts and documents of others with a same or similar name, why? \nSo stop your stupid accusations, running your mouth, and pay attention to what is said on the podcast Mr. know it all.", "webpage_url": "https://www.youtube.com/watch?v=OlKTEFe-obc", "title": "Chapter 6: A Mind For Murder"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "Craig Rhodes of The Zodiac Killer Vault, what \u201cevidence\u201d do you recommend the experts need further due diligence on? What in particular?\n\nYou must know more than all the detectives, cryptography and forensic experts, correct?", "webpage_url": "https://www.youtube.com/watch?v=OlKTEFe-obc", "title": "Chapter 6: A Mind For Murder"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@TM-ew1ig\u00a0 Hello, \u201cTM.\u201d I wish I could be of more assistance, but I\u2019m not able to help with that. I expect it will be addressed in the final two episodes. Thank you.", "webpage_url": "https://www.youtube.com/watch?v=OlKTEFe-obc", "title": "Chapter 6: A Mind For Murder"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@Cragle-Z\u00a0Appreciate your response. My best assessment is that this was either a typographical error (804 versus 408), particularly given that both share the same 987 exchange and the\nSanta Clara location listed, or that a fictitious card was created for use during his overseas travel.", "webpage_url": "https://www.youtube.com/watch?v=OlKTEFe-obc", "title": "Chapter 6: A Mind For Murder"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@EdEdwardsCiphers\u00a0Who claims to be silenced? Cragle-Z? A person who has been respectful in his interactions with others? lol", "webpage_url": "https://www.youtube.com/watch?v=OlKTEFe-obc", "title": "Chapter 6: A Mind For Murder"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@EdEdwardsCiphers\u00a0 No one\u2019s been silenced that I\u2019m aware of, mate. And if they were, he certainly wouldn\u2019t be my choice lol.", "webpage_url": "https://www.youtube.com/watch?v=OlKTEFe-obc", "title": "Chapter 6: A Mind For Murder"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u00a0@EdEdwardsCiphers\u00a0lol I don\u2019t believe he\u2019s captured.", "webpage_url": "https://www.youtube.com/watch?v=OlKTEFe-obc", "title": "Chapter 6: A Mind For Murder"}, {"author": "@JackDoeland", "timestamp": 1770422400, "text": "\u2060\u00a0@EdEdwardsCiphers\u00a0Not sure what you \u201cEd Edwards\u201d mean? Craig\u2019s name is\u2026Craig? What you do is you click on his profile picture and his name appears. He\u2019s a member within an established Zodiac group having recently shared HD images of the Paul Stine crime scene prints. We\u2019d like to know what he thinks? And what audience do you refer to? This is a YouTube channel where comments are posted and people can discuss their opinions. \n\nDo you have a legitimate point?", "webpage_url": "https://www.youtube.com/watch?v=OlKTEFe-obc",
