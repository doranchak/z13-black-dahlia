<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Substitution Table Keyword Visualizer</title>
    <style>
        @font-face {
            font-family: 'untitled2regular';
            src: url('z340-z408-combined-font-monospaced-webfont.woff2') format('woff2'),
                url('z340-z408-combined-font-monospaced-webfont.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --wood-color: #e3c18d;
            --wood-dark: #c4a470;
            --table-header-bg: #eceff1;
            --highlight-blue: #64b5f6;
            --highlight-green: #66bb6a;
            --highlight-red: #ef5350;
            --keyword-highlight: #ffca28; /* Amber for active processing */
            
            --cipher-text-color: #2e7d32; /* Green text for Cipher */
            --cipher-bg-keyword: #b7ffbd; /* Very light green for Cipher Keyword area */
            
            --plain-text-color: #000000;
            --plain-bg-keyword: #faf19e; /* Very light yellow for Plain Keyword area */
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        #main-container {
            display: flex;
            flex-direction: column;
            width: 95vw;
            max-width: 1400px;
            gap: 20px;
            align-items: center;
        }

        .area {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            box-sizing: border-box;
        }

        h3 {
            margin: 0 0 15px 0;
            color: #333;
        }

        /* Table Styles */
        #key-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            margin-bottom: 20px;
        }

        td {
            position: relative;
            border: 1px solid #ccc;
            height: 50px;
            text-align: center;
            font-size: 24px;
            overflow: visible;
        }
        
        /* Cipher Row Styling */
        #cipher-row td {
            font-family: 'untitled2regular';
            background-color: #ffffff; 
            font-size: 32px;
            color: var(--cipher-text-color);
            font-weight: bold;
        }
        
        /* Background Highlight for Cipher Keyword */
        #cipher-row td.keyword-bg {
            background-color: var(--cipher-bg-keyword) !important;
        }

        /* Plain Row Styling */
        #plain-row td {
            background-color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            color: var(--plain-text-color);
        }

        /* Background Highlight for Plain Keyword */
        #plain-row td.keyword-bg {
            background-color: var(--plain-bg-keyword) !important;
        }

        /* Explicitly target content span for bolding to avoid overrides */
        #plain-row .content {
            font-weight: 900 !important;
        }

        /* Checkmarks for comparison */
        .checkmark {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            font-weight: bold;
            opacity: 0;
            z-index: 10;
        }
        .check-green { color: green; }
        .check-red { color: red; }

        /* Highlights */
        .highlight-active {
            background-color: var(--highlight-blue) !important;
            color: white !important;
            transform: scale(1.1);
        }
        
        .highlight-duplicate {
            background-color: var(--keyword-highlight) !important;
            transform: scale(1.2);
            text-decoration: underline;
        }

        .highlight-match {
            background-color: #e8f5e9 !important; /* Light Green */
            border: 2px solid var(--highlight-green) !important;
        }

        .highlight-mismatch {
            background-color: #ffebee !important; /* Light Red */
            border: 2px solid var(--highlight-red) !important;
        }

        /* Keyword Display Areas */
        .keyword-display-area {
            display: flex;
            gap: 5px;
            min-height: 40px;
            margin-bottom: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .keyword-char-box {
            width: 30px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-weight: bold;
            background: #fafafa;
        }

        .keyword-char-box.active {
            background-color: var(--keyword-highlight);
            border-color: #fbc02d;
            transform: scale(1.1);
        }

        .keyword-char-box.duplicate {
            background-color: #eeeeee;
            color: #bdbdbd;
            border-style: dashed;
        }

        /* Controls Section */
        #controls-container {
            display: flex;
            gap: 20px;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .control-panel {
            flex: 1;
            min-width: 300px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        .control-row {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        label {
            font-weight: 600;
            color: #455a64;
            font-size: 14px;
        }

        input[type="text"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            flex: 1;
            text-transform: uppercase;
        }

        /* Speed Control Range */
        input[type="range"] {
            flex: 1;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }

        #btn-go {
            background-color: #1976d2;
            color: white;
            width: 100%;
            margin-top: 10px;
        }
        #btn-go:hover { background-color: #1565c0; }

        #btn-compare {
            background-color: #7b1fa2;
            color: white;
            width: 100%;
            margin-top: 5px;
        }
        #btn-compare:hover { background-color: #6a1b9a; }

        #btn-reset {
            background-color: #546e7a;
            color: white;
            width: 100%;
            margin-top: 5px;
        }
        #btn-reset:hover { background-color: #455a64; }

    </style>
</head>

<body>

    <div id="main-container">
        <div class="area">
            <h3>Substitution Table</h3>
            <table id="key-table">
                <tr id="cipher-row"></tr>
                <tr id="plain-row"></tr>
            </table>
        </div>

        <div class="area">
            <h3>Processing Visualization</h3>
            <div style="margin-bottom: 5px; font-size: 12px; color: #666;">Cipher Keyword Processing:</div>
            <div id="cipher-keyword-area" class="keyword-display-area"></div>
            
            <div style="margin-bottom: 5px; font-size: 12px; color: #666; margin-top: 15px;">Plain Keyword Processing:</div>
            <div id="plain-keyword-area" class="keyword-display-area"></div>
        </div>

        <div id="controls-container" class="area" style="background: transparent; box-shadow: none; padding: 0;">
            
            <div class="control-panel">
                <h4 style="margin-top: 0;">Cipher Text Configuration</h4>
                <div class="control-row">
                    <input type="text" id="cipher-keyword" placeholder="ENTER KEYWORD">
                </div>
                <div class="control-row">
                    <input type="checkbox" id="cipher-at-end"> <label for="cipher-at-end">Keyword at End</label>
                </div>
                <div class="control-row">
                    <input type="checkbox" id="cipher-rev-key"> <label for="cipher-rev-key">Reverse Keyword</label>
                </div>
                <div class="control-row">
                    <input type="checkbox" id="cipher-rev-alpha"> <label for="cipher-rev-alpha">Reverse Alphabet</label>
                </div>
            </div>

            <div class="control-panel">
                <h4 style="margin-top: 0;">Plain Text Configuration</h4>
                <div class="control-row">
                    <input type="text" id="plain-keyword" placeholder="ENTER KEYWORD">
                </div>
                <div class="control-row">
                    <input type="checkbox" id="plain-at-end"> <label for="plain-at-end">Keyword at End</label>
                </div>
                <div class="control-row">
                    <input type="checkbox" id="plain-rev-key"> <label for="plain-rev-key">Reverse Keyword</label>
                </div>
                <div class="control-row">
                    <input type="checkbox" id="plain-rev-alpha"> <label for="plain-rev-alpha">Reverse Alphabet</label>
                </div>
            </div>

            <div class="control-panel" style="flex: 0 0 150px; display: flex; flex-direction: column; justify-content: center;">
                <div style="margin-bottom: 10px; font-size: 12px; font-weight: bold; color: #555;">
                    Speed: <span id="speed-val">200ms</span>
                    <input type="range" id="anim-speed" min="50" max="1000" step="50" value="200" oninput="updateSpeedDisp()">
                </div>
                <button id="btn-go" onclick="runAnimation()">GO</button>
                <button id="btn-compare" onclick="compareResults()">COMPARE</button>
                <button id="btn-reset" onclick="hardReset()">RESET</button>
            </div>
        </div>
    </div>

    <script>
        // --- Configuration ---
        const ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
        
        // Preset Partial Mapping for "Compare" functionality
        const PRESET_MAPPING = {
            "A": "I",
            "B": "R",
            "E": "V",
            "K": "N",
            "M": "L",
            "N": "M",
            "V": "E",
            "Z": "A",
        };

        // --- State ---
        let isAnimating = false;
        let cancelAnimation = false;

        // --- Initialization ---
        function init() {
            buildTable();
        }

        function updateSpeedDisp() {
            const val = document.getElementById('anim-speed').value;
            document.getElementById('speed-val').textContent = val + "ms";
        }

        function getSpeed() {
            return parseInt(document.getElementById('anim-speed').value, 10);
        }

        function buildTable() {
            const cRow = document.getElementById('cipher-row');
            const pRow = document.getElementById('plain-row');
            cRow.innerHTML = ''; 
            pRow.innerHTML = '';

            for (let i = 0; i < 26; i++) {
                // Cipher Cell
                const tdC = document.createElement('td');
                tdC.id = `cell-c-${i}`;
                tdC.innerHTML = `<span class="checkmark" id="check-c-${i}"></span><span class="content"></span>`;
                cRow.appendChild(tdC);

                // Plain Cell
                const tdP = document.createElement('td');
                tdP.id = `cell-p-${i}`;
                tdP.innerHTML = `<span class="checkmark" id="check-p-${i}"></span><span class="content"></span>`;
                pRow.appendChild(tdP);
            }
        }

        // --- Animation Helpers ---
        function wait(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function hardReset() {
            cancelAnimation = true;
            isAnimating = false;
            clearTable();
            document.querySelectorAll('.keyword-bg').forEach(el => el.classList.remove('keyword-bg'));
        }

        function clearTable() {
            document.querySelectorAll('td .content').forEach(span => span.textContent = '');
            document.querySelectorAll('td').forEach(td => {
                td.className = '';
                td.classList.remove('highlight-match', 'highlight-mismatch', 'highlight-active', 'highlight-duplicate', 'keyword-bg');
            });
            document.querySelectorAll('.checkmark').forEach(cm => {
                cm.textContent = '';
                cm.opacity = 0;
            });
            document.getElementById('cipher-keyword-area').innerHTML = '';
            document.getElementById('plain-keyword-area').innerHTML = '';
        }

        // --- Main Animation Logic ---

        async function runAnimation() {
            if (isAnimating) return;
            isAnimating = true;
            cancelAnimation = false;
            clearTable();

            // 1. Gather Inputs
            const configC = {
                keyword: document.getElementById('cipher-keyword').value.toUpperCase().replace(/[^A-Z]/g, ''),
                atEnd: document.getElementById('cipher-at-end').checked,
                revKey: document.getElementById('cipher-rev-key').checked,
                revAlpha: document.getElementById('cipher-rev-alpha').checked,
                rowIdPrefix: 'cell-c-',
                areaId: 'cipher-keyword-area',
                keywordBgClass: 'keyword-bg' // Applies cipher bg style
            };

            const configP = {
                keyword: document.getElementById('plain-keyword').value.toUpperCase().replace(/[^A-Z]/g, ''),
                atEnd: document.getElementById('plain-at-end').checked,
                revKey: document.getElementById('plain-rev-key').checked,
                revAlpha: document.getElementById('plain-rev-alpha').checked,
                rowIdPrefix: 'cell-p-',
                areaId: 'plain-keyword-area',
                keywordBgClass: 'keyword-bg' // Applies plain bg style (distinguished by parent row ID in CSS)
            };

            // 2. Animate Cipher Row
            if(!cancelAnimation) await processRow(configC);

            // 3. Animate Plain Row
            if(!cancelAnimation) await processRow(configP);

            isAnimating = false;
        }

        async function processRow(config) {
            const { keyword, atEnd, revKey, revAlpha, rowIdPrefix, areaId, keywordBgClass } = config;
            const area = document.getElementById(areaId);
            const usedChars = new Set();
            const charToCellId = {}; // Track where characters were written
            
            // 1. Setup Keyword Visualization Area
            const kwChars = keyword.split('');
            const kwElements = [];
            
            kwChars.forEach(char => {
                const box = document.createElement('div');
                box.className = 'keyword-char-box';
                box.textContent = char;
                area.appendChild(box);
                kwElements.push(box);
            });

            // Determine Start Index and Step Direction
            let dedupedLen = 0;
            let tempSet = new Set();
            kwChars.forEach(c => {
                if(!tempSet.has(c)) { tempSet.add(c); dedupedLen++; }
            });

            let tableIdx, step;
            if (revKey) {
                // Reverse: Start from right end of the block, fill towards left
                step = -1;
                // If atEnd: Occupies last 'dedupedLen' slots. Highest index is 25.
                // If not atEnd: Occupies first 'dedupedLen' slots. Highest index is dedupedLen - 1.
                tableIdx = atEnd ? 25 : (dedupedLen - 1);
            } else {
                // Standard: Start from left end of the block, fill towards right
                step = 1;
                // If atEnd: Occupies last 'dedupedLen' slots. Lowest index is 26 - dedupedLen.
                // If not atEnd: Occupies first 'dedupedLen' slots. Lowest index is 0.
                tableIdx = atEnd ? (26 - dedupedLen) : 0;
            }
            
            // 2. Write Keyword to Table
            // Always iterate Forward through the keyword string (i = 0 to len)
            // But write into the table based on tableIdx and step
            if (keyword.length > 0) {
                for (let i = 0; i < kwChars.length; i++) {
                    if(cancelAnimation) return;

                    const char = kwChars[i]; 
                    const box = kwElements[i]; 

                    if (usedChars.has(char)) {
                        // --- Duplicate Handling ---
                        box.classList.add('duplicate'); 
                        
                        // Find the original keyword box (first occurrence)
                        const origBoxIdx = kwChars.indexOf(char);
                        const origBox = kwElements[origBoxIdx];
                        
                        // Find the original table cell (using our tracker)
                        const origCellId = charToCellId[char];
                        const origTableCell = origCellId ? document.getElementById(origCellId) : null;

                        if(origBox) origBox.classList.add('highlight-duplicate');
                        if(origTableCell) origTableCell.classList.add('highlight-duplicate');
                        
                        await wait(getSpeed());
                        
                        if(origBox) origBox.classList.remove('highlight-duplicate');
                        if(origTableCell) origTableCell.classList.remove('highlight-duplicate');

                    } else {
                        // --- New Character Handling ---
                        usedChars.add(char);
                        box.classList.add('active');
                        
                        const cellId = rowIdPrefix + tableIdx;
                        const cell = document.getElementById(cellId);
                        const span = cell.querySelector('.content');
                        span.textContent = char;
                        
                        // Record where we put this char for duplicate lookup later
                        charToCellId[char] = cellId;

                        // Apply specific background class for keyword part
                        cell.classList.add(keywordBgClass);
                        
                        cell.classList.add('highlight-active');
                        await wait(getSpeed());
                        cell.classList.remove('highlight-active');
                        
                        box.classList.remove('active');
                        
                        // Move to next table slot
                        tableIdx += step;
                    }
                }
            }

            // 3. Fill Remaining Alphabet
            let emptySlots = [];
            for(let i=0; i<26; i++) {
                const cell = document.getElementById(rowIdPrefix + i);
                if(cell.querySelector('.content').textContent === '') {
                    emptySlots.push(i);
                }
            }

            let alphaSource = revAlpha ? [...ALPHABET].reverse() : ALPHABET;

            for (let char of alphaSource) {
                if(cancelAnimation) return;

                if (usedChars.has(char)) {
                    // --- SKIP Highlight Logic ---
                    
                    // Use our tracker if available, otherwise fallback search
                    let existingTableCell = null;
                    if (charToCellId[char]) {
                        existingTableCell = document.getElementById(charToCellId[char]);
                    } else {
                        // Fallback (shouldn't happen if keyword processed correctly)
                        for(let k=0; k<26; k++) {
                             const c = document.getElementById(rowIdPrefix + k);
                             if (c.querySelector('.content').textContent === char) {
                                 existingTableCell = c;
                                 break;
                             }
                        }
                    }

                    const kwIndex = kwChars.indexOf(char);
                    const kwBox = (kwIndex !== -1) ? kwElements[kwIndex] : null;

                    if(existingTableCell) existingTableCell.classList.add('highlight-duplicate');
                    if(kwBox) kwBox.classList.add('highlight-duplicate');

                    await wait(getSpeed());

                    if(existingTableCell) existingTableCell.classList.remove('highlight-duplicate');
                    if(kwBox) kwBox.classList.remove('highlight-duplicate');

                    continue; 
                }

                if (emptySlots.length > 0) {
                    const slotIdx = emptySlots.shift(); 
                    const cell = document.getElementById(rowIdPrefix + slotIdx);
                    const span = cell.querySelector('.content');
                    
                    span.textContent = char;
                    // No keywordBgClass here - keeps it white

                    cell.classList.add('highlight-active');
                    await wait(getSpeed());
                    cell.classList.remove('highlight-active');
                }
            }
        }

        // --- Comparison Logic ---

        async function compareResults() {
            if (isAnimating) return;
            isAnimating = true;

            // Clear previous marks
            document.querySelectorAll('.checkmark').forEach(el => {
                el.innerHTML = '';
                el.style.opacity = '0';
                el.className = 'checkmark'; 
            });
            document.querySelectorAll('td').forEach(td => {
                td.classList.remove('highlight-match', 'highlight-mismatch');
            });

            // Get generated data
            const cCells = [];
            const pCells = [];
            for(let i=0; i<26; i++) {
                cCells.push(document.getElementById(`cell-c-${i}`));
                pCells.push(document.getElementById(`cell-p-${i}`));
            }

            // Iterate left to right
            for(let i=0; i<26; i++) {
                if(cancelAnimation) { isAnimating = false; return; }

                const cChar = cCells[i].querySelector('.content').textContent;
                const pChar = pCells[i].querySelector('.content').textContent;

                if (!cChar || !pChar) continue;

                const targetPlain = PRESET_MAPPING[cChar];

                if (targetPlain) {
                    const checkC = cCells[i].querySelector('.checkmark');
                    const checkP = pCells[i].querySelector('.checkmark');

                    if (pChar === targetPlain) {
                        cCells[i].classList.add('highlight-match');
                        pCells[i].classList.add('highlight-match');
                        
                        checkC.innerHTML = '&#10004;'; 
                        checkC.classList.add('check-green');
                        checkC.style.opacity = '1';

                        checkP.innerHTML = '&#10004;';
                        checkP.classList.add('check-green');
                        checkP.style.opacity = '1';
                    } else {
                        cCells[i].classList.add('highlight-mismatch');
                        pCells[i].classList.add('highlight-mismatch');

                        checkC.innerHTML = '&#10008;'; 
                        checkC.classList.add('check-red');
                        checkC.style.opacity = '1';

                        checkP.innerHTML = '&#10008;';
                        checkP.classList.add('check-red');
                        checkP.style.opacity = '1';
                    }
                    await wait(getSpeed()); 
                }
            }
            isAnimating = false;
        }

        init();
    </script>
</body>

</html>
