<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Substitution Table Keyword Visualizer</title>
    <style>
        @font-face {
            font-family: 'untitled2regular';
            src: url('z340-z408-combined-font-monospaced-webfont.woff2') format('woff2'),
                url('z340-z408-combined-font-monospaced-webfont.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --wood-color: #e3c18d;
            --wood-dark: #c4a470;
            --table-header-bg: #eceff1;
            --highlight-blue: #64b5f6;
            --highlight-green: #66bb6a;
            --highlight-red: #ef5350;
            --keyword-highlight: #ffca28;
            --cipher-text-color: #2e7d32;
            --cipher-bg-keyword: #b7ffbd;
            --plain-text-color: #000000;
            --plain-bg-keyword: #faf19e;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: row;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Left and Right Panels */
        #left-panel {
            width: 350px;
            min-width: 350px;
            background: #ffffff;
            border-right: 1px solid #ddd;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        #right-panel {
            flex: 1;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .area {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 1400px;
            box-sizing: border-box;
        }

        h3 { margin: 0 0 15px 0; color: #333; }

        #key-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            margin-bottom: 20px;
        }

        td {
            position: relative;
            border: 1px solid #ccc;
            height: 50px;
            text-align: center;
            font-size: 24px;
            overflow: visible;
            /* transition: all 0.2s ease-in-out; */
        }
        
        #cipher-row td {
            font-family: 'untitled2regular';
            background-color: #ffffff; 
            font-size: 32px;
            color: var(--cipher-text-color);
            font-weight: bold;
        }
        
        #cipher-row td.keyword-bg { background-color: var(--cipher-bg-keyword) !important; }

        #plain-row td {
            background-color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            color: var(--plain-text-color);
        }

        #plain-row td.keyword-bg { background-color: var(--plain-bg-keyword) !important; }
        #plain-row .content { font-weight: 900 !important; }

        .checkmark {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            font-weight: bold;
            opacity: 0;
            z-index: 10;
        }
        .check-green { color: green; }
        .check-red { color: red; }

        .highlight-active {
            background-color: var(--highlight-blue) !important;
            color: white !important;
            /* transform: scale(1.1); */
            /* z-index: 5; */
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* Increased specificity to beat #cipher-row */
        #key-table td.keyword-bg.highlight-active {
            background-color: #ff3d00 !important; /* Vivid dark orange */
            color: white !important;
            /* transform: scale(1.25); */
            /* z-index: 20; */
            box-shadow: 0 0 15px rgba(255, 61, 0, 0.8);
            border: 2px solid #dd2c00 !important;
        }
        
        .highlight-duplicate {
            background-color: var(--keyword-highlight) !important;
            /* transform: scale(1.2); */
            text-decoration: underline;
        }

        .highlight-match {
            background-color: #e8f5e9 !important;
            border: 2px solid var(--highlight-green) !important;
        }

        .highlight-mismatch {
            background-color: #ffebee !important;
            border: 2px solid var(--highlight-red) !important;
        }

        .keyword-display-area {
            display: flex;
            gap: 5px;
            min-height: 40px;
            margin-bottom: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .keyword-char-box {
            width: 30px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-weight: bold;
            background: #fafafa;
        }

        .keyword-char-box.active {
            background-color: var(--keyword-highlight);
            border-color: #fbc02d;
            /* transform: scale(1.1); */
        }

        .keyword-char-box.duplicate {
            background-color: #eeeeee;
            color: #bdbdbd;
            border-style: dashed;
        }

        /* Message Display Styles */
        .msg-display {
            min-height: 45px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fafafa;
            display: flex;
            flex-wrap: wrap;
            gap: 10px 15px; 
            align-content: flex-start;
            align-items: center;
        }
        .word-group {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            max-width: 100%;
        }
        .msg-char {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 20px;
            height: 35px;
            /* transition: all 0.2s; */
            border-radius: 3px;
        }
        .msg-char.active {
            background-color: var(--keyword-highlight);
            /* transform: scale(1.2); */
            color: #000;
        }
        .cipher-font {
            font-family: 'untitled2regular';
            font-size: 28px;
            color: var(--cipher-text-color);
        }
        .plain-font {
            font-family: 'Segoe UI', sans-serif;
            font-size: 20px;
            color: var(--plain-text-color);
            font-weight: 900;
        }

        .control-panel {
            /* background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            width: 100%;
            box-sizing: border-box; */
        }

        .control-row {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        label { font-weight: 600; color: #455a64; font-size: 14px; }

        input[type="text"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            flex: 1;
            text-transform: uppercase;
            width: 100%;
            box-sizing: border-box;
        }

        .search-container { position: relative; width: 100%; }
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ccc;
            border-top: none;
            z-index: 100;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .search-item {
            padding: 8px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }
        .search-item:hover { background: #e3f2fd; }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            /* transition: background 0.2s; */
        }

        #btn-go { background-color: #1976d2; color: white; width: 100%; margin-top: 10px; }
        #btn-compare { background-color: #7b1fa2; color: white; width: 100%; margin-top: 5px; }
        #btn-reset { background-color: #546e7a; color: white; width: 100%; margin-top: 5px; }

    </style>
</head>

<body>

    <div id="left-panel">
        <h2 style="margin: 0 0 5px 0; font-size: 22px; color: #333;">Controls</h2>
        
        <div class="control-panel">
            <h4 style="margin-top: 0; margin-bottom: 10px;">Sample Key Presets</h4>
            <div class="search-container">
                <input type="text" id="sample-search" placeholder="SEARCH SAMPLES..." oninput="filterSamples()" onfocus="filterSamples()">
                <div id="search-results" class="search-results"></div>
            </div>
            <div class="control-row" style="margin-top:15px; flex-direction: column; align-items: flex-start;">
                <label>Current Mapping:</label>
                <input type="text" id="mapping-input" placeholder="{A=I, B=R...}" style="font-family: monospace; font-size: 12px; width: 100%;">
            </div>
        </div>

        <div class="control-panel">
            <h4 style="margin-top: 0; margin-bottom: 10px;">Cipher Text</h4>
            <div class="control-row">
                <input type="text" id="cipher-keyword" placeholder="KEYWORD">
            </div>
            <div class="control-row"><input type="checkbox" id="cipher-at-end"> <label for="cipher-at-end">At End</label></div>
            <div class="control-row"><input type="checkbox" id="cipher-rev-key"> <label for="cipher-rev-key">Rev Key</label></div>
            <div class="control-row"><input type="checkbox" id="cipher-rev-alpha"> <label for="cipher-rev-alpha">Rev Alpha</label></div>
        </div>

        <div class="control-panel">
            <h4 style="margin-top: 0; margin-bottom: 10px;">Plain Text</h4>
            <div class="control-row">
                <input type="text" id="plain-keyword" placeholder="KEYWORD">
            </div>
            <div class="control-row"><input type="checkbox" id="plain-at-end"> <label for="plain-at-end">At End</label></div>
            <div class="control-row"><input type="checkbox" id="plain-rev-key"> <label for="plain-rev-key">Rev Key</label></div>
            <div class="control-row"><input type="checkbox" id="plain-rev-alpha"> <label for="plain-rev-alpha">Rev Alpha</label></div>
        </div>

        <div class="control-panel">
            <h4 style="margin-top: 0; margin-bottom: 10px;">Message Process</h4>
            <div class="control-row">
                <input type="text" id="plain-msg" placeholder="PLAINTEXT MSG">
            </div>
            <div class="control-row">
                <input type="text" id="cipher-msg" placeholder="CIPHERTEXT MSG">
            </div>
            <div style="font-size: 11px; color: #777; margin-top: 5px;">
                Translates after key table finishes.
            </div>
        </div>

        <div class="control-panel" style="display: flex; flex-direction: column; justify-content: center;">
            <div style="margin-bottom: 10px; font-size: 12px; font-weight: bold; color: #555;">
                Speed: <span id="speed-val">200ms</span>
                <input type="range" id="anim-speed" min="50" max="1000" step="50" value="200" oninput="updateSpeedDisp()" style="width: 100%;">
            </div>
            <button id="btn-go" onclick="runAnimation()">GO</button>
            <button id="btn-compare" onclick="compareResults()">COMPARE</button>
            <button id="btn-reset" onclick="hardReset()">RESET</button>
        </div>
    </div>

    <div id="right-panel">
        <div class="area">
            <!-- <h3>Substitution Table</h3> -->
            <table id="key-table">
                <tr id="cipher-row"></tr>
                <tr id="plain-row"></tr>
            </table>
        </div>

        <div class="area">
            <!-- <h3>Processing Visualization</h3> -->
            <div style="margin-bottom: 5px; font-size: 12px; color: #666;">Cipher Keyword Processing:</div>
            <div id="cipher-keyword-area" class="keyword-display-area"></div>
            <div style="margin-bottom: 5px; font-size: 12px; color: #666; margin-top: 15px;">Plain Keyword Processing:</div>
            <div id="plain-keyword-area" class="keyword-display-area"></div>
        </div>

        <div class="area">
            <!-- <h3>Message Translation</h3> -->
            <div style="margin-bottom: 5px; font-size: 12px; color: #666;">Plaintext:</div>
            <div id="plain-msg-disp" class="msg-display plain-font"></div>
            <div style="margin-bottom: 5px; font-size: 12px; color: #666; margin-top: 15px;">Ciphertext:</div>
            <div id="cipher-msg-disp" class="msg-display cipher-font"></div>
        </div>
    </div>

    <script>

            {

                ck: "", cAtEnd: false, cRevK: false, cRevA: false,
                pk: "DECODEDIT", pAtEnd: true, pRevK: false, pRevA: true,

            },
            {

                pk: "", pAtEnd: false, pRevK: false, pRevA: false,

            },

                ck: "DRAGGEDHERFEET", cAtEnd: false, cRevK: false, cRevA: false,
                pk: "", pAtEnd: false, pRevK: false, pRevA: true,

            },
            {
                name: "A PARKED CAR",
                ck: "", cAtEnd: false, cRevK: false, cRevA: true,
                pk: "APARKEDCAR", pAtEnd: false, pRevK: false, pRevA: false,
                map: "{A=I, E=V, V=E, X=R, Z=A, K=N, M=L, N=M}"
            },
            {
                name: "OFFICER RICHARD",
                ck: "OFFICERRICHARD", cAtEnd: false, cRevK: true, cRevA: false,
                pk: "", pAtEnd: false, pRevK: false, pRevA: true,
                map: "{A=I, E=V, V=E, Z=A, K=N, M=L, N=M, O=R}"
            },
            {
                name: "RADETICH",
                ck: "", cAtEnd: false, cRevK: false, cRevA: true,
                pk: "RADETICH", pAtEnd: false, pRevK: true, pRevA: false,
                map: "{A=I, S=R, T=A, E=V, V=E, K=N, M=L, N=M}"
            },
            {
                name: "RADETICH RICHARD",
                ck: "", cAtEnd: false, cRevK: false, cRevA: false,
                pk: "RADETICHRICHARD", pAtEnd: true, pRevK: false, pRevA: true,
                map: "{A=I, S=R, T=A, E=V, V=E, K=N, M=L, N=M}"
            }
        ];

        let isAnimating = false;
        let cancelAnimation = false;

        function init() {
            buildTable();
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-container')) {
                    document.getElementById('search-results').style.display = 'none';
                }
            });
        }

        function filterSamples() {
            const input = document.getElementById('sample-search').value.toUpperCase();
            const results = document.getElementById('search-results');
            results.innerHTML = '';
            
            const filtered = SAMPLE_KEYS.filter(s => s.name.toUpperCase().includes(input));
            
            if (filtered.length > 0) {
                results.style.display = 'block';
                filtered.forEach(s => {
                    const div = document.createElement('div');
                    div.className = 'search-item';
                    div.textContent = s.name;
                    div.onclick = () => selectSample(s);
                    results.appendChild(div);
                });
            } else {
                results.style.display = 'none';
            }
        }

        async function selectSample(sample) {
            hardReset();
            document.getElementById('sample-search').value = sample.name;
            document.getElementById('search-results').style.display = 'none';

            document.getElementById('cipher-keyword').value = sample.ck;
            document.getElementById('cipher-at-end').checked = sample.cAtEnd;
            document.getElementById('cipher-rev-key').checked = sample.cRevK;
            document.getElementById('cipher-rev-alpha').checked = sample.cRevA;

            document.getElementById('plain-keyword').value = sample.pk;
            document.getElementById('plain-at-end').checked = sample.pAtEnd;
            document.getElementById('plain-rev-key').checked = sample.pRevK;
            document.getElementById('plain-rev-alpha').checked = sample.pRevA;

            document.getElementById('mapping-input').value = sample.map;
            
            document.getElementById('plain-msg').value = '';
            document.getElementById('cipher-msg').value = '';

            await runAnimation();
            await wait(1000);
            if (!cancelAnimation) await compareResults();
        }

        function updateSpeedDisp() {
            document.getElementById('speed-val').textContent = document.getElementById('anim-speed').value + "ms";
        }

        function getSpeed() { return parseInt(document.getElementById('anim-speed').value, 10); }

        function buildTable() {
            const cRow = document.getElementById('cipher-row');
            const pRow = document.getElementById('plain-row');
            cRow.innerHTML = ''; pRow.innerHTML = '';
            for (let i = 0; i < 26; i++) {
                cRow.innerHTML += `<td id="cell-c-${i}"><span class="checkmark"></span><span class="content"></span></td>`;
                pRow.innerHTML += `<td id="cell-p-${i}"><span class="checkmark"></span><span class="content"></span></td>`;
            }
        }

        function wait(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        function hardReset() {
            cancelAnimation = true;
            isAnimating = false;
            clearTable();
        }

        function clearTable() {
            document.querySelectorAll('td .content').forEach(s => s.textContent = '');
            document.querySelectorAll('td').forEach(td => td.className = '');
            document.querySelectorAll('.checkmark').forEach(cm => { cm.textContent = ''; cm.style.opacity = 0; });
            document.getElementById('cipher-keyword-area').innerHTML = '';
            document.getElementById('plain-keyword-area').innerHTML = '';
            
            document.getElementById('plain-msg-disp').innerHTML = '';
            document.getElementById('cipher-msg-disp').innerHTML = '';
        }

        async function runAnimation() {
            if (isAnimating) return;
            isAnimating = true;
            cancelAnimation = false;
            clearTable();

            const configs = [
                { id: 'cipher', row: 'cell-c-', area: 'cipher-keyword-area' },
                { id: 'plain', row: 'cell-p-', area: 'plain-keyword-area' }
            ];

            for (const cfg of configs) {
                if (cancelAnimation) break;
                await processRow({
                    keyword: document.getElementById(`${cfg.id}-keyword`).value.toUpperCase().replace(/[^A-Z]/g, ''),
                    atEnd: document.getElementById(`${cfg.id}-at-end`).checked,
                    revKey: document.getElementById(`${cfg.id}-rev-key`).checked,
                    revAlpha: document.getElementById(`${cfg.id}-rev-alpha`).checked,
                    rowIdPrefix: cfg.row,
                    areaId: cfg.area
                });
            }

            if (cancelAnimation) { isAnimating = false; return; }

            const plainMsg = document.getElementById('plain-msg').value.toUpperCase().replace(/[^A-Z ]/g, '');
            const cipherMsg = document.getElementById('cipher-msg').value.toUpperCase().replace(/[^A-Z ]/g, '');

            if (plainMsg) {
                await animateMessage(plainMsg, 'encipher');
            } else if (cipherMsg) {
                await animateMessage(cipherMsg, 'decipher');
            }

            isAnimating = false;
        }

        async function processRow(config) {
            const { keyword, atEnd, revKey, revAlpha, rowIdPrefix, areaId } = config;
            const area = document.getElementById(areaId);
            const usedChars = new Set();
            const charToCellId = {};
            const kwChars = keyword.split('');
            const kwElements = kwChars.map(char => {
                const box = document.createElement('div');
                box.className = 'keyword-char-box';
                box.textContent = char;
                area.appendChild(box);
                return box;
            });

            let deduped = [...new Set(kwChars)];
            let tableIdx = revKey ? (atEnd ? 25 : deduped.length - 1) : (atEnd ? 26 - deduped.length : 0);
            let step = revKey ? -1 : 1;

            if (keyword.length > 0) {
                for (let i = 0; i < kwChars.length; i++) {
                    if (cancelAnimation) return;
                    const char = kwChars[i];
                    if (usedChars.has(char)) {
                        kwElements[i].classList.add('duplicate');
                        const origCell = document.getElementById(charToCellId[char]);
                        origCell.classList.add('highlight-duplicate');
                        await wait(getSpeed());
                        origCell.classList.remove('highlight-duplicate');
                    } else {
                        usedChars.add(char);
                        kwElements[i].classList.add('active');
                        const cellId = rowIdPrefix + tableIdx;
                        const cell = document.getElementById(cellId);
                        cell.querySelector('.content').textContent = char;
                        charToCellId[char] = cellId;
                        cell.classList.add('keyword-bg', 'highlight-active');
                        await wait(getSpeed());
                        cell.classList.remove('highlight-active');
                        kwElements[i].classList.remove('active');
                        tableIdx += step;
                    }
                }
            }

            let alpha = revAlpha ? [...ALPHABET].reverse() : ALPHABET;
            let emptySlots = Array.from({length:26}, (_,i)=>i).filter(i => !document.getElementById(rowIdPrefix+i).querySelector('.content').textContent);

            for (let char of alpha) {
                if (cancelAnimation) return;
                if (usedChars.has(char)) {
                    const cell = document.getElementById(charToCellId[char]);
                    cell.classList.add('highlight-duplicate');
                    await wait(getSpeed());
                    cell.classList.remove('highlight-duplicate');
                    continue;
                }
                if (emptySlots.length > 0) {
                    const cell = document.getElementById(rowIdPrefix + emptySlots.shift());
                    cell.querySelector('.content').textContent = char;
                    cell.classList.add('highlight-active');
                    await wait(getSpeed());
                    cell.classList.remove('highlight-active');
                }
            }
        }

        async function animateMessage(msg, direction) {
            const plainDisp = document.getElementById('plain-msg-disp');
            const cipherDisp = document.getElementById('cipher-msg-disp');

            let currentPWord = document.createElement('div');
            currentPWord.className = 'word-group';
            plainDisp.appendChild(currentPWord);

            let currentCWord = document.createElement('div');
            currentCWord.className = 'word-group';
            cipherDisp.appendChild(currentCWord);

            for (let i = 0; i < msg.length; i++) {
                if (cancelAnimation) break;
                const char = msg[i];

                if (char === ' ') {
                    currentPWord = document.createElement('div');
                    currentPWord.className = 'word-group';
                    plainDisp.appendChild(currentPWord);

                    currentCWord = document.createElement('div');
                    currentCWord.className = 'word-group';
                    cipherDisp.appendChild(currentCWord);
                    continue;
                }

                let srcRowPrefix = direction === 'encipher' ? 'cell-p-' : 'cell-c-';
                
                let colIdx = -1;
                for (let j = 0; j < 26; j++) {
                    const cell = document.getElementById(srcRowPrefix + j);
                    if (cell.querySelector('.content').textContent === char) {
                        colIdx = j;
                        break;
                    }
                }

                if (colIdx !== -1) {
                    const pCell = document.getElementById('cell-p-' + colIdx);
                    const cCell = document.getElementById('cell-c-' + colIdx);
                    
                    pCell.classList.add('highlight-active');
                    cCell.classList.add('highlight-active');

                    const pChar = direction === 'encipher' ? char : pCell.querySelector('.content').textContent;
                    const cChar = direction === 'encipher' ? cCell.querySelector('.content').textContent : char;

                    const pSpan = document.createElement('span');
                    pSpan.className = 'msg-char active';
                    pSpan.textContent = pChar;
                    currentPWord.appendChild(pSpan);

                    const cSpan = document.createElement('span');
                    cSpan.className = 'msg-char active';
                    cSpan.textContent = cChar;
                    currentCWord.appendChild(cSpan);

                    await wait(getSpeed());

                    pCell.classList.remove('highlight-active');
                    cCell.classList.remove('highlight-active');
                    pSpan.classList.remove('active');
                    cSpan.classList.remove('active');
                }
            }
        }

        async function compareResults() {
            if (isAnimating) return;
            isAnimating = true;

            const mapStr = document.getElementById('mapping-input').value;
            const mapping = {};
            const pairs = mapStr.replace(/[{}]/g, '').split(',');
            pairs.forEach(p => {
                const [ct, pt] = p.split('=').map(s => s.trim().toUpperCase());
                if (ct && pt) mapping[ct] = pt;
            });

            document.querySelectorAll('.checkmark').forEach(el => { el.style.opacity = 0; el.className = 'checkmark'; });
            document.querySelectorAll('td').forEach(td => td.classList.remove('highlight-match', 'highlight-mismatch'));

            for (let i = 0; i < 26; i++) {
                if (cancelAnimation) break;
                const cCell = document.getElementById(`cell-c-${i}`);
                const pCell = document.getElementById(`cell-p-${i}`);
                const ct = cCell.querySelector('.content').textContent;
                const pt = pCell.querySelector('.content').textContent;

                if (ct && mapping[ct]) {
                    const isMatch = pt === mapping[ct];
                    const cls = isMatch ? 'highlight-match' : 'highlight-mismatch';
                    const mark = isMatch ? '&#10004;' : '&#10008;';
                    const markCls = isMatch ? 'check-green' : 'check-red';

                    [cCell, pCell].forEach(c => {
                        c.classList.add(cls);
                        const cm = c.querySelector('.checkmark');
                        cm.innerHTML = mark;
                        cm.classList.add(markCls);
                        cm.style.opacity = 1;
                    });
                    await wait(getSpeed());
                }
            }
            isAnimating = false;
        }

        init();
    </script>
</body>
</html>
